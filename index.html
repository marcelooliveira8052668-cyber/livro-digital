 Guerra de Canudos, já em curso.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "REPÚBLICA OLIGÁRQUICA: O GOVERNO DE CAMPOS SALLES (1898-1902)", "body": ["Quem foi Campos Salles?", "Terceiro presidente da República.", "Membro da elite paulista e do Partido Republicano Paulista (PRP).", "Conhecido como o “Governador da República” pela sua habilidade em controlar as oligarquias.", "Mecanismos de controle da República Oligárquica"]}, {"title": "Política dos Governadores", "body": ["Acordos entre o governo federal e os governadores estaduais para manter a estabilidade política.", "Troca de apoio político e proteção mútua entre as elites locais e o governo central."]}, {"title": "Política do Café com Leite", "body": ["Alternância do poder entre as oligarquias de São Paulo (café) e Minas Gerais (leite).", "Garantia do domínio político e econômico dessas duas regiões."]}, {"title": "Fraudes eleitorais e coronelismo", "body": ["Uso do voto de cabresto, compra de votos e manipulação eleitoral para manter o controle oligárquico.", "Os coronéis (chefes locais) controlavam a população rural para garantir os votos dos candidatos das oligarquias.", "Valorização do Poder Executivo", "Fortalecimento do presidente para garantir a manutenção da ordem oligárquica.", "Campos Salles usou sua autoridade para articular e impor esses mecanismos."]}, {"title": "Contexto econômico e político", "body": ["Enfrentou a crise financeira pós-Guerra do Paraguai e problemas de endividamento.", "Implementou políticas de austeridade fiscal para estabilizar a economia.", "Legado", "Consolidou o sistema oligárquico e a estabilidade política da República Velha.", "Marcou o início do período conhecido como a “Política dos Governadores”.", "Preparou o terreno para os próximos governos oligárquicos que dominaram até a Revolução de 1930. Prof. Marcelo Oliveira  História Geral.", "Presidência de Rodrigues Alves (1902-1906)", "Quem foi Rodrigues Alves?", "Político paulista, do Partido Republicano Paulista (PRP).", "Ex-prefeito de São Paulo e governador do estado.", "Conhecido por sua capacidade administrativa e visão modernizadora.", "Principais características do governo", "Continuidade da política oligárquica e da “Política dos Governadores”.", "Foco na modernização do país, especialmente nas áreas urbanas.", "Políticas para atrair imigrantes europeus para o trabalho agrícola e industrial."]}, {"title": "Modernização e saneamento", "body": ["Grande destaque para o saneamento da cidade do Rio de Janeiro, que sofria com epidemias (febre amarela, varíola, peste).", "Reforma urbana inspirada nos modelos europeus, com derrubada de cortiços e construção de avenidas largas.", "Criação de infraestrutura básica para melhorar a saúde pública.", "Economia", "Enfrentou a crise econômica internacional, mas manteve estabilidade interna.", "Fortalecimento da cafeicultura e incentivos à indústria nascente.", "Política fiscal austera, alinhada ao padrão ouro.", "Política interna", "Consolidação das oligarquias estaduais.", "Repressão a movimentos sociais e greves, mantendo o controle das elites rurais e urbanas.", "Legado", "Modernizou a capital federal, com impactos duradouros na urbanização.", "Reforçou o modelo oligárquico, garantindo a estabilidade política da República Velha.", "Deixou bases para o crescimento econômico e a integração nacional no século XX.", "Prof. Marcelo Oliveira  História do Brasil.", "O Positivismo na República Brasileira", "(Cruz Costa, in O positivismo na República)", "O positivismo teve uma influência significativa na formação política e ideológica da República Velha brasileira. Inspirado nas ideias do filósofo francês Auguste Comte, o positivismo defendia o progresso social e a ordem como bases para o desenvolvimento das nações."]}, {"title": "Influência do Positivismo na República", "body": ["Consolidação da República: O positivismo ajudou a legitimar a transição do Império para a República, valorizando a ciência, a racionalidade e o progresso.", "O Exército e o Positivismo: Muitos militares, influenciados pelo positivismo, foram protagonistas na Proclamação da República (1889). Eles viam na nova forma de governo um caminho para modernizar o Brasil.", "Ordem e Progresso: O lema da bandeira brasileira, “Ordem e Progresso”, é diretamente inspirado nos princípios positivistas.", "Organização Social: Acreditava-se que a sociedade deveria ser organizada segundo princípios científicos, hierarquizando funções e papéis para garantir estabilidade."]}, {"title": "Cruz Costa e a análise do Positivismo", "body": ["Segundo Cruz Costa, o positivismo na República foi mais do que uma influência filosófica — foi um projeto político que orientou as ações dos governantes e moldou a cultura política da época. Contudo, essa visão racionalista e cientificista também teve limites, pois nem sempre conseguiu abranger as complexas realidades sociais brasileiras, especialmente as desigualdades regionais e sociais.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "O Positivismo na República Brasileira (Edgar Carone)", "body": ["Edgar Carone destaca que o positivismo foi uma das principais correntes ideológicas que sustentaram a República Velha. Para Carone, essa filosofia influenciou diretamente as elites políticas e militares, que buscavam modernizar o Brasil por meio da ordem e do progresso."]}, {"title": "Pontos-chave da análise de Edgar Carone", "body": ["O Exército como vetor do positivismo: Muitos oficiais militares incorporaram o positivismo como base para suas ações políticas, defendendo a disciplina, a hierarquia e a racionalidade científica para o governo.", "Legitimação da República: O positivismo forneceu um discurso que justificava a queda do Império e a implantação do regime republicano como uma etapa necessária para o progresso nacional.", "Lema “Ordem e Progresso”: A frase, que aparece na bandeira brasileira, simboliza a busca pelo equilíbrio entre estabilidade política (ordem) e desenvolvimento econômico e social (progresso).", "Limitações do positivismo: Segundo Carone, embora o positivismo tenha influenciado as estruturas políticas, ele não conseguiu resolver as profundas desigualdades regionais e sociais brasileiras, o que gerou tensões ao longo da República Velha.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "Contexto Histórico com Fonte Primária (Jornal do Comércio, 26 de novembro de 1904)", "body": ["O Jornal do Comércio, um dos principais veículos de imprensa do Brasil na virada do século XX, publicou em 26 de novembro de 1904 importantes reportagens e artigos que refletem o cenário político e econômico do governo Rodrigues Alves."]}, {"title": "Exemplo de uso em aula ou apresentação", "body": ["A edição daquele dia destacou os avanços no saneamento do Rio de Janeiro, evidenciando a preocupação com a saúde pública e a modernização urbana promovida pelo governo.", "Também abordou debates políticos sobre a política econômica e as relações entre as oligarquias estaduais.", "Essas fontes primárias ajudam a compreender o pensamento da elite urbana e os desafios enfrentados pela República Velha.", "Importância das fontes históricas como o Jornal do Comércio", "Revelam a perspectiva da época, especialmente das classes dominantes.", "Permitem análise crítica da construção da narrativa histórica.", "Servem para comparar o discurso oficial com as ações concretas do governo.", "Prof. Marcelo Oliveira  História Geral.", "Presidência de Afonso Pena (1906–1909)", "Quem foi Afonso Pena?", "Político mineiro, do Partido Republicano Mineiro (PRM).", "Ex-governador de Minas Gerais e ministro da Justiça.", "Conhecido por sua habilidade em articular o poder entre as oligarquias.", "Principais características do governo", "Continuidade da política oligárquica e da “Política dos Governadores”.", "Incentivo à expansão da infraestrutura, principalmente ferrovias e estradas.", "Foco no desenvolvimento econômico e integração nacional."]}, {"title": "Infraestrutura e desenvolvimento", "body": ["Investimentos na construção e ampliação de ferrovias, fundamentais para o transporte de produtos agrícolas e minerais.", "Incentivo à imigração europeia para aumentar a força de trabalho no campo e na indústria.", "Fortalecimento do setor agroexportador, especialmente do café."]}, {"title": "Política interna", "body": ["Manteve o equilíbrio entre as oligarquias estaduais, com destaque para Minas Gerais e São Paulo.", "Repressão a movimentos sociais, especialmente greves urbanas.", "Fortalecimento do poder presidencial dentro da República oligárquica.", "Legado", "Aumento da integração econômica do país por meio das ferrovias.", "Consolidação do modelo político oligárquico que dominou a República Velha.", "Governo interrompido pela morte de Afonso Pena em 1909, gerando instabilidade temporária.", "Prof. Marcelo Oliveira  História Geral.", "Presidência de Nilo Peçanha (1909–1910)", "Quem foi Nilo Peçanha?", "Vice-presidente de Afonso Pena, assumiu a presidência após a morte dele em 1909.", "Político fluminense, conhecido por seu perfil conciliador e seu compromisso com a inclusão social."]}, {"title": "Características do governo", "body": ["Governo curto, de pouco mais de um ano, mas marcado por algumas ações importantes.", "Tentou ampliar a participação política das camadas populares, especialmente dos negros e das classes mais pobres.", "Buscou dar visibilidade à diversidade étnica e social do Brasil.", "Políticas sociais e educacionais", "Incentivou a criação de escolas e a expansão da educação pública.", "Apoio a políticas de saúde pública e melhoria das condições sanitárias.", "Política e conflitos", "Enfrentou resistência das oligarquias tradicionais e setores conservadores.", "Sofreu oposição política, o que dificultou a implementação de reformas mais profundas.", "Legado", "Considerado um presidente que tentou tornar o governo mais inclusivo.", "Destacou-se pela defesa dos direitos dos grupos marginalizados na época.", "Governo marcado pela transição e preparação para o retorno das oligarquias com Hermes da Fonseca. Prof. Marcelo Oliveira  História Geral.", "República Velha – Parte 2", "As Crises Intermitentes: De Hermes a Epitácio", "Presidência do Marechal Hermes da Fonseca (1910–1914)", "Quem foi Hermes da Fonseca?", "Militar e marechal do Exército Brasileiro.", "Irmão do ex-presidente Deodoro da Fonseca, líder da Proclamação da República.", "Representante do chamado “Partido Militar” dentro da política da República Velha.", "Características do governo", "Governo marcado por fortes tensões políticas e crises internas.", "Tentativa de reformar a administração pública e controlar os governos estaduais, especialmente para enfraquecer as oligarquias tradicionais.", "Política conhecida como a “Política das Salvações”, para intervir nos estados e apoiar grupos políticos aliados ao governo federal.", "Crises e conflitos", "Resistência de oligarquias estaduais, especialmente em São Paulo e Minas Gerais.", "Conflitos com a Igreja Católica e movimentos sociais.", "Crises militares e políticas, incluindo a Revolta da Chibata (1910), movimento contra castigos corporais na Marinha."]}, {"title": "Política externa", "body": ["Manutenção da neutralidade brasileira nas primeiras fases da Primeira Guerra Mundial.", "Fortalecimento da presença militar e defesa nacional.", "Legado", "Governo marcado por instabilidade e tensões entre federalismo e centralização.", "Enfraquecimento do poder presidencial frente às oligarquias tradicionais.", "Preparou o terreno para a transição para o governo de Venceslau Brás e a continuação das crises intermitentes da República Velha.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A presidência de Wenceslau Brás (1914–1918) foi", "body": ["marcada por importantes acontecimentos internos e internacionais que influenciaram profundamente o Brasil. Abaixo estão os principais pontos desse governo, organizados de forma clara para facilitar o uso em aulas ou roteiros didáticos.", "⸻", "Presidência de Wenceslau Brás (1914–1918)", "Quem foi Wenceslau Brás?", "- Político mineiro, ligado à política dos governadores e à aliança café-com-leite (Minas Gerais e São Paulo).", "- Eleito vice de Hermes da Fonseca, assumiu a presidência em 1914.", "⸻"]}, {"title": "Contexto Mundial", "body": ["- Primeira Guerra Mundial (1914–1918): Conflito global que teve impacto direto sobre o Brasil, especialmente nas relações comerciais e na política externa.", "- O Brasil entrou na guerra em 1917 ao lado da Tríplice Entente (França, Inglaterra e Rússia), após navios brasileiros serem atacados por submarinos alemães.", "⸻", "Principais Acontecimentos do Governo", "1. Entrada do Brasil na Primeira Guerra Mundial", "- O Brasil foi o único país da América do Sul a participar ativamente da guerra.", "- Enviou médicos, oficiais da Marinha e aviadores para atuar junto aos aliados na Europa.", "- A guerra agravou a crise do modelo agroexportador, já abalada pela queda das exportações.", "2. Economia e Crise", "- A guerra dificultou o comércio internacional, impactando as exportações de café.", "- O governo estimulou a industrialização, com destaque para a criação de indústrias têxteis e de base, já que os produtos importados escassearam.", "3. Reformas e Modernizações", "- Criação do Código Civil brasileiro, promulgado em 1916, obra de Clóvis Beviláqua — marco importante na organização das leis civis do país.", "- Modernização da administração pública e investimento em infraestrutura.", "4. Saúde Pública", "- Continuidade de campanhas de saúde iniciadas nos governos anteriores, com foco na erradicação de doenças e melhoria das condições sanitárias.", "⸻"]}, {"title": "Legado e Importância", "body": ["- Seu governo marcou a transição do Brasil agrário para um país que começava a se industrializar.", "- Reforçou os laços com os EUA e a Europa, fortalecendo a diplomacia brasileira.", "- A participação do Brasil na guerra elevou seu prestígio internacional.", "⸻", "Resumo Cronológico:", "- 1914: Início do mandato e da Primeira Guerra Mundial.", "- 1916: Promulgação do Código Civil.", "- 1917: Brasil entra na guerra.", "- 1918: Fim do mandato e da guerra.", "Prof. Marcelo Oliveira  História Geral.", "Mecanismos Políticos e Econômicos da República Velha (1889–1930)", "Período", "- Início: Proclamação da República (1889)", "- Fim: Revolução de 1930, que levou Getúlio Vargas ao poder.", "⸻", "Mecanismos Políticos", "1. Política dos Governadores", "- Estabelecida no governo de Campos Sales.", "- Acordo entre o presidente da República e os governadores dos estados: o governo federal não interferia nos estados, e estes garantiam apoio político no Congresso.", "- Criava um sistema de alianças entre elites estaduais.", "2. Coronelismo", "- Controle do voto pelos “coronéis”, líderes locais que tinham poder sobre a população rural.", "- Utilizavam favores, violência ou troca de benefícios para garantir votos a seus candidatos.", "- Parte essencial do funcionamento da Política dos Governadores.", "3. Voto de Cabresto", "- Fraude eleitoral comum: votos controlados por coronéis.", "- Eleições não eram secretas, o que facilitava ameaças e manipulação.", "4. Política do Café com Leite", "- Revezamento na presidência entre São Paulo (café) e Minas Gerais (leite).", "- Representava os interesses das oligarquias rurais desses estados.", "⸻", "Mecanismos Econômicos", "1. Economia Agroexportadora", "- Baseada na exportação de café, principalmente para Europa e EUA.", "- São Paulo era o principal produtor e exportador.", "2. Funding Loan", "- Empréstimo internacional negociado por Campos Sales com bancos ingleses.", "- Serviu para reorganizar as finanças do Brasil, mas aumentou a dependência externa.", "3. Política de Valorização do Café", "- Governo comprava e estocava café para manter o preço no mercado internacional.", "- Exemplo clássico: Convênio de Taubaté (1906).", "4. Início da Industrialização", "- Começo tímido, impulsionado pela crise da economia cafeeira e pela Primeira Guerra Mundial.", "- Indústrias têxteis e de bens de consumo começaram a surgir, especialmente no Sudeste. Aspecto", "Descrição", "Política dos Governadores", "Aliança entre presidente e governadores", "Coronelismo", "Domínio local dos coronéis sobre o voto", "Café com Leite", "Alternância entre Minas e São Paulo no poder", "Economia", "Baseada na exportação de café, com apoio estatal ao setor", "Valorização do Café"]}, {"title": "Intervenção do Estado para manter o preço do café. Conclusão", "body": ["- A República Velha foi marcada pelo controle das oligarquias rurais, fraudes eleitorais e um modelo econômico voltado para a exportação de produtos primários, especialmente o café.", "- Esse sistema entrou em crise com as mudanças econômicas e sociais do Brasil nas décadas de 1920 e 1930, culminando na Revolução de 1930.", "Prof. Marcelo Oliveira  História Geral.", "Presidência de Epitácio Pessoa (1919–1922)", "Quem foi Epitácio Pessoa?", "- Político e jurista paraibano.", "- Foi o único presidente da República Velha eleito enquanto estava fora do país — em Paris, representando o Brasil na Conferência de Paz de Versalhes.", "- Eleito com apoio das oligarquias, especialmente de São Paulo e Minas Gerais.", "⸻", "Contexto Histórico", "- Pós-Primeira Guerra Mundial.", "- Crescimento de tensões sociais: greves, reivindicações operárias e movimento tenentista emergente.", "- Início da crise do modelo oligárquico da República Velha.", "⸻", "Principais Acontecimentos do Governo", "1. Modernização e Obras Públicas", "- Investiu na infraestrutura do país, com destaque para:", "- Expansão das ferrovias.", "- Saneamento básico.", "- Combate à seca no Nordeste.", "- Criação de escolas e incentivo à educação.", "2. Epidemias e Saúde Pública", "- Enfrentou uma grave epidemia de gripe espanhola, que atingiu o Brasil entre 1918 e 1919.", "- Reforço nas campanhas de saúde pública, continuando ações iniciadas por Oswaldo Cruz.", "3. Repressão a Movimentos Sociais", "- Greves operárias (especialmente em São Paulo e Rio de Janeiro) foram duramente reprimidas.", "- Medidas autoritárias contra movimentos de trabalhadores e imigrantes anarquistas.", "4. Início do Tenentismo", "- Movimento militar de jovens oficiais que criticavam a corrupção e a política das oligarquias.", "- A Revolta do Forte de Copacabana (1922) ocorre no fim de seu governo: marco inicial do tenentismo.", "5. Educação e Cultura", "- Apoio à fundação de instituições de ensino superior.", "- Incentivo à cultura brasileira, incluindo eventos literários e artísticos.", "⸻"]}, {"title": "Legado e Avaliação", "body": ["- Governo marcado por avanços na modernização, mas também por forte repressão política.", "- Seu mandato sinalizou o início do declínio da República Velha, com o surgimento de movimentos que questionavam o domínio das oligarquias.", "- Foi o último presidente civil antes da crescente influência dos militares na política, que culminaria na Revolução de 1930.", "⸻", "Resumo Cronológico: Ano", "Evento", "1919", "Epitácio assume a presidência", "1920", "Aumento das greves operárias", "1921", "Tensões políticas e sociais crescem", "1922", "Revolta do Forte de Copacabana", "Prof. Marcelo Oliveira  História Geral.", "O Declínio das Oligarquias – de Bernardes a Washington Luís"]}, {"title": "Contexto Geral", "body": ["- A República Velha (1889–1930) foi dominada pelas oligarquias agrárias (principalmente de SP e MG).", "- A partir da década de 1920, o modelo oligárquico entrou em crise, pressionado por:", "- Movimentos sociais urbanos e greves operárias.", "- Crescimento da classe média urbana.", "- Reivindicações dos militares (movimento tenentista).", "- Fraudes eleitorais e desgaste político.", "⸻", "Presidência de Artur Bernardes (1922–1926)"]}, {"title": "Contexto da Eleição", "body": ["- Eleito em 1922 com apoio das oligarquias, mas sua vitória foi marcada por acusações de fraude eleitoral.", "- Durante a campanha, circulou uma carta (falsa) que criticava o Exército, atribuída a Bernardes, o que criou forte tensão com os militares.", "⸻", "Características do Governo", "1. Estado de Sítio Quase Permanente", "- Bernardes governou quase todo o mandato sob estado de sítio, com o Congresso autorizando medidas autoritárias.", "- Isso foi justificado pelas constantes rebeliões militares e agitações sociais.", "2. Conflito com o Movimento Tenentista", "- Enfrentou diversas revoltas tenentistas, como:", "- A Revolta do Forte de Copacabana (1922).", "- A Revolta Paulista de 1924 – grande levante militar em São Paulo, com intensa repressão.", "- A Coluna Prestes (1925–1927) – marcha de militares rebeldes por vários estados do país, criticando a corrupção e o sistema político vigente.", "3. Política Econômica Conservadora", "- Aderiu a uma política de austeridade, priorizando o pagamento da dívida externa.", "- Não atendeu às demandas de modernização ou reforma social.", "4. Repressão Política", "- Forte repressão a opositores, incluindo:", "- Prisão ou exílio de líderes tenentistas.", "- Censura a jornais e perseguição a movimentos sindicais.", "⸻", "Resumo do Governo Área", "Características", "Política", "Autoritária, baseada em estado de sítio", "Relação com o Exército", "Conflituosa, marcada por revoltas militares", "Economia", "Conservadora, com foco em controle de gastos e pagamento da dívida externa", "Sociedade", "Repressão a grevistas e Declínio das Oligarquias", "- O governo de Bernardes acentuou a crise do sistema oligárquico.", "- O ciclo de repressão e revoltas mostrou que o modelo estava esgotado.", "- As alianças políticas tradicionais (café com leite) estavam enfraquecidas.", "- O próximo presidente, Washington Luís (1926–1930), seria o último da República Velha, encerrada pela Revolução de 1930.", "⸻"]}, {"title": "Conclusão", "body": ["- O governo de Artur Bernardes representa o início do fim da República Oligárquica.", "- A violência política, o autoritarismo e os conflitos militares mostraram que o país precisava de mudanças.", "- A Revolução de 1930, quatro anos após o fim de seu mandato, foi consequência direta dessas tensões acumuladas.", "Prof. Marcelo Oliveira  História Geral.", "Presidência de Washington Luís (1926–1930) “A ordem é a base do progresso”", "⸻", "Quem foi Washington Luís?", "- Político paulista, ex-governador de São Paulo e ex-ministro da Justiça.", "- Último presidente da República Velha (ou República Oligárquica).", "- Seu lema de governo: “Governar é abrir estradas” – indicando a prioridade dada à infraestrutura, especialmente rodovias.", "⸻", "Principais Acontecimentos do Governo", "1. Modernização e Infraestrutura", "- Investimentos em rodovias, priorizando o transporte por automóveis, especialmente no Sudeste.", "- Iniciativas para modernizar a administração pública.", "- Estímulo à economia urbana e industrial incipiente.", "⸻", "2. Economia e Crise", "- Manteve a política econômica liberal e conservadora.", "- Crise do café: superprodução levou à queda dos preços internacionais.", "- Em 1929, a Grande Depressão nos EUA agravou a crise econômica no Brasil:", "- Redução drástica das exportações.", "- Desemprego e instabilidade social.", "⸻", "3. Fim da Política do Café com Leite", "- Washington Luís rompeu com a alternância de poder entre São Paulo (café) e Minas Gerais (leite).", "- Indicou Júlio Prestes (SP) como seu sucessor, quebrando o acordo com os mineiros.", "- Isso gerou a formação da Aliança Liberal, unindo Minas Gerais, Rio Grande do Sul e Paraíba, que lançou a candidatura de Getúlio Vargas.", "⸻", "4. Tensões Políticas e Queda", "- As eleições de 1930 foram vencidas por Júlio Prestes, mas sob fortes denúncias de fraude.", "- Em outubro de 1930, ocorre a Revolução de 1930, liderada por Getúlio Vargas e militares descontentes.", "- Washington Luís é deposto antes do fim do mandato, por um movimento militar.", "⸻", "Resumo Esquemático do Tema", "Destaques", "Infraestrutura", "Construção de rodovias (“abrir estradas”)", "Economia", "Crise do café + impacto da Grande Depressão", "Política", "Ruptura com Minas e crise do sistema oligárquico", "Queda do governo", "Revolução de 1930, deposição por militares", "Importância Histórica", "- Washington Luís foi o último presidente da República Velha.", "- Seu governo marcou o colapso final das oligarquias rurais no poder.", "- A Revolução de 1930 inaugura a Era Vargas e uma nova fase da história republicana brasileira.", "Prof. Marcelo Oliveira  História Geral.", "Revolução de 1930", "Quando aconteceu?", "• Outubro de 1930", "O que foi?", "A Revolução de 1930 foi um movimento político e militar que derrubou o presidente Washington Luís, impediu a posse do presidente eleito Júlio Prestes e colocou Getúlio Vargas no poder, dando fim à República Velha (1889–1930).", "⸻", "Causas da Revolução", "1. Crise do modelo oligárquico", "• A Política do Café com Leite (revezamento de poder entre SP e MG) foi rompida por Washington Luís ao indicar Júlio Prestes (SP) como seu sucessor, excluindo Minas Gerais.", "2. Fraude eleitoral", "• As eleições de 1930 foram vencidas por Júlio Prestes, mas com fortes denúncias de fraude.", "3. Assassinato de João Pessoa", "- João Pessoa, vice de Vargas na chapa da Aliança Liberal, foi assassinado em julho de 1930.", "- Sua morte foi usada como símbolo da injustiça e da violência do governo oligárquico.", "4. Crise econômica", "- A Grande Depressão de 1929 derrubou o preço do café, base da economia brasileira.", "- Isso afetou produtores, exportadores e aumentou o descontentamento popular.", "⸻"]}, {"title": "Desenvolvimento da Revolução", "body": ["- Em 3 de outubro de 1930, tropas ligadas à Aliança Liberal (RS, MG e PB) iniciaram um movimento armado contra o governo. • As tropas marcharam rumo ao Rio de Janeiro.", "- Em 24 de outubro, Washington Luís foi deposto por militares, antes mesmo da chegada das forças revolucionárias.", "- O poder foi entregue a uma Junta Militar, que logo passou o governo a Getúlio Vargas. ⸻", "Consequências da Revolução de 1930", "FIM da República Velha", "- Derrubada da elite agrária que dominava o poder desde 1889."]}, {"title": "INÍCIO da Era Vargas", "body": ["- Vargas assume como chefe do Governo Provisório e dá início a profundas mudanças políticas, sociais e econômicas.", "Mudança no perfil do poder", "- O poder começa a se concentrar no Executivo nacional.", "- A participação das Forças Armadas como ator político se consolida.", "⸻", "Resumo Esquemático:", "Elemento", "Descrição", "Ano", "1930", "Presidente deposto", "Washington Luís", "Presidente eleito impedido de tomar posse", "Júlio Prestes", "Novo líder", "Getúlio Vargas", "Motivos principais", "Crise política, econômica, fraude eleitoral e assassinato de João Pessoa", "Consequência principal", "Fim da República Velha e início da Era Vargas", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "ERA VARGAS (1930–1945)", "body": ["“Trabalhismo, autoritarismo e centralização do poder”", "⸻", "Divisão da Era Período", "Nome", "Características principais", "1930–1934", "Governo Provisório", "Vargas governa sem Constituição", "1934–1937", "Governo Constitucional", "Constituição de 1934; tenta legitimar o poder", "1937–1945", "Estado Novo", "Regime ditatorial, inspirado no Contexto da Chegada ao Poder (1930)", "- Vargas assume após a Revolução de 1930, pondo fim à República Velha.", "- Promete modernizar o Brasil, romper com o domínio das oligarquias e defender os trabalhadores.", "⸻", "Governo Provisório (1930–1934) Principais ações:", "- Fechamento do Congresso Nacional.", "- Interventores nomeados nos estados, no lugar dos antigos governadores.", "- Centralização do poder no Executivo.", "- Criação de ministérios ligados à indústria e ao trabalho.", "⸻", "Governo Constitucional (1934–1937)", "- Promulgada a Constituição de 1934:", "- Voto secreto e feminino.", "- Leis trabalhistas na Constituição.", "- Defesa da ordem econômica e social.", "- Vargas é eleito indiretamente pelo Congresso.", "Tensões:", "- Conflito entre grupos de extrema-direita (AIB) e esquerda (ANL).", "- Medo do comunismo, amplificado pela tentativa de revolta da Intentona Comunista (1935).", "⸻", "Estado Novo (1937–1945) – Regime Ditatorial Como começou?", "- Vargas dá um golpe de Estado com o pretexto de combater o comunismo, usando o Plano Cohen (documento falso).", "Características do Estado Novo:", "- Fechamento do Congresso Nacional.", "- Censura à imprensa e perseguição política.", "- Criação de órgãos de propaganda e vigilância (DIP e DOPS).", "- Nova Constituição (1937), conhecida como “Polaca”, inspirada nas ditaduras europeias.", "⸻", "Principais Medidas e Políticas da Era Vargas", "1. Trabalhismo", "- Criação da CLT – Consolidação das Leis do Trabalho (1943).", "- Criação da Carteira de Trabalho, salário mínimo, jornada de 8h.", "- Vargas se apresenta como o “pai dos pobres”.", "2. Industrialização", "- Fomento à indústria de base:", "- Companhia Siderúrgica Nacional (CSN)", "- Vale do Rio Doce", "- Criação do Banco Nacional de Desenvolvimento (BNDE) (já no pós-45)", "- Redução da dependência do café.", "3. Política Externa", "- No início, Vargas tentou equilibrar relações com Alemanha e EUA.", "- Durante a Segunda Guerra Mundial, o Brasil entrou ao lado dos Aliados (1942).", "- Enviou tropas: Força Expedicionária Brasileira (FEB) lutou na Itália.", "⸻", "Fim da Era Vargas (1945)", "- Pressões internas e externas por redemocratização.", "- Com o fim da Segunda Guerra Mundial, ditaduras perderam apoio.", "- Vargas é derrubado pelos militares em 1945.", "- Mesmo fora do poder, elege o sucessor (Eurico Gaspar Dutra) e volta à presidência em 1951.", "⸻", "Resumo Tema Destaques", "Trabalhismo", "CLT, direitos trabalhistas, sindicalismo atrelado ao Estado", "Autoritarismo", "Estado Novo, censura, repressão política", "Economia", "Industrialização, empresas estatais", "Política", "Centralização, populismo, fim da República Velha", "Conclusão", "A Era Vargas foi um período de transformações profundas no Brasil:", "- Fortalecimento do Estado.", "- Consolidação de direitos trabalhistas.", "- Industrialização e modernização econômica.", "- Ao mesmo tempo, houve autoritarismo, censura e repressão política.", "Prof. Marcelo Oliveira  História Geral.", "Revolução Constitucionalista de 1932", "Quando?", "- De julho a outubro de 1932", "Onde?", "- Principalmente no estado de São Paulo, contra o governo de Getúlio Vargas.", "⸻", "O que foi a Revolução de 1932?", "Foi um movimento armado liderado por São Paulo, exigindo:", "- A criação de uma nova Constituição.", "- A volta da legalidade democrática, após o golpe de 1930.", "- Mais autonomia para os estados, especialmente São Paulo.", "⸻", "Contexto histórico", "- 1930: Getúlio Vargas chega ao poder com a Revolução de 1930.", "- 1930–1932: Governo provisório sem Constituição nem Congresso.", "- São Paulo perde poder político com a queda da oligarquia cafeeira.", "- Cresce o descontentamento das elites paulistas e setores da população.", "⸻", "Causas da Revolução", "1. Centralização do poder por Vargas", "• Nomeação de interventores federais (não paulistas) nos estados.", "2. Ausência de Constituição", "• Vargas governava por decretos, sem Parlamento.", "3. Insatisfação paulista", "- Perda de influência política e econômica.", "- Clamor por autonomia e por respeito à legalidade.", "⸻", "Como foi a Revolução?", "- Em 9 de julho de 1932, tropas paulistas se levantam contra o governo federal.", "- Objetivo: forçar Vargas a convocar uma Assembleia Constituinte.", "- Mais de 35 mil homens foram mobilizados em São Paulo.", "- Os combatentes ficaram conhecidos como os “heróis de 32”.", "⸻"]}, {"title": "MMDC – Símbolo do movimento", "body": ["- Martins, Miragaia, Dráusio e Camargo: jovens mortos em confronto com tropas federais antes do levante armado.", "- Tornaram-se mártires e símbolo da resistência.", "⸻", "Desfecho da Revolução", "- Duração: cerca de 3 meses.", "- As forças paulistas foram derrotadas militarmente.", "- Porém, politicamente, o movimento teve sucesso parcial:", "- Vargas convocou uma Assembleia Constituinte em 1933.", "- Em 1934, foi promulgada uma nova Constituição democrática.", "⸻", "Resumo Esquemático:", "Tema", "Destaque", "Ano", "1932", "Local principal", "São Paulo", "Contra quem", "Governo provisório de Getúlio Vargas", "Motivações", "Nova Constituição e autonomia estadual", "Resultado militar", "Derrota de São Paulo"]}, {"title": "Resultado político", "body": ["Convocação da Assembleia Constituinte (1933) Importância histórica • A Revolução de 1932 é considerada a maior guerra civil brasileira do século XX.", "- É símbolo da luta pela democracia e pelo Estado de Direito.", "- Marca a entrada de São Paulo como um forte centro político-militar na história nacional. Prof. Marcelo Oliveira  História Geral.", "1. Isolamento Político de São Paulo (1930–1932)", "No contexto da Era Vargas e da Revolução de 1932, o “isolamento” costuma se referir ao:", "- Isolamento político de São Paulo após a Revolução de 1930.", "- O estado perdeu seu antigo domínio político (da oligarquia cafeeira).", "- Durante a Revolução Constitucionalista, São Paulo lutou praticamente sozinho contra as forças do governo federal.", "- Embora esperasse apoio de outros estados, São Paulo ficou isolado militar e politicamente.", "⸻", "2. Isolamento Internacional (durante o Estado Novo ou a Segunda Guerra) No período do Estado Novo (1937–1945), o termo pode indicar:", "- Uma política externa inicial de equilíbrio entre EUA e Alemanha, que depois se volta aos Aliados na Segunda Guerra.", "- Ou um momento de autossuficiência econômica e industrialização, com menor dependência externa.", "⸻", "3. Isolamento Social (contextos diversos)", "- Durante crises sanitárias, guerras ou ditaduras, o termo “isolamento” pode também ser usado para se referir a restrições à liberdade de expressão, censura, repressão, ou controle social.", "⸻", "Se você estiver se referindo a um tema específico, como:", "- Isolamento de São Paulo em 1932", "- Isolamento do Brasil nas relações exteriores", "- Isolamento de Vargas no fim de seu governo", "- Isolamento político de um grupo ou classe social.", "Prof. Marcelo Oliveira  História Geral.", "O temor do separatismo (1932)"]}, {"title": "Contexto histórico", "body": ["- Após a Revolução de 1930, Getúlio Vargas assume o poder e quebra a hegemonia das oligarquias estaduais, especialmente a paulista.", "- São Paulo, que havia dominado a política na República Velha, perde espaço no novo governo.", "- A nomeação de interventores “estrangeiros” (não paulistas) e a ausência de uma nova Constituição aumentaram a insatisfação.", "⸻"]}, {"title": "Revolução Constitucionalista de 1932", "body": ["- São Paulo se levanta em armas contra o governo de Vargas exigindo uma nova Constituição.", "- Apesar de ser um movimento legalista, houve um forte temor no restante do país de que São Paulo pretendia se separar do Brasil.", "⸻", "Por que houve temor de separatismo?", "1. Força econômica de São Paulo", "• Maior estado exportador (café), industrial e financeiramente forte.", "2. Mobilização militar independente", "• São Paulo criou exércitos próprios, organizou fábricas de armas e munições e atuou como se fosse um estado soberano.", "3. Símbolos regionalistas", "• Bandeiras, hinos, selos, jornais e discursos exaltavam o orgulho paulista, o que parecia separatismo aos olhos do governo federal.", "4. Isolamento político", "- São Paulo esperava apoio de outros estados, mas isso não aconteceu.", "- O fato de lutar sozinho contra o governo central reforçou a imagem de um movimento separatista, mesmo sem essa intenção oficial.", "⸻"]}, {"title": "A resposta do governo Vargas", "body": ["- O governo federal usou a ameaça de separatismo como justificativa para reprimir o movimento com força militar.", "- Propaganda oficial rotulava os revolucionários paulistas como “traidores da pátria” ou “divisores do Brasil”.", "⸻", "Resumo Elemento", "Explicação", "Causa do temor", "Força econômica, militar e propaganda paulista", "Não era objetivo oficial", "O movimento pedia uma nova Constituição, não a independência", "Consequência", "Isolamento político e repressão intensa por parte do governo federal", "Uso político do medo", "Vargas usou o discurso do separatismo para legitimar o uso da força"]}, {"title": "Conclusão", "body": ["Apesar de não ser separatista oficialmente, a Revolução de 1932 gerou forte temor de que São Paulo quisesse se separar do Brasil. Esse temor foi explorado pelo governo Vargas para justificar a repressão e manter a centralização do poder.", "Prof. Marcelo Oliveira  História Geral.", "O “Revanchismo” Oligárquico"]}, {"title": "Definição", "body": ["O termo “revanchismo oligárquico” refere-se ao desejo de revanche (vingança) por parte das antigas elites políticas — principalmente a oligarquia paulista — que perderam o poder com a Revolução de 1930.", "⸻"]}, {"title": "Contexto Histórico", "body": ["- Até 1930, o Brasil era governado pelas oligarquias rurais, especialmente de São Paulo e Minas Gerais, na chamada Política do Café com Leite.", "- A Revolução de 1930, liderada por Getúlio Vargas, derruba essa estrutura, encerra a República Velha e inicia um governo centralizado.", "- São Paulo, o estado mais poderoso economicamente, perde grande parte de sua influência política.", "⸻"]}, {"title": "O revanchismo na prática: Revolução de 1932", "body": ["A Revolução Constitucionalista de 1932 é o momento em que o “revanchismo oligárquico” se manifesta com mais força:", "Motivações do revanchismo:", "- Retomar o protagonismo político perdido em 1930.", "- Reagir à centralização do poder nas mãos de Vargas.", "- Defender a nomeação de paulistas para cargos políticos locais (contra os interventores federais).", "- Lutar por uma nova Constituição, mas também por reconquistar a posição de comando que São Paulo tinha na República Velha.", "⸻"]}, {"title": "Revanchismo disfarçado de legalismo", "body": ["Embora o discurso oficial do movimento de 1932 fosse a “defesa da legalidade e da Constituição”, muitos historiadores apontam que havia por trás:", "- Um projeto de restauração da elite cafeeira no poder.", "- A tentativa de recolocar São Paulo no centro do governo federal.", "Por isso, o movimento também é interpretado como uma tentativa frustrada da oligarquia de retomar o poder — o chamado revanchismo oligárquico.", "⸻", "Resumo Esquemático: Tema", "Explicação", "O que é revanchismo?", "Vontade de revanche (vingança política) Quem o protagonizou?", "Elites paulistas, especialmente os cafeicultores Por que surgiu?", "Perda de poder após a Revolução de 1930 Quando se manifestou?", "Principalmente durante a Revolução de 1932", "Objetivo oculto"]}, {"title": "Retomar a influência perdida com o fim da República Velha Conclusão", "body": ["O revanchismo oligárquico foi uma reação das antigas elites, especialmente de São Paulo, contra as mudanças políticas promovidas por Vargas. Apesar de revestido de legalismo e patriotismo, o movimento de 1932 carregava o desejo de restaurar a antiga ordem política dominada pelas oligarquias.", "Prof. Marcelo Oliveira  História Geral.", "Polarização Ideológica no Brasil (anos 1930)"]}, {"title": "Contexto histórico", "body": ["- O Brasil vivia um período de instabilidade política e crise econômica após a Revolução de 1930.", "- O mundo estava marcado por regimes autoritários, como o fascismo na Itália, o nazismo na Alemanha e o comunismo na União Soviética.", "- Essas influências chegaram ao Brasil e alimentaram dois grandes movimentos ideológicos opostos, que dividiram a sociedade:", "⸻", "1. AIB – Ação Integralista Brasileira (extrema-direita) Características", "Descrição", "Fundador", "Plínio Salgado", "Ideologia", "Fascismo, nacionalismo autoritário", "Símbolos", "Camisas verdes, saudação com braço estendido", "Objetivos", "Combater o comunismo, defender a ordem, a religião e a nação", "Apoio", "Camadas médias urbanas, setores conservadores, militares", "2. ANL – Aliança Nacional Libertadora (esquerda) Características", "Descrição", "Liderança", "Luiz Carlos Prestes", "Ideologia", "Socialismo, antifascismo, reforma agrária", "Símbolos", "Estrela vermelha, hino da Internacional", "Objetivos", "Derrubar o governo Vargas, impedir o fascismo, promover justiça social", "Apoio", "Trabalhadores urbanos, intelectuais, comunistas Conflitos e Consequências da", "Polarização", "Tentativa de golpe da ANL: Intentona Comunista (1935)", "- Revolta militar fracassada liderada por Prestes.", "- Vargas usou como justificativa para reprimir a esquerda e reforçar o autoritarismo.", "Resposta à ameaça comunista: aproximação com os integralistas", "- Vargas tolerou (e até incentivou) os integralistas durante um tempo.", "- Mais tarde, rompeu com eles também, temendo perder o controle."]}, {"title": "Consequência final: o golpe do Estado Novo (1937)", "body": ["- Vargas fechou o Congresso, cancelou as eleições e implantou uma ditadura alegando que o país estava em risco devido à polarização ideológica.", "- O suposto “Plano Cohen” (um plano comunista falso) foi o estopim usado para justificar o golpe.", "⸻", "Resumo Esquemático Elemento", "Direita (AIB)", "Esquerda (ANL)", "Ideologia", "Fascista", "Comunista/Socialista", "Líder", "Plínio Salgado", "Luiz Carlos Prestes", "Símbolos", "Camisa verde, sigma (∑)", "Estrela vermelha", "Objetivos", "Ordem, nação, religião", "Reforma social, contra fascismo", "Reação de Vargas"]}, {"title": "Usou contra a esquerda, depois reprimiu ambos Conclusão", "body": ["A polarização ideológica dos anos 1930 refletia as disputas globais entre fascismo e comunismo. No Brasil, ela contribuiu para o crescimento do autoritarismo, servindo de pretexto para Vargas consolidar o poder com o Estado Novo em 1937.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A Intentona Comunista de 1935 – Quando a revolução bateu à porta", "body": ["Era o ano de 1935, e o Brasil vivia tempos de medo e tensão. O presidente Getúlio Vargas ainda governava de forma provisória, após a Revolução de 1930, e o país estava mergulhado em disputas políticas intensas.", "De um lado, grupos conservadores e autoritários sonhavam com uma nação forte, centralizada e sem espaço para o comunismo. De outro, trabalhadores, militares descontentes e comunistas, inspirados na Revolução Russa de 1917, queriam mudar o Brasil de cima a baixo.", "No meio desse cenário turbulento, surgiu a ANL – Aliança Nacional Libertadora. Era um grupo que reunia comunistas, socialistas, militares e intelectuais que queriam combater o avanço do fascismo e defender os direitos do povo. Seu líder mais famoso era Luiz Carlos Prestes, um ex-tenente que havia ganhado fama na Coluna Prestes e agora acreditava na revolução comunista.", "A ANL cresceu rápido. Em pouco tempo, reuniu milhares de apoiadores. Mas Vargas ficou preocupado. Acusou o grupo de ser uma ameaça à ordem e mandou fechar a ANL.", "Foi então que, em segredo, alguns militares ligados à ANL começaram a planejar uma revolta armada. A ideia era simples e ousada: derrubar o governo de Vargas e iniciar uma revolução popular.", "E então, na madrugada do dia 23 de novembro de 1935, os primeiros tiros ecoaram. Soldados e sargentos se rebelaram em Natal, Recife e depois no Rio de Janeiro, que era a capital do Brasil na época. Por alguns dias, chegaram a tomar o controle de prédios públicos e a distribuir armas à população.", "Mas o movimento foi mal coordenado, sem apoio popular e rapidamente esmagado pelas forças do governo. Em poucos dias, os revoltosos foram derrotados. A repressão foi dura. Milhares de pessoas foram presas, torturadas ou exiladas. Entre elas, Luiz Carlos Prestes e até sua esposa, Olga Benário, que foi entregue à Alemanha nazista grávida, como parte de um acordo político.", "Mesmo fracassada, a Intentona Comunista deixou marcas profundas. Vargas usou o medo da revolução como argumento para aumentar sua autoridade. Dois anos depois, com o pretexto de proteger o país do “perigo vermelho”, ele deu um golpe e instaurou a ditadura do Estado Novo em 1937.", "A Intentona mostrou como, em momentos de crise, ideias opostas podem se transformar em conflito. E como, muitas vezes, o medo pode ser usado como justificativa para limitar a liberdade.", "⸻", "Mensagem final para os alunos", "A Intentona Comunista é mais do que uma tentativa de revolta: é uma janela para entender os conflitos ideológicos do século XX, os perigos do autoritarismo e a importância da democracia e do diálogo político.", "⸻", "Se quiser, posso agora:", "- Adaptar esse texto para slides com imagens", "- Criar uma versão narrada com trilha para videoaula", "- Produzir um quiz ou atividade interativa sobre o tema.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "Estado Novo – A Ditadura de Getúlio Vargas", "body": ["Em 1937, o Brasil virou a página para um novo capítulo da sua história — um capítulo sem eleições, sem partidos e sem liberdade de expressão. Esse período ficou conhecido como o Estado Novo, e foi uma ditadura liderada por Getúlio Vargas.", "Mas como chegamos até lá?", "O país vinha de um clima de tensão e medo. Desde a Revolução de 1930, Vargas governava com poderes ampliados, prometendo modernizar o Brasil. Porém, a instabilidade crescia. Grupos de esquerda, como a Aliança Nacional Libertadora (ANL), queriam mudar o sistema. A Intentona Comunista de 1935 foi a gota d’água. Vargas usou esse episódio para dizer que o Brasil estava em perigo.", "Então, surgiu um documento falso, chamado Plano Cohen, que supostamente revelava uma grande conspiração comunista para tomar o poder. Era tudo mentira — mas funcionou. Com apoio de setores das Forças Armadas e das elites, Vargas deu um golpe de Estado em 10 de novembro de 1937, cancelou as eleições presidenciais e instaurou uma nova Constituição autoritária, que ele mesmo escreveu.", "Estava criado o Estado Novo.", "⸻", "Como era o Brasil no Estado Novo?", "- Ditadura pessoal de Vargas: ele concentrava todos os poderes — legislativo, executivo e judiciário.", "- Censura à imprensa: jornais, rádios e revistas só podiam divulgar o que o governo permitia.", "- Fim dos partidos políticos: todos foram fechados. A oposição foi calada.", "- Repressão política: presos, exilados e perseguições contra comunistas, integralistas e qualquer crítico do governo.", "- Controle da propaganda: foi criado o Departamento de Imprensa e Propaganda (DIP), que divulgava uma imagem de Vargas como “pai dos pobres”.", "⸻", "Mas nem tudo foi repressão…", "Durante o Estado Novo, o Brasil se modernizou bastante:", "- Foram criadas leis trabalhistas, como a CLT (Consolidação das Leis do Trabalho).", "- Houve incentivo à industrialização e à infraestrutura, com a criação da Companhia Siderúrgica Nacional.", "- O governo buscava construir a imagem de uma nação forte, moderna e unida — mesmo à custa da liberdade.", "⸻", "O Estado Novo e a Segunda Guerra Mundial", "No início da guerra, Vargas tentou manter o Brasil neutro. Mas em 1942, após navios brasileiros serem afundados por submarinos alemães, o país entrou na guerra ao lado dos Aliados.", "A contradição era evidente: o Brasil lutava contra o fascismo na Europa, mas vivia uma ditadura no próprio território.", "⸻", "Fim do Estado Novo", "Com o fim da Segunda Guerra em 1945, a pressão por democracia cresceu. O povo queria eleições, liberdade e o fim da repressão. Os próprios militares, que antes apoiavam Vargas, agora temiam que ele não largasse o poder.", "Então, em outubro de 1945, Vargas foi deposto pelas Forças Armadas. O Estado Novo chegava ao fim — mas Getúlio ainda voltaria, mais tarde, pelo voto popular.", "⸻", "Resumo em tópicos", "- Período: 1937–1945", "- Líder: Getúlio Vargas", "- Características: Ditadura, censura, repressão política", "- Avanços: Leis trabalhistas, industrialização", "- Guerra: Brasil entrou na Segunda Guerra Mundial ao lado dos Aliados", "- Fim: Vargas deposto em 1945", "⸻", "Mensagem final para os alunos", "O Estado Novo mostra como um governo pode usar o medo, a propaganda e o controle das informações para se manter no poder. E também como as liberdades democráticas são frágeis, mas essenciais.", "Prof. Marcelo Oliveira  História Geral.", "A Legalidade Institucional: Constituição e Congresso – Aparência de Democracia, Prática de Autoritarismo", "O que é legalidade institucional?", "Legalidade institucional é a manutenção das estruturas legais e formais do Estado, como a existência de:", "- Uma Constituição (a lei maior do país)", "- Um Congresso Nacional (Poder Legislativo)", "- Tribunais e instituições públicas que aparentam garantir direitos e separação de poderes", "Mesmo em regimes autoritários, muitas vezes essas estruturas são mantidas no papel — para dar uma aparência de legalidade e legitimidade, mesmo que na prática não funcionem como deveriam.", "⸻", "Exemplo: Brasil no Estado Novo (1937–1945)", "- Vargas implantou o Estado Novo com base em uma nova Constituição autoritária, conhecida como a “Polaca” (inspirada na Constituição fascista da Polônia).", "- A nova Constituição dava poderes totais a Vargas:", "- Fechou o Congresso Nacional", "- Proibiu partidos políticos", "- Permitiu que o presidente governasse por decretos-leis", "- Ainda assim, o regime se apresentava como “legal” porque havia uma Constituição escrita e uma estrutura burocrática funcional.", "Ou seja: tudo parecia legal, mas o sistema era autoritário.", "⸻", "Por que manter essa aparência?", "- Para evitar críticas internacionais, especialmente durante a Segunda Guerra Mundial, quando o Brasil se aliou às democracias contra o nazifascismo.", "- Para controlar a oposição interna com base em leis “legítimas”.", "- Para garantir que o poder fosse centralizado, mas sem parecer um golpe permanente.", "⸻", "Conclusão", "A legalidade institucional nem sempre garante democracia. Um país pode ter uma Constituição e instituições funcionando, mas se não houver liberdade política, separação de poderes e respeito aos direitos civis, o sistema é apenas uma fachada para o autoritarismo. Termo", "Significado", "Constituição", "Conjunto de leis que organiza o Estado", "Congresso Nacional", "Poder Legislativo (Câmara + Senado)", "Legalidade institucional", "Existência formal das leis e instituições", "Problema", "Pode ser usada para legitimar ditaduras que mantêm “as formas”, mas suprimem as liberdades.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "O “Putsch” Integralista – A tentativa de golpe contra Vargas", "body": ["Era o ano de 1938. Getúlio Vargas estava no poder como ditador desde 1937, depois de fechar o Congresso e cancelar as eleições com o golpe do Estado Novo.", "Mas nem todos aceitaram esse novo regime em silêncio. Um dos grupos mais barulhentos e insatisfeitos eram os integralistas — uma organização inspirada no fascismo europeu, que defendia um governo autoritário, nacionalista, católico e anticomunista.", "Quem eram os integralistas?", "- Vestiam camisas verdes e usavam como símbolo a letra grega ∑ (sigma).", "- Seu líder era Plínio Salgado, um intelectual e político que fundou a AIB – Ação Integralista Brasileira.", "- Eles apoiaram Vargas por um tempo, achando que teriam espaço no novo governo.", "Mas quando o Estado Novo começou, Vargas os excluiu do poder. Ele proibiu todos os partidos, inclusive a AIB, e rejeitou a influência integralista.", "⸻", "A traição e a revolta", "Os integralistas se sentiram traídos. Então, começaram a planejar um golpe para tomar o poder. Esse plano ficou conhecido como o “Putsch Integralista” — uma palavra de origem alemã que significa “golpe armado”, como o que Hitler tentou na Alemanha em 1923.", "Na madrugada de 11 de maio de 1938, um grupo de integralistas armados tentou invadir o Palácio Guanabara, no Rio de Janeiro, onde Vargas morava com sua família. A ideia era prendê-lo ou matá-lo, e iniciar uma revolução para instalar um governo integralista.", "Mas o plano fracassou totalmente.", "- O palácio estava protegido.", "- Vargas conseguiu escapar do ataque ileso.", "- Em poucas horas, os golpistas foram presos, mortos ou fugiram.", "- O próprio Plínio Salgado foi preso e depois exilado.", "⸻", "O que o Putsch Integralista revela?", "- Que mesmo os grupos de extrema-direita que apoiaram Vargas, como os integralistas, foram traídos e reprimidos.", "- Que o Estado Novo não tolerava oposição — nem da esquerda, nem da direita.", "- Que o Brasil vivia um momento de polarização ideológica violenta, semelhante ao que acontecia na Europa dos anos 1930.", "⸻", "Resumo para revisar: Tema", "Detalhes", "Data", "11 de maio de 1938", "Grupo golpista", "Integralistas (AIB)", "Líder", "Plínio Salgado", "Objetivo", "Tomar o poder de Vargas", "Resultado", "Fracasso total, repressão e fim da AIB Tema", "Detalhes", "Data", "11 de maio de 1938", "Grupo golpista", "Integralistas (AIB)", "Líder", "Plínio Salgado", "Objetivo", "Tomar o poder de Vargas", "Resultado", "Fracasso total, repressão e fim da AIB", "Significado", "Mostra a intolerância do Estado Novo com qualquer oposição Mensagem final para os alunos:", "O Putsch Integralista é um exemplo claro de como regimes autoritários usam e depois descartam aliados. Ele mostra que, quando a democracia é enfraquecida, todos podem ser vítimas do poder absoluto — até os que antes o apoiavam.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "O Brasil na Segunda Guerra Mundial – Quando o país foi à guerra", "body": ["Durante os primeiros anos da Segunda Guerra Mundial, o Brasil tentou ficar de fora do conflito. O presidente Getúlio Vargas, no comando desde 1930, buscava uma posição de neutralidade estratégica — negociava com os dois lados: os Aliados (como Estados Unidos e Inglaterra) e o Eixo (Alemanha, Itália e Japão).", "Mas o mundo estava mudando rápido, e o Brasil não ficaria neutro por muito tempo.", "⸻", "O motivo da entrada do Brasil na guerra", "Entre 1942 e 1943, navios mercantes brasileiros começaram a ser atacados e afundados por submarinos alemães no Oceano Atlântico. Centenas de civis morreram — e isso causou revolta popular.", "Sob forte pressão da população e também dos Estados Unidos (que queriam usar o Brasil como base militar estratégica), Vargas rompeu relações com o Eixo e, em 22 de agosto de 1942, declarou guerra à Alemanha e à Itália.", "⸻", "A Força Expedicionária Brasileira (FEB)", "O Brasil não apenas declarou guerra. Ele também mandou soldados para lutar na Europa, o que foi algo inédito na nossa história.", "- Foi criada a FEB – Força Expedicionária Brasileira, com cerca de 25 mil soldados enviados à Itália em 1944.", "- Eles ficaram conhecidos como os “pracinhas” — soldados simples, vindos de todas as partes do Brasil.", "- A FEB participou de importantes batalhas contra o exército nazista, como:", "- A Tomada de Monte Castelo", "- A Libertação de cidades italianas como Fornovo e Collecchio", "Apesar do pouco treinamento e do preconceito que enfrentaram, os pracinhas mostraram coragem e bravura.", "⸻", "Curiosidade:", "Os soldados brasileiros usavam o lema:", "“A cobra vai fumar!”", "— uma resposta irônica àqueles que diziam que o Brasil só entraria na guerra “quando a cobra fumasse” (ou seja, nunca).", "No final, a cobra fumou mesmo.", "⸻", "Consequências da guerra para o Brasil", "- O Brasil saiu da guerra muito mais próximo dos Estados Unidos e com maior prestígio internacional.", "- Os soldados que lutaram na Europa voltaram pedindo mais direitos e democracia.", "- A contradição era clara: lutamos contra o fascismo na Europa, mas vivíamos uma ditadura no Brasil (o Estado Novo de Vargas).", "- Isso fortaleceu o movimento que, em 1945, levou à queda de Getúlio Vargas e à redemocratização do país.", "⸻", "Resumo em tópicos: Entrada na guerra", "1942, após ataques de submarinos alemães", "Lado escolhido", "Aliados (EUA, Reino Unido, URSS)", "Participação militar", "Força Expedicionária Brasileira (FEB), 25 mil soldados", "Local de combate", "Itália", "Importância", "Único país da América Latina a enviar tropas para a Europa", "Consequências", "Fortalecimento do Exército, queda de Vargas, avanço da democracia Mensagem final para os alunos:", "O Brasil na Segunda Guerra mostrou que, mesmo um país distante, pode ser arrastado por eventos globais. E que a luta contra o autoritarismo não acontece só lá fora — ela também deve acontecer dentro de casa.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A Redemocratização – O Fim do Estado Novo e o Retorno da Democracia (1945)", "body": ["Imagine um país que, por quase uma década, viveu sob uma ditadura. Jornais censurados, partidos proibidos, o povo sem direito ao voto… Esse era o Brasil durante o Estado Novo, o regime autoritário de Getúlio Vargas entre 1937 e 1945.", "Mas tudo começou a mudar com a Segunda Guerra Mundial.", "⸻", "A guerra e a contradição", "O Brasil lutou ao lado dos Aliados, enviou soldados da FEB à Itália e combateu o nazifascismo na Europa.", "Só que havia uma grande contradição: enquanto combatíamos ditaduras lá fora, vivíamos uma ditadura aqui dentro. Isso fez muita gente — militares, estudantes, trabalhadores e políticos — começar a pressionar pelo retorno da democracia.", "⸻", "A pressão pelo fim do Estado Novo", "Nos jornais, nos quartéis e nas ruas, crescia o grito por eleições, liberdade e direitos civis.", "Surgiram novos partidos políticos e movimentos civis exigindo o fim do regime.", "Entre eles:", "- UDN (União Democrática Nacional) – oposição liberal ao varguismo", "- PTB (Partido Trabalhista Brasileiro) – ligado a Vargas e aos trabalhadores", "- PSD (Partido Social Democrático) – partido moderado, com apoio de elites regionais", "Enquanto isso, Vargas tentava se manter no poder, lançando até a candidatura de seu irmão como sucessor e prometendo mais reformas trabalhistas. Mas o povo e o Exército já não confiavam mais.", "⸻", "A queda de Vargas", "Em 29 de outubro de 1945, Getúlio Vargas foi deposto pelos militares, encerrando o Estado Novo sem resistência.", "Mas, ao contrário do que aconteceu em outras ditaduras, não houve guerra civil, nem perseguições em massa. O país seguiu um caminho pacífico e institucional rumo à democracia.", "⸻", "Eleições e nova Constituição", "- Em dezembro de 1945, aconteceram eleições presidenciais.", "- O vencedor foi o general Eurico Gaspar Dutra, que assumiu em 1946.", "- No ano seguinte, foi promulgada a Constituição de 1946, que:", "- Restaurou o poder do Congresso", "- Garantiu direitos civis e políticos", "- Reabriu o país à pluralidade de ideias", "Estava iniciada uma nova fase democrática na história do Brasil, que duraria até o golpe militar de 1964.", "⸻", "Resumo em tópicos: Elemento", "Detalhes", "Período da redemocratização", "1945–1946", "Causa principal", "Contradição entre lutar contra ditaduras na guerra e manter uma no Brasil", "Pressões internas", "População, partidos, militares, imprensa", "Queda de Vargas", "29 de outubro de 1945", "Nova Constituição", "Promulgada em 1946", "Retorno da democracia", "Eleições livres, multipartidarismo, liberdade de imprensa Mensagem final para os alunos:", "A redemocratização de 1945 nos ensina que liberdade e democracia não vêm de graça. Elas precisam ser conquistadas, defendidas e renovadas constantemente — pelo povo, pelas instituições e pela educação política.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "O Governo do Ministro José Linhares (1945–1946)", "body": ["Um governo curto, mas decisivo para a democracia", "Com a queda de Getúlio Vargas em 29 de outubro de 1945, o Brasil precisava de um governo provisório que conduzisse a transição da ditadura do Estado Novo para a redemocratização do país.", "Foi nesse contexto que o Ministro José Linhares, presidente do Supremo Tribunal Federal (STF), assumiu a Presidência da República — conforme previa a Constituição anterior ao golpe de 1937.", "⸻", "Quem foi José Linhares?", "- Cearense, jurista respeitado, José Linhares era o presidente do STF.", "- Não era político profissional, o que conferia a ele um papel neutro e institucional.", "- Assumiu como presidente interino, entre 29 de outubro de 1945 e 31 de janeiro de 1946.", "⸻", "As principais ações do governo José Linhares:", "Organizou as eleições presidenciais e legislativas, realizadas em 2 de dezembro de 1945", "Restabeleceu a Justiça Eleitoral, desmontada pelo Estado Novo", "Reabriu os partidos políticos e garantiu liberdade de imprensa", "Desmontou parte do aparato autoritário montado por Vargas", "Assegurou a transição pacífica para o governo eleito de Eurico Gaspar Dutra", "Seu governo teve como foco a normalização institucional e a estabilidade política até a posse do novo presidente, eleito de forma democrática.", "⸻", "Por que ele foi importante?", "Apesar de governar por apenas três meses, José Linhares teve um papel essencial:", "- Mediou interesses militares e civis num momento delicado.", "- Evitou conflitos e garantiu a legalidade da transição.", "- Seu governo foi símbolo da retomada da ordem constitucional após anos de autoritarismo.", "⸻", "Resumo para revisar: Tópico", "Informação", "Período", "Outubro de 1945 – Janeiro de 1946", "Cargo anterior", "Presidente do Supremo Tribunal Federal (STF)", "Tipo de governo", "Provisório / Transitório", "Principal missão", "Garantir eleições e transição democrática", "Sucessor", "General Eurico Gaspar Dutra Mensagem para os alunos:", "O governo de José Linhares mostra que transições democráticas podem ser pacíficas e institucionais quando há compromisso com as leis, com a justiça e com o bem comum. Mesmo um governo breve pode ter um grande impacto na história.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A República Liberal Populista (1946– 1964)", "body": ["Depois do fim do Estado Novo e da posse de Eurico Gaspar Dutra em 1946, o Brasil entrou em um período chamado de República Liberal Populista. Foi uma fase marcada pela restauração da democracia, com eleições livres, maior participação popular e um crescimento urbano e econômico acelerado.", "⸻", "Democracia e multipartidarismo", "- A Constituição de 1946 retomou os direitos civis, políticos e a liberdade de imprensa.", "- Surgiram e se fortaleceram vários partidos, como:", "- PSD (Partido Social Democrático) — representava as elites rurais e médicas do interior;", "- UDN (União Democrática Nacional) — oposição conservadora;", "- PTB (Partido Trabalhista Brasileiro) — apoiado por Getúlio Vargas e pelos trabalhadores urbanos.", "- As eleições eram realizadas com grande participação, embora o sistema ainda tivesse limitações, como o voto aberto até 1985.", "⸻", "Populismo e líderes carismáticos", "- Essa fase ficou marcada pelo populismo, uma forma de fazer política baseada na conexão direta dos líderes com as massas populares.", "- Getúlio Vargas, após retornar pelo voto em 1951, e depois JK (Juscelino Kubitschek), foram exemplos clássicos de presidentes populistas.", "- Eles buscavam ampliar o acesso a serviços, como saúde e educação, além de investir na industrialização e no crescimento das cidades.", "⸻", "Desenvolvimento e industrialização", "- O governo de Juscelino Kubitschek (1956–1961) é símbolo desse período, com seu plano de metas e a construção de Brasília.", "- Houve um forte crescimento da indústria, energia, transportes e infraestrutura.", "- Esse crescimento acelerado trouxe também problemas, como inflação e desigualdade social.", "⸻", "Crises e tensão política", "- A democracia brasileira enfrentou dificuldades: corrupção, instabilidade política, conflitos entre os três poderes e protestos sociais.", "- O período termina em 1964, quando os militares deram um golpe e iniciaram uma nova ditadura.", "⸻", "Resumo rápido Característica", "Detalhes", "Período", "1946–1964", "Regime", "Democracia liberal, multipartidária", "Políticas principais", "Populismo, industrialização, urbanização", "Principais presidentes", "Eurico Gaspar Dutra, Getúlio Vargas (2º governo), Juscelino Kubitschek, Jânio Quadros, João Goulart", "Fim do período", "Golpe militar de 1964 Para refletir com os alunos:", "A República Liberal Populista foi um período de crescimento e desafios. Mostra como a democracia pode avançar e enfrentar dificuldades, e como os líderes buscam apoio popular para implementar suas ideias — às vezes de forma positiva, outras vezes causando crises.  Prof. Marcelo Oliveira  História Geral."]}, {"title": "A Presidência do General Eurico Gaspar Dutra (1946–1951)", "body": ["O primeiro presidente da República Liberal Populista", "Após o fim da ditadura do Estado Novo, o Brasil entrou numa nova fase democrática com a eleição do general Eurico Gaspar Dutra em 1945, pelo Partido Social Democrático (PSD). Dutra havia sido ministro da Guerra de Vargas, mas rompeu com ele e contou com o apoio dos militares e da União Democrática Nacional (UDN) para vencer a eleição.", "⸻", "Quem foi Dutra?", "- General do Exército Brasileiro;", "- Fiel a Vargas no início, depois passou a defender a redemocratização;", "- Foi o primeiro presidente eleito após a queda do Estado Novo;", "- Seu governo marcou o início da República Liberal Populista.", "⸻", "Conquistas e ações do governo Dutra:", "1. Nova Constituição (1946) • Aprovada logo no início do mandato.", "- Restabeleceu:", "- Liberdade de expressão", "- Eleições diretas", "- Separação entre os poderes", "- Fim da censura do Estado Novo", "2. Política econômica conservadora • Adotou uma política de contenção de gastos.", "- Abriu o mercado brasileiro para importações.", "- Resultado: as reservas internacionais se esgotaram e a indústria nacional foi prejudicada.", "3. Alinhamento com os Estados Unidos", "- O Brasil se aproximou muito dos EUA durante a Guerra Fria.", "- Dutra rompeu relações com a União Soviética.", "- O Partido Comunista Brasileiro (PCB) foi colocado na ilegalidade em 1947.", "4. Plano SALTE", "- Plano de investimentos em Saúde, Alimentação, Transporte e Energia.", "- Apesar de ambicioso, teve poucos resultados práticos, por falta de organização e recursos.", "⸻", "Tensões sociais e políticas", "- Greves operárias aumentaram com o custo de vida e o desemprego.", "- Repressão ao movimento sindical.", "- Início de um clima de polarização política que cresceria nos anos seguintes.", "⸻", "Resumo para revisão Elemento", "Detalhes", "Período", "1946–1951", "Partido", "PSD (com apoio da UDN)", "Constituição", "Promulgada em 1946", "Política externa", "Alinhamento com os EUA e combate ao comunismo", "Economia", "Abertura ao mercado externo, crise de reservas", "Legado", "Estabilizou a democracia, mas não promoveu avanços sociais significativos Reflexão final:", "A presidência de Dutra mostrou que restabelecer a democracia é só o começo. Manter o equilíbrio entre liberdade política, justiça social e crescimento econômico é um grande desafio — e isso ficou claro nesse primeiro governo da nova fase do Brasil.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "O Segundo Governo Vargas (1951– 1954)", "body": ["“O petróleo é nosso!” – A volta de Vargas pelo voto", "Depois de ter governado o Brasil como ditador entre 1930 e 1945, Getúlio Vargas voltou ao poder em 1951, mas agora eleito democraticamente pelo povo, com grande apoio dos trabalhadores urbanos e do PTB (Partido Trabalhista Brasileiro).", "Essa fase da história é marcada por um Vargas mais popular, focado em políticas sociais e no fortalecimento da economia nacional — mas também marcada por muita oposição, crises e um desfecho dramático.", "⸻", "Um governo voltado para os trabalhadores", "Vargas retornou ao poder com a promessa de melhorar a vida do povo. Entre suas principais ações:", "- Aumento do salário mínimo (em até 100%); • Fortalecimento das leis trabalhistas;", "- Incentivo à valorização do capital nacional;", "- Criação de empresas estatais como a PETROBRAS (1953), com o lema “O petróleo é nosso!”.", "⸻", "Economia nacionalista", "- Vargas defendia uma economia nacionalista, ou seja, com menos influência de empresas estrangeiras.", "- Incentivou a criação de indústrias brasileiras para substituir as importações.", "- Mas a oposição liberal criticava o aumento dos gastos públicos e a inflação.", "⸻", "Crise política e oposição", "O governo Vargas enfrentava forte oposição, principalmente da UDN (União Democrática Nacional) e da imprensa, liderada por Carlos Lacerda.", "- A crise se intensificou com acusações de corrupção e autoritarismo.", "- Vargas também era pressionado pelos militares, que desconfiavam de sua aproximação com sindicatos e líderes de esquerda.", "⸻", "O atentado da rua Tonelero e o fim trágico", "Em agosto de 1954, um atentado contra o jornalista Carlos Lacerda (na rua Tonelero, no Rio de Janeiro) acabou matando seu segurança, o major da Aeronáutica Rubens Vaz.", "Investigadores descobriram que o crime teria sido organizado por homens ligados à guarda pessoal de Vargas, o que aumentou a pressão pelo seu afastamento do poder.", "Diante da crise, Vargas tentou resistir, mas, sem apoio dos militares, acabou se suicidando em 24 de agosto de 1954, no Palácio do Catete, no Rio de Janeiro.", "⸻", "Trecho da carta-testamento:", "“Saio da vida para entrar na História.”", "Esse gesto teve forte impacto popular. Milhares foram às ruas em defesa de Vargas, e sua imagem passou a ser vista por muitos como a de um mártir do povo.", "⸻", "Resumo para revisão Elemento", "Detalhes", "Período", "1951–1954", "Tipo de governo", "Democrático, eleito pelo voto direto", "Foco principal", "Nacionalismo econômico e direitos trabalhistas", "Conquistas", "Criação da Petrobras, aumento do salário mínimo", "Desafios", "Oposição da UDN, crise econômica, pressão militar", "Desfecho", "Suicídio de Vargas em 1954 após crise política Para pensar com os alunos:", "O segundo governo Vargas mostra como um líder pode tentar equilibrar interesses populares e econômicos, mas também como a pressão política pode levar a decisões trágicas. É uma lição sobre os limites da democracia, da mídia e do poder.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A Crise de 1955 – A democracia à beira do colapso Um presidente eleito que quase não tomou posse", "body": ["Depois do suicídio de Getúlio Vargas em 1954, o vice-presidente Café Filho assumiu a presidência. No ano seguinte, o Brasil realizou novas eleições. O vencedor foi o exministro da Guerra Juscelino Kubitschek (JK), com o apoio de João Goulart (Jango), pelo PTB.", "No entanto, forças conservadoras e militares tentaram impedir que JK tomasse posse, alegando que ele não tinha maioria absoluta dos votos — mesmo sendo o candidato mais votado.", "⸻", "Oposição à posse de JK", "- A UDN, principal partido de oposição, não aceitava o resultado.", "- Acusavam JK de ter ligações com o “comunismo” por estar aliado a João Goulart.", "- Setores das Forças Armadas, com apoio de parte da imprensa, começaram a articular um golpe para impedir sua posse.", "⸻", "A ação decisiva do General Lott", "O Ministro da Guerra, General Henrique Teixeira Lott, acreditava que impedir a posse de JK seria um desrespeito à Constituição e à democracia.", "- Em 11 de novembro de 1955, Lott liderou um “contragolpe legalista”.", "- Tropas militares foram às ruas para garantir a posse do presidente eleito.", "- O presidente interino, Carlos Luz (que assumira após a licença médica de Café Filho), foi deposto.", "- Em seguida, o próprio Café Filho foi impedido de retornar ao poder.", "⸻", "O desfecho", "- O Congresso Nacional reconheceu a legitimidade do movimento de Lott.", "- JK e Jango tomaram posse normalmente em 31 de janeiro de 1956.", "- A crise mostrou que a democracia brasileira era frágil, mas ainda podia se defender.", "⸻", "Resumo para revisão Elemento", "Detalhes", "Contexto", "Pós-suicídio de Vargas, eleição de JK em 1955", "Problema", "Tentativa de impedir a posse do presidente eleito", "Solução", "Intervenção legalista do General Lott", "Resultado", "Posse garantida, democracia preservada Para refletir com os alunos:", "A Crise de 1955 mostra que mesmo em tempos democráticos, o Brasil vivia sob o risco de golpes e rupturas institucionais. A ação do General Lott foi decisiva para que o voto popular fosse respeitado, em um momento em que a democracia ainda estava aprendendo a se firmar.", "Prof. Marcelo Oliveira História do Brasil."]}, {"title": "O Governo Juscelino Kubitschek (1956–1961)", "body": ["“Cinquenta anos em cinco”: o Brasil sonha com o futuro", "O governo de Juscelino Kubitschek (JK) ficou marcado por um grande otimismo, crescimento econômico e modernização. Seu lema era “Cinquenta anos em cinco”, ou seja, fazer o Brasil se desenvolver em cinco anos o equivalente a meio século.", "⸻", "Quem foi Juscelino?", "- Médico e político de Minas Gerais;", "- Vice-presidente de Vargas em 1951, depois governador de MG;", "- Eleito presidente em 1955 com apoio de setores nacionalistas e trabalhistas;", "- Tomou posse em 1956 após a Crise de 55, com apoio do Exército.", "⸻", "Plano de Metas: o coração do governo JK", "JK criou o Plano de Metas, com o slogan “Energia e Transporte, a base da industrialização”. O plano tinha 31 metas em 5 grandes áreas: 1. Energia – construção de hidrelétricas como Furnas e Três Marias", "- Transportes – construção de estradas (rodovias como a Belém-Brasília)", "- Alimentação – modernização da agricultura", "- Indústria de base – aço, cimento, petróleo", "- Educação – expansão do ensino técnico", "Meta-síntese: Construção de Brasília, a nova capital federal, inaugurada em 1960.", "⸻", "A construção de Brasília", "- Era símbolo da modernização e integração nacional;", "- Levou o poder para o interior do país;", "- Gerou empregos, mas também polêmicas: alto custo e uso político da obra.", "⸻", "Economia: crescimento com dívidas", "- O país cresceu, atraiu investimentos estrangeiros, principalmente da indústria automobilística (Volkswagen, Ford, etc.).", "- Mas isso veio com aumento da inflação e endividamento externo.", "- Surgiu um novo Brasil urbano, moderno e industrial, mas com desigualdades.", "⸻", "Cultura e otimismo", "- A cultura brasileira viveu uma época de efervescência com a bossa nova, o cinema novo e o modernismo;", "- Era o “Brasil do futuro”, confiante, moderno e em expansão.", "⸻", "Resumo para revisão Elemento", "Detalhes", "Período", "1956–1961", "Lema", "“Cinquenta anos em cinco”", "Plano principal", "Plano de Metas (Energia, Transporte, Indústria…)", "Obra símbolo", "Construção de Brasília", "Economia", "Crescimento + endividamento", "Cultura", "Bossa nova, cinema novo, modernização Para pensar com os alunos:", "O governo JK foi uma época de sonhos e crescimento. Mas o desenvolvimento veio com custo social e econômico. Fica a pergunta: é possível crescer de forma rápida sem excluir os mais pobres ou gerar dívidas futuras?", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A Presidência de Jânio Quadros (1961)", "body": ["“Varre, varre, vassourinha…” — a ascensão de um presidente inesperado", "Em 1960, o Brasil elegeu Jânio Quadros como presidente, com o famoso símbolo da vassoura, prometendo “varrer a corrupção” da política brasileira. Carismático, com um jeito excêntrico e discursos moralistas, Jânio venceu com apoio popular e da UDN, mas governou sozinho, sem apoio do Congresso.", "⸻", "Quem foi Jânio Quadros?", "- Professor, advogado e político de São Paulo;", "- Ficou conhecido por sua luta contra a corrupção e por seu estilo populista;", "- Era contraditório: eleito com apoio conservador, mas tomou decisões de viés independente e, às vezes, até progressista;", "- Tomou posse em janeiro de 1961, mas renunciou apenas sete meses depois, em agosto.", "⸻", "Contradições no governo Política interna:", "- Tentou impor rigor moral e administrativo:", "- Proibiu brigas de galo, uso de biquíni em concursos e consumo de álcool por funcionários públicos.", "- Criou medidas econômicas impopulares, como o congelamento de salários e corte de gastos, que desagradaram trabalhadores e empresários.", "Política externa:", "- Adotou uma política externa independente:", "- Reatou relações com a URSS e países do bloco socialista, o que causou desconfiança dos setores conservadores.", "- Condecorou Che Guevara, líder da Revolução Cubana — o que gerou forte polêmica.", "⸻", "A renúncia inesperada", "Sem apoio do Congresso, Jânio acreditava que, ao renunciar, o povo e os militares o pressionariam a voltar com “poderes totais”.", "Carta de renúncia (25 de agosto de 1961):", "“Forças terríveis se levantaram contra mim […]”", "Mas o plano falhou. O Congresso aceitou a renúncia e ele saiu da presidência, dando início a uma nova crise política.", "⸻", "Resumo para revisão Elemento", "Detalhes", "Período", "Janeiro – Agosto de 1961", "Partido", "PTN (com apoio da UDN)", "Estilo de governo", "Autoritário, personalista, moralista", "Política externa", "Independente (diálogo com países socialistas)", "Fim do governo", "Renúncia inesperada, sem apoio popular ou militar Para pensar com os alunos:", "O caso de Jânio Quadros ensina que um presidente precisa mais do que carisma e boas intenções: precisa de diálogo com o Congresso e equilíbrio político. A sua renúncia abriu o caminho para mais instabilidade — e a crise só aumentaria nos anos seguintes.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A Crise da Renúncia e o Parlamentarismo (1961–1963)", "body": ["Quando o Brasil quase parou por causa de uma carta", "Em 25 de agosto de 1961, o presidente Jânio Quadros renunciou ao cargo alegando estar sendo pressionado por “forças terríveis”. A decisão pegou o país de surpresa e gerou uma grave crise política.", "⸻", "Quem deveria assumir?", "De acordo com a Constituição, o vice-presidente João Goulart (Jango) deveria tomar posse.", "Mas havia um problema:", "Jango era visto com desconfiança pelos militares e setores conservadores, por suas ideias trabalhistas e aproximação com a esquerda.", "⸻", "A resistência militar", "- Parte das Forças Armadas tentou impedir a posse de Jango.", "- Os militares temiam que ele levasse o país para o comunismo.", "- Iniciou-se um movimento de oposição à legalidade, com tentativas de ruptura institucional.", "⸻", "A Campanha da Legalidade", "- O governador do Rio Grande do Sul, Leonel Brizola, liderou a Campanha da Legalidade, com apoio de setores militares que defendiam a Constituição. • Usando rádios e apoio popular, Brizola defendeu a posse de Jango.", "⸻", "A solução: o Parlamentarismo", "Para evitar um golpe e permitir que Jango assumisse, foi feito um acordo político:", "Mudança no sistema de governo:", "O Brasil deixou de ser presidencialista e passou a ser parlamentarista.", "O que isso significava?", "Jango virou chefe de Estado, mas o chefe de governo era o primeiro-ministro, indicado pelo Congresso.", "⸻", "Como funcionou o Parlamentarismo?", "- Três primeiros-ministros se revezaram entre 1961 e 1963;", "- Jango tinha poderes limitados e pouca influência nas decisões do governo;", "- O povo se mostrava descontente com essa solução improvisada.", "⸻", "O plebiscito de 1963", "- Em janeiro de 1963, foi realizado um plebiscito nacional para decidir se o país continuaria parlamentarista ou voltaria ao presidencialismo.", "- Resultado: maioria esmagadora votou pela volta do presidencialismo.", "- Jango retomou seus poderes plenos como presidente.", "⸻", "Resumo para revisão Elemento", "Detalhes", "Causa da crise", "Renúncia de Jânio Quadros", "Conflito", "Militares contra a posse de João Goulart", "Solução temporária", "Parlamentarismo (1961–1963)", "Liderança da legalidade", "Leonel Brizola", "Desfecho", "Plebiscito devolve plenos poderes a Jango em 1963 Para pensar com os alunos:", "A Crise da Renúncia mostra como a democracia brasileira enfrentava desafios internos e externos. O parlamentarismo foi uma tentativa de conciliação, mas deixou claro que sem apoio popular e estabilidade política, nenhuma fórmula de governo funciona por muito tempo.", "Prof. Marcelo Oliveira  História Geral.",
