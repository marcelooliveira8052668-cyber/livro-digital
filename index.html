res, ou seja, acordos de ajuda mútua em caso de guerra.", "Essas alianças formaram o que chamamos de Sistema de Alianças.", "As principais alianças foram:", "Tríplice Aliança (1882):", "Alemanha, Áustria-Hungria e Itália", "Era uma aliança de defesa: se um fosse atacado, os outros ajudariam.", "Tríplice Entente (1907):", "França, Rússia e Reino Unido", "Também formada para equilibrar o poder da Tríplice Aliança.", "O problema do sistema de alianças", "A ideia era evitar guerras, pois ninguém queria enfrentar dois ou três países de uma vez. Mas, na prática, isso criou um clima muito perigoso: qualquer conflito local poderia virar uma guerra mundial. E foi isso que aconteceu!", "Quando o arquiduque Francisco Ferdinando foi assassinado em 1914, a Áustria-Hungria declarou guerra à Sérvia. A Rússia apoiou a Sérvia, a Alemanha apoiou a Áustria, e assim, uma por uma, as nações entraram na Primeira Guerra Mundial.", "O Sistema de Alianças transformou pequenos conflitos em uma grande guerra. Era como um “dominó”: quando um caía, todos os outros vinham juntos.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A Política da Paz Armada – Paz por pouco tempo", "body": ["No final do século XIX e início do século XX, os países da Europa viviam um momento estranho: não estavam em guerra, mas se preparavam para uma. Esse período ficou conhecido como a Política da Paz Armada.", "O que isso quer dizer?", "Era uma paz aparente, porque não havia guerra, mas também não havia confiança entre os países;", "As nações aumentavam seus exércitos, construíam navios de guerra, desenvolviam armas novas e investiam muito em tecnologia militar.", "Essa preparação para a guerra, mesmo durante o tempo de paz, é o que chamamos de Paz Armada.", "Por que isso aconteceu?", "Rivalidades políticas e econômicas entre os países;", "Disputas coloniais na África e na Ásia;", "O medo causado pelo Sistema de Alianças (cada país se armava, temendo os outros);", "O crescimento do nacionalismo e do militarismo (ideia de que o exército é o símbolo da força de um país).", "Consequência", "Quando a guerra finalmente começou em 1914, os países já estavam prontos para lutar.", "Por isso, a Primeira Guerra Mundial foi rápida na mobilização e violenta desde o começo.", "A Paz Armada foi um período silencioso, mas tenso. Os países falavam de paz, mas se preparavam para a guerra – e isso tornou o conflito inevitável.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "POLÍTICA DA PAZ ARMADA", "body": ["Segundo a política bismarckiana, Guilherme II continuou a desenvolver as forças militares terrestres alemãs, dedicando somas enormes a material de guerra; anexou, ainda, a tudo isso, os armamentos marítimos que o governo anterior havia desprezado. O almirante Tirptz construiu em pouco tempo uma possante frota de guerra, a segunda do mundo, depois da inglesa.", "De medíocre país agrícola que era antes de 1870, a Alemanha foi aos poucos tornando-se uma das grandes potências econômicas do mundo. Isso porque resolveu dedicar-se ao setor industrial, valendo-se da riqueza mineral do seu subsolo e da abundância de mãode-obra. O comércio alemão se desenvolveu de tal forma que Hamburgo se tornou o primeiro porto do Continente Europeu. Para vencer a batalha comercial, aprimoraram seus métodos, fazendo com que seu efetivo da marinha mercante tivesse perfeito conhecimento de línguas estrangeiras, senso prático e paciência. Procuraram, por outro lado, aprimorar, cada vez mais, as mercadorias que vendiam.", "Os progressos obtidos em todos os setores não bastaram à sempre crescente ambição alemã. A formação da Liga Pan-germanista tornou-se uma ameaça mundial, daí a chamada política da paz armada seguida por vários países. Esses passaram à semelhança da Alemanha, a aumentar seus armamentos, tornando obrigatório o serviço militar, elaborando planos de mobilização geral etc. Por outro lado, a diplomacia secreta mantinha a atmosfera de suspeita entre as potências.", "Nessa época, o czar Nicolau II empreendeu uma viagem por vários países da Europa: visitou a Áustria, a Alemanha, a Inglaterra e a França. Aos governos destes países, fez ver que seguiria uma política de paz, convidando-os então para uma conferência destinada a estudar a limitação de armamentos. Eis a origem da Conferência de Haia em 1899. A Alemanha e a Inglaterra recusaram-se a aceitar essa questão sobre os armamentos, dando, assim, continuidade à política da paz armada.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "AS CRISES DO MARROCOS", "body": ["A crise marroquina nasceu de um choque de interesses econômicos franceses e alemães. No começo do século XX, era o Marrocos um país independente, governado por um sultão. Seu território, porém, era relativamente rico em minerais e produtos agrícolas, que as nações européias cobiçavam. O que despertava principalmente a cupidez dos franceses e alemães eram as jazidas de ferro e manganês e as excelentes oportunidades de comércio.", "Em 1880, as principais potências do mundo haviam assinado a Convenção de Madrid, estabelecendo que os representantes de todas as nações teriam privilégios econômicos iguais no Marrocos.", "Os franceses, contudo, não se satisfizeram por muito tempo com tal combinação. Em 1903, o seu comércio marroquino ultrapassava o de qualquer outro país e a França almejava nada menos que um monopólio. Além disso, cobiçavam o Marrocos como uma reserva de tropas e como um baluarte na defesa da Argélia. Por conseguinte, em 1904, a França entrou em acordo com a Inglaterra para estabelecer uma nova ordem no território do sultão. Segundo os artigos secretos do acordo, em época oportuna, o Marrocos seria desmembrado: uma pequena parte fronteira a Gibraltar seria dada à Espanha e o resto caberia à França. A Grã-Bretanha tinha como recompensa a liberdade de ação no Egito.", "Foi esse acordo de 1904 que precipitou a encarniçada disputa entre a França e a Alemanha. Em 1905, os alemães resolveram obrigar a França a desistir de suas pretensões sobre Marrocos, ou então oferecer compensações. O Chanceler Bulow induziu o Kaiser a desembarcar no porto marroquino de Tânger e pronunciar ali um discurso, declarando que a Alemanha estava pronta para defender a independência do território. O resultado foi uma crise que levou a Europa a dois passos da guerra.", "A fim de resolver a disputa, reuniu-se, em 1906, a Conferência Internacional de Algeciras; embora confirmasse a soberania do sultão, a conferência reconhecia ao mesmo tempo os interesses especiais da França nos domínios daquele: esse resultado convinha, admiravelmente, aos franceses, que podiam agora penetrar na terra dos mouros sob o manto da legalidade.", "Em 1908, deu-se uma segunda crise e, em 1911, uma terceira, ambas resultantes de tentativas dos alemães para proteger o que consideravam seus legítimos direitos no Marrocos. A terceira crise foi de particular importância devido à atitude positiva assumida pelos ingleses. Em julho de 1911, David Lloyd George, no seu célebre discurso da prefeitura de Londres, virtualmente ameaçou de guerra a Alemanha se essa tentasse estabelecer uma base na costa marroquina.", "A controvérsia em torno de Marrocos foi resolvida nos fins de 1911, quando a França concordou em ceder uma porção do Congo Francês à Alemanha. Nenhuma das partes, todavia, esqueceu os ressentimentos, nascidos da contenda. Os franceses afirmavam terem sido vítimas de uma chantagem pela qual lhes foi arrebatado um território valioso. Os alemães alegavam que a porção do Congo cedida pela França não era compensação suficiente para a perda dos privilégios econômicos em Marrocos.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A CAUSA IMEDIATA DA GUERRA", "body": ["A causa imediata da Primeira Guerra Mundial foi o assassínio do arquiduque Francisco Fernando, em 28 de junho de 1914. Foi a faísca lançada ao barril de pólvora das suspeitas e ódios acumulados. Francisco Fernando não era simplesmente uma figura inútil da nobreza austríaca: era um homem que em breve se tornaria imperador. O monarca reinante, Francisco José, atingira os oitenta e cinco anos e sua morte era esperada a cada momento. Por isso, o assassínio do herdeiro do trono foi considerado como um ataque ao Estado.", "O assassino de Francisco Fernando foi um estudante bosníaco chamado Princip, que não passava de um instrumento dos nacionalistas sérvios. O assassínio, embora tenha ocorrido em Serajevo, capital da Bósnia, resultou de uma conspiração urdida em Belgrado. Os conspiradores eram membros de uma sociedade secreta oficialmente conhecida como “União e Morte”, mais comumente chamada “Mão Negra”. Documentos importantes vieram à luz ultimamente, mostrando que o governo sérvio tinha conhecimento da conspiração. Nem o primeiro-ministro, nem qualquer dos seus colegas, porém, tomou medidas eficazes para impedir a execução ou, pelo menos, alertar o governo austríaco. Isso leva, naturalmente, a indagar os motivos que levaram a agir os assassinos. O principal deles parece ter sido o plano de reorganização do Império dos Habsburgos, que se sabia estar sendo arquitetado por Francisco Fernando. Esse plano, denominado trialismo, incluía uma proposta no sentido de transformar a monarquia Dual numa Monarquia Tríplice. Além da Áustria alemã e da Hungria magiar, já então praticamente autônoma, haveria uma terceira unidade semi-independente composta pelos eslavos. Tal coisa era exatamente o que os nacionalistas sérvios não desejavam. Temiam que, se tal acontecesse, os seus consanguíneos croatas e eslovenos se conformassem com o domínio dos Habsburgos. Decidiram, portanto, eliminar Francisco Fernando antes que se tornasse imperador da Áustria-Hungria.", "A Áustria, senhora desses elementos, foi procurar aproveitar a ocasião para eliminar a Sérvia como fator político nos Bálcãs e evitar que aquele país se transformasse em centro do movimento eslavista.", "Com tais objetivos, a 23 de julho, os austríacos enviaram um ultimato ao governo sérvio que continha onze exigências. Entre outras coisas, a Sérvia devia fechar os jornais antiaustríacos, liquidar as sociedades secretas, excluir do governo e do exército todas as pessoas culpadas de propaganda anti-austríaca e aceitar a colaboração das autoridades austríacas na eliminação do movimento subversivo contra o Império dos Habsburgos. A 25 de julho, dentro do prazo-limite de quarenta e oito horas, o governo Sérvio transmitiu a sua resposta, através de um documento ainda hoje sujeito a variadas interpretações. Do total de onze exigências, somente uma era categoricamente repelida e cinco eram aceitas sem reservas. O chanceler alemão considerou-o como uma capitulação quase completa e o Kaiser afirmou que todos os motivos para a guerra tinham desaparecido. A Áustria, no entanto, declarou insatisfatória a resposta Sérvia, rompeu as relações diplomáticas e mobilizou parte do seu exército.", "Nesse ponto, a atitude de outras nações assume extrema importância. Com efeito, algum tempo antes disso, diversos governantes das grandes potências haviam assumido atitudes bem definidas. Já em 18 de julho, Sazonov, ministro russo do Exterior, avisara a Áustria de que a Rússia não toleraria qualquer tentativa de humilhar a Sérvia. Ao tomar conhecimento do ultimato à Sérvia, o governo russo ordenou uma série de preparativos para pôr o país em pé de guerra. O governo de Moscou contava com o apoio da França ao assumir essa atitude beligerante.", "A atitude da Alemanha nesses dias críticos foi aparentemente mais moderada. Se bem que o Kaiser ficasse chocado e enfurecido com o assassínio do arquiduque, o seu governo não formulou qualquer ameaça nem tomou deliberações especiais para a guerra senão depois de dar motivo para alarma da Rússia. Infelizmente, porém, tanto o Kaiser quanto o chanceler von Bethmann-Hollweg adotaram a premissa de que uma punição severa deveria ser aplicada sem mais delongas à Sérvia. Esperavam com isso colocar as potências diante de um fato consumado e evitar assim uma guerra geral.", "Prof: Marcelo Oliveira História Geral."]}, {"title": "O CONFLITO ARMADO", "body": ["A Áustria declarou guerra à Sérvia em 28 de julho de 1914. Por um efêmero e ansioso momento, houve a tênue possibilidade de circunscrever-se o conflito. Foi ele, todavia, rapidamente transformado numa guerra de maiores proporções pela ação da Rússia. A 29 de julho, Sazonov e a clique militar persuadiram o Czar a emitir uma ordem de mobilização geral não só contra a Áustria, mas também contra a Alemanha. Antes, porém, que fosse a ordem executada, Nicolau mudou de idéia ao receber um apelo urgente do Kaiser, para que ajudasse a preservar a paz. A 30 de julho, Sazonov e o general Tatichtchev trataram de fazer com que o Czar mudasse de idéia.", "Já não havia possibilidade de recuar diante do abismo. Os alemães estavam alarmados com os preparativos de guerra dos russos.", "A última medida tomada pelo governo do Czar tornava a situação muito mais crítica, uma vez que nos círculos militares alemães, assim como nos franceses e russos, mobilização geral significava guerra.", "Ao saber que o decreto do Czar tinha sido posto em execução, o governo do Kaiser expediu um ultimato a São Petersburgo exigindo que a mobilização cessasse dentro de doze horas. Na tarde de 1º de agosto, o embaixador alemão solicitou uma entrevista com o Ministro russo das Relações Exteriores. Pedia a Sazonov que desse uma resposta favorável ao ultimato alemão. Ele respondeu que a mobilização não podia ser detida, mas que a Rússia estava disposta a entrar em negociações; o embaixador entregou então uma declaração de guerra ao Ministro.", "Nesse meio tempo, os ministros do Kaiser tinham também enviado um ultimato à França, exigindo que ela desse a conhecer as suas intenções. O primeiro-ministro Viviani, a 1º de agosto, respondeu que a França agiria “de acordo com os seus interesses” e ordenou imediatamente a mobilização. Em 03 de agosto, a Alemanha declarou guerra à França.", "Todos os olhares voltaram-se, então, para a Inglaterra. Que faria ela agora, ao ver que os dois outros membros da Tríplice Entente se haviam atirado à guerra?", "Durante algum tempo, depois de ter-se tornado crítica a situação no continente, a Inglaterra vacilou. Tanto o gabinete quanto a nação estavam divididos.", "Sir Edward Grey e Winston Churchill advogavam uma atitude resoluta em favor da França, com o recurso às armas se os interesses britânicos fossem ameaçados. Alguns de seus colegas, porém, encaravam com pouco entusiasmo uma intervenção da Inglaterra nas disputas continentais. Conquanto Grey tivesse em várias ocasiões animado os russos e franceses a contar com o auxílio inglês, só depois de ter recebido promessas de apoio, dos líderes do partido conservador, é que tomou compromissos formais. Em 02 de agosto, informou os franceses de “se a esquadra alemã entrasse na Mancha ou cruzasse o Mar do Norte para realizar operações hostis contra a costa ou os navios franceses, a esquadra britânica dispensaria toda a proteção que estivesse a seu alcance”.", "Diante da promessa feita à França, era difícil acreditar que a Inglaterra pudesse permanecer muito tempo fora da guerra, mesmo que a neutralidade da Bélgica não tivesse sido violada. Com efeito, ainda em 29 de julho, Sir Edward Grey advertira o embaixador alemão em Londres que, se a França fosse arrastada ao conflito, a Inglaterra lhe seguiria os passos. Não obstante, foi a invasão do território belga que forneceu o motivo imediato para que a Inglaterra desembainhasse a espada.", "Em 1839, juntamente com as outras grandes potências, assinara a Inglaterra um tratado garantindo a neutralidade da Bélgica. Além disso, havia um século que a Grã-Bretanha seguia a política de impedir o domínio dos Países Baixos, que lhe ficavam fronteiros no outro lado do estreito por qualquer nação poderosa do continente.", "Contudo, o famoso Plano Schlieffen dos alemães dispunha que a França fosse atacada pela Bélgica. Por conseguinte, pediram ao governo belga permissão para enviar tropas através do seu território, prometendo respeitar a independência da nação e indenizar os belgas de todas as depredações causadas às suas propriedades. Como a Bélgica recusasse, as tropas alemãs começaram a atravessar a fronteira.", "O Ministro Britânico do Exterior compareceu imediatamente ao Parlamento e declarou que o seu país devia correr em defesa do direito internacional, protegendo as pequenas nações. No dia seguinte, 04 de agosto, o gabinete resolveu mandar um ultimato a Berlim, exigindo que a Alemanha respeitasse a neutralidade belga e desse, até a meia-noite, uma resposta satisfatória. Os ministros do Kaiser não tiveram outra resposta a dar senão que se tratava de uma necessidade militar e que era questão de vida ou de morte para a Alemanha poderem os seus soldados alcançar a França pelo caminho mais fácil e mais rápido. Quando o relógio bateu meia-noite, estavam em guerra a Alemanha e Inglaterra.", "Outras nações foram rapidamente lançadas no terrível sorvedouro, e, a 07 de agosto, os montenegrinos juntaram-se aos seus consanguíneos sérvios na luta contra a Áustria. Duas semanas depois, o Japão declarou guerra à Alemanha, em parte devido à sua aliança com a Inglaterra, mas sobretudo com o objetivo de conquistar as possessões alemãs do Extremo Oriente. Em 1º de agosto, a Turquia negociou uma aliança com a Alemanha e em outubro, iniciou o bombardeio dos portos russos do Mar Negro.", "A Itália, no entanto, embora ainda fosse oficialmente um membro da Tríplice Aliança, proclamou sua neutralidade. Insistiam os italianos em que a Alemanha não estava fazendo uma guerra defensiva e, por conseguinte, não tinham a obrigação de auxiliá-la. Nada diziam, está claro, sobre o seu acordo secreto com a França, firmado em 1902. A Itália manteve-se neutra até maio de 1915, quando, seduzida por promessas secretas da cessão de territórios austríacos e turcos, lançou-se à guerra ao lado da Tríplice Entente.", "Prof: Marcelo Oliveira  História Geral.", "A Guerra do Movimento", "(agosto/setembro de 1914)", "É um período caracterizado pelas rápidas investidas. Os alemães baseiam sua ação no “Plano Von Schlieffen”: a França seria invadida e rapidamente dominada pelo milhão e meio de soldados alemães e, depois, a Alemanha voltaria todas as suas forças contra a Rússia. O plano falha ante a resistência heróica da Bélgica em Liège, resistência que dá possibilidade à mobilização dos franceses e russos.", "Em um mês (setembro de 1914), a luta chega às vizinhanças de Paris – a situação parecia perdida. Entretanto, graças à extrema habilidade do general Joffre, os alemães são obrigados a recuar até o vale do rio Marne, verificando-se a Primeira Batalha de Marne, onde lutaram cerca de 2 milhões de homens. Não houve triunfos decisivos, mas o rápido avanço alemão estava detido.", "Os russos, entretanto, são vencidos pelo general Hindenburg, na batalha de Tannenberg (26 a 30 de agosto de 1914). Pouco depois, nova derrota é infligida aos russos, na batalha dos Lagos Masurianos (06 a 15 de setembro).", "Na Ásia, frente aos japoneses, e na África, frente às forças franco-britânicas, a Alemanha perde possessões. A Primeira Batalha do Marne é muito importante, no sentido de que assinala o fim da guerra de movimento. Os alemães tentam ainda tomar o porto de Calais, mas são detidos na Batalha de Yser. Para ter maior liberdade de ação, o governo francês transporta-se para Bordéus.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A Fase da Guerra das Trincheiras (1914–1918)", "body": ["Quando a Primeira Guerra Mundial começou, em 1914, muitos pensavam que seria uma guerra rápida. Mas não foi isso que aconteceu.", "Depois dos primeiros meses de batalha, os soldados começaram a cavar buracos e túneis no chão para se proteger. Esses buracos se chamavam trincheiras, e a guerra virou uma longa e difícil espera. O que foi a Guerra das Trincheiras?", "Foi um período da Primeira Guerra Mundial em que os dois lados, a Tríplice Entente (França, Inglaterra e Rússia) e a Tríplice Aliança (Alemanha, Áustria-Hungria e Itália), pararam de avançar e ficaram escondidos em trincheiras, principalmente na Frente Ocidental (entre a França e a Alemanha).", "Nessas trincheiras, os soldados viviam em condições muito ruins: havia lama, ratos, frio, doenças e fome. Muitos morriam sem nem sair do lugar.", "Como eram os combates?", "Os dois lados tentavam sair de suas trincheiras e invadir as do inimigo, mas isso era muito difícil.", "Quem saía, enfrentava metralhadoras, canhões e gás venenoso.", "O avanço era pequeno e o número de mortos, enorme.", "Por que durou tanto tempo?", "Porque nenhum dos lados conseguia vencer o outro com facilidade. A guerra virou uma batalha de resistência, onde quem aguentasse mais tempo venceria.", "A Guerra das Trincheiras foi um dos períodos mais duros da Primeira Guerra Mundial. Milhões de soldados passaram anos em buracos no chão, lutando em condições desumanas. Foi uma guerra parada, mas muito cruel.", "Prof: Marcelo Oliveira  História Geral.", "A Volta à Guerra de Movimento (1918)", "Retirando suas forças da frente oriental, os alemães comandados por Ludendorf concentram-nas novamente sobre a França (1918).", "O avanço alemão chega às extremidades de Paris e essa é bombardeada com armas poderosas, como o famoso canhão Berta, cujo poder de alcance chegava a 120 quilômetros. A situação era crítica para os aliados, até que surgiu a figura do general francês Foch, que derrotaria as forças alemãs na Segunda batalha do Marne (julho/agosto de 1918).", "A Alemanha estava derrotada. Foch, ampliando a ofensiva, ataca por vários pontos. Os aliados do “Eixo”, derrotados (Áustria-Hungria havia sido derrotada pelos italianos em Vittorio-Veneto), rendiam-se. A Alemanha está só. Para piorar a situação, uma revolução socialista republicana irrompe na Alemanha e o Kaiser Guilherme II foge para a Holanda (09 de novembro). Finalmente, a 11 de novembro, a Alemanha se rendia.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "O Tratado de Versalhes – A paz que trouxe mágoa", "body": ["A Primeira Guerra Mundial terminou em 1918. Depois de tanta destruição e milhões de mortes, os países vencedores se reuniram para decidir o futuro da Europa. Essa reunião aconteceu em 1919, na cidade de Versalhes, na França, e deu origem ao Tratado de Versalhes.", "O que foi o Tratado de Versalhes?", "Foi um acordo de paz assinado pelos países vencedores (como França, Inglaterra e Estados Unidos) e a Alemanha, que havia sido derrotada na guerra.", "Mas, na verdade, o tratado não foi nada amigável com a Alemanha.", "Principais pontos do Tratado:", "A Alemanha foi considerada a única culpada pela guerra;", "Teve que entregar suas colônias e parte de seus territórios;", "Foi obrigada a reduzir seu exército e não podia mais fabricar armas pesadas; Teve que pagar uma enorme indenização aos países vencedores.", "Como a Alemanha reagiu?", "O povo alemão ficou humilhado e revoltado. Muitos achavam que o tratado foi injusto e severo demais. Esse sentimento de raiva e desejo de vingança cresceu ao longo dos anos — e foi um dos motivos que levaram à Segunda Guerra Mundial, anos depois.", "O Tratado de Versalhes marcou o fim da Primeira Guerra Mundial, mas também plantou a semente de uma nova guerra. Foi uma paz que não trouxe união, e sim ressentimento. Prof: Marcelo Oliveira História Geral."]}, {"title": "CONSEQUÊNCIAS DA I GUERRA MUNDIAL", "body": []}, {"title": "ECONÔMICAS", "body": ["A guerra, que viria para solucionar todos os problemas, agravou-os tremendamente. Os países europeus, empobrecidos, lutavam para recuperar-se. Nos anos seguintes à guerra, a inflação na Alemanha atingiu níveis inacreditáveis. Os países passaram a evitar as compras no exterior, fato que impediu os países industrializados de exportarem seus manufaturados. Como reflexo, paralisaram-se as indústrias locais e a dispensa de operários deu-se em massa. Surgem, a partir daí, inúmeros movimentos antiliberais, pregando a incapacidade dos governos locais e ganhando rápida popularidade – surgem os “governos fortes” que se estabeleceram na Espanha, Portugal, Itália e Alemanha.", "Todos os países perderam com a guerra, exceto um: os Estados Unidos. A guerra trouxe a nação americana para o primeiro plano do cenário internacional, ocupando o lugar até então ocupado pela Inglaterra. De devedores, posição anterior à guerra, os Estados Unidos passam a credores da Europa em vários bilhões de dólares. Inicia-se uma produção desenfreada que trará consequências drásticas no futuro."]}, {"title": "POLÍTICAS", "body": ["O mapa da Europa foi modificado: inúmeras colônias mudando de dono, a queda do czarismo e a ascensão dos bolcheviques na Rússia, Checoslováquia e Polônia e o sucesso de regimes radicais, entre outras, foram algumas das conseqüências políticas do conflito.", "Prof: Marcelo Oliveira", "**Fatores da Primeira Guerra Mundial – Por que começou a Grande Guerra? **", "A **Primeira Guerra Mundial** aconteceu entre **1914 e 1918** e envolveu muitos países. Foi um dos maiores conflitos da história. Mas o que levou o mundo a essa guerra?", "** Principais causas: **", "- **Nacionalismo:**", "Os povos queriam defender sua cultura e território, o que gerou rivalidades entre países.", "- **Imperialismo:**", "As grandes potências europeias disputavam colônias e riquezas na África e na Ásia.", "- **Militarismo:**", "Os países começaram a investir muito em armas e exércitos, acreditando que a força militar garantia poder.", "- **Alianças militares:**", "Os países se dividiram em dois grupos:", "- **Tríplice Aliança:** Alemanha, Áustria-Hungria e Itália", "- **Tríplice Entente:** França, Inglaterra e Rússia", "Essas alianças fizeram com que um conflito local se tornasse mundial.", "- **Crise dos Bálcãs:**", "A região dos Bálcãs era cheia de disputas e nacionalismos. Bastava uma faísca para a guerra começar.", "** O estopim:**", "O arquiduque **Francisco Ferdinando**, herdeiro do trono da Áustria-Hungria, foi assassinado em 1914 por um jovem sérvio em Sarajevo. Esse foi o gatilho que iniciou o conflito.", "** A Luta pelos Mercados **", "Durante o século XIX e início do XX, os países industrializados da Europa (como **Inglaterra, França e Alemanha**) disputavam **novos mercados e fontes de matériaprima**.", "Essa disputa ficou conhecida como **“luta pelos mercados”** e foi uma das causas da guerra.", "- Eles queriam **vender produtos**, **comprar matérias-primas baratas** (como algodão e borracha) e **investir em regiões pobres**.", "- As regiões mais disputadas eram a **África**, a **Ásia** e a **América Latina**.", "- Isso aumentou o **imperialismo** e a **exploração dos povos colonizados**, gerando rivalidades entre as potências.", "** Rivalidade Industrial: Alemanha x Inglaterra **", "- A **Inglaterra** foi o primeiro país a se industrializar (século XVIII), sendo chamada de **“fábrica do mundo”**.", "- No final do século XIX, a **Alemanha** se unificou e cresceu rapidamente com novas tecnologias, como **eletricidade, química e aço**.", "- A Alemanha se tornou uma grande potência e passou a **competir com a Inglaterra** por mercados, colônias e poder.", "Essa disputa industrial aumentou a desconfiança e ajudou a preparar o caminho para a guerra.", "🇷🇸** Nacionalismo e a Grande Sérvia **", "O **nacionalismo** era um sentimento forte na Europa. Nos **Bálcãs**, a **Sérvia** queria unir todos os povos eslavos do sul da Europa num só país — a chamada **“Grande Sérvia”**.", "- O **Império Austro-Húngaro** não queria perder territórios para os sérvios.", "- A **Rússia**, também eslava, apoiava a Sérvia.", "- Essa tensão cresceu até o assassinato do arquiduque **Francisco Ferdinando**, em 1914 — o estopim da guerra.", "**Pan-eslavismo: **", "Ideia de que todos os povos eslavos (como russos, sérvios e croatas) deveriam se unir, com a **Rússia** como protetora.", "**Pangermanismo: **", "Movimento que defendia a união dos povos de origem **germânica** (como alemães e austríacos), liderados pela **Alemanha**.", "🇫🇷** O Revanchismo Francês **", "Depois de perder a **Guerra Franco-Prussiana (1871)**, a França ficou humilhada e teve que entregar à Alemanha as regiões de **Alsácia e Lorena**. Nasceu o sentimento de **revanchismo** — desejo de vingança.", "Durante anos, os franceses ensinaram nas escolas o ódio à Alemanha e o orgulho nacional.", "Esse sentimento ajudou a França a entrar decidida na guerra em 1914.", "** O Sistema de Alianças **", "Com tanto medo e desconfiança, os países criaram **alianças militares** para se proteger.", "- **Tríplice Aliança (1882):** Alemanha, Áustria-Hungria e Itália", "- **Tríplice Entente (1907):** França, Rússia e Reino Unido"]}, {"title": "Essas alianças, em vez de evitar a guerra, ampliaram o conflito", "body": ["quando dois países brigaram, **todos os aliados foram arrastados** para a luta — como peças de dominó.", "** A Política da Paz Armada **", "Antes da guerra, os países viviam um tempo de **“paz armada”**:", "não havia guerra aberta, mas todos estavam **se preparando para uma**.", "- Construíam armas, navios e exércitos enormes;", "- Havia medo e desconfiança entre as nações;", "- O militarismo e o nacionalismo estavam muito fortes.", "Assim, quando a guerra começou em 1914, os países já estavam **prontos para lutar**.", "** As Crises do Marrocos **", "A França e a Alemanha disputavam o controle econômico do **Marrocos**, um país rico em minérios.", "Entre **1905 e 1911**, três crises quase levaram à guerra.", "- A **França**, apoiada pela **Inglaterra**, queria dominar o território.", "- A **Alemanha** tentou impedir, mas acabou derrotada diplomaticamente.", "Essas crises aumentaram o ódio entre os dois países e fortaleceram as alianças.", "** O Início da Guerra **", "O assassinato do arquiduque Francisco Ferdinando em **28 de junho de 1914** levou a uma reação em cadeia:", "- A **Áustria-Hungria** declarou guerra à **Sérvia**.", "- A **Rússia** apoiou a Sérvia.", "- A **Alemanha** apoiou a Áustria.", "- A **França** e o **Reino Unido** entraram em defesa de seus aliados.", "Em poucos dias, **toda a Europa estava em guerra**.", "🪖** A Guerra das Trincheiras (1914–1918) **", "Depois dos primeiros meses, a guerra ficou parada.", "Os soldados cavaram **trincheiras** (buracos no chão) para se proteger.", "- As condições eram terríveis: lama, frio, ratos e doenças.", "- Milhares morriam sem sair do lugar.", "- Foi uma guerra de **resistência e sofrimento**, não de avanços rápidos.", "** A Volta à Guerra de Movimento (1918) **", "Em 1918, os alemães tentaram avançar novamente, mas foram derrotados na **Segunda Batalha do Marne**.", "A **Alemanha** estava exausta e, com revoltas internas, o **Kaiser Guilherme II** fugiu.", "Em **11 de novembro de 1918**, a Alemanha se rendeu. A guerra acabou.", "** O Tratado de Versalhes (1919) – A paz que trouxe mágoa **", "Depois da guerra, os países vencedores se reuniram e criaram o **Tratado de Versalhes**.", "- A **Alemanha** foi considerada **culpada pela guerra**;", "- Perdeu colônias e parte de seu território;", "- Foi obrigada a pagar **altas indenizações**;", "- Teve seu exército **reduzido**.", "Esse tratado deixou os alemães **humilhados** e **revoltados**, criando o clima que, anos depois, ajudaria a causar a **Segunda Guerra Mundial**.", "História Geral."]}, {"title": "Antes da Tempestade – Os antecedentes da Revolução Russa", "body": ["No início do século XX, a Rússia era um país enorme, mas cheio de problemas. A maioria da população vivia no campo, em condições de pobreza extrema, enquanto um pequeno grupo de nobres vivia com luxo e poder.", "O país era governado por um imperador chamado czar, que tinha poder absoluto. O czar da época era Nicolau II, que não aceitava críticas nem mudanças. A Rússia era uma monarquia absolutista, atrasada em relação aos outros países da Europa.", "O povo sofria muito", "Os camponeses viviam como no tempo da Idade Média, sem terras e com poucos direitos.", "Os operários, que trabalhavam nas cidades, tinham jornadas longas e salários baixos.", "Não havia liberdade de expressão nem partidos políticos livres. Quem reclamava era preso ou exilado.", "A guerra e a fome pioram tudo", "Em 1905, a Rússia perdeu uma guerra para o Japão. Isso abalou o orgulho do país.", "Nesse mesmo ano, houve protestos, e soldados do czar atiraram contra o povo no que ficou conhecido como o Domingo Sangrento.", "Depois, a Rússia entrou na Primeira Guerra Mundial (1914), e o sofrimento do povo piorou: fome, frio e mortes aumentaram.", "As ideias de mudança crescem", "Enquanto isso, cresciam entre os trabalhadores e intelectuais ideias socialistas, que defendiam um país mais justo, sem reis, sem nobres e com igualdade entre as pessoas. Um desses grupos eram os bolcheviques, liderados por Lênin.", "Eles acreditavam que a única saída era uma revolução para acabar com o governo do czar e dar o poder ao povo.", "Assim, a Rússia vivia como uma panela de pressão prestes a explodir. A pobreza, a injustiça, a guerra e a falta de liberdade criaram o cenário perfeito para a Revolução Russa.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A Fase Burguesa da Revolução Russa (Fevereiro de 1917)", "body": ["Em 1917, o povo da Rússia não aguentava mais: havia fome, frio, pobreza, e a guerra continuava. Nas cidades, os operários protestavam, os soldados não queriam mais lutar e os camponeses exigiam terra.", "Foi nesse momento que aconteceu a Primeira fase da Revolução Russa, conhecida como Fase Burguesa ou Revolução de Fevereiro (segundo o calendário russo da época).", "O que aconteceu?", "Em fevereiro de 1917, grandes manifestações tomaram as ruas de Petrogrado (atual São Petersburgo).", "O exército, cansado da guerra, se recusou a reprimir o povo e se juntou aos protestos.", "O czar Nicolau II foi forçado a renunciar ao trono. O regime absolutista, que durava séculos, chegava ao fim. E quem assumiu o poder?", "Foi criado um Governo Provisório, liderado por políticos da burguesia (grupo formado por pessoas ricas da cidade, como empresários e donos de fábricas). Esse governo prometeu liberdades civis, reformas e uma nova constituição.", "Mas o povo queria mais…", "O Governo Provisório não tirou a Rússia da Primeira Guerra Mundial, e isso revoltou o povo.", "Além disso, não deu terra aos camponeses nem melhorou a vida dos operários.", "Por isso, os bolcheviques, liderados por Lênin, começaram a ganhar força. Eles queriam uma revolução mais radical, que realmente mudasse a vida do povo.", "A Fase Burguesa foi o começo da Revolução Russa. O czar caiu, mas os problemas continuaram. O povo queria mais do que promessas — queria pão, paz e terra. E isso abriria caminho para a próxima fase: a Revolução Socialista.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A Fase Bolchevique – O poder para os sovietes!", "body": ["Depois da queda do czar em fevereiro de 1917, a Rússia passou a ser governada por um Governo Provisório, controlado pela burguesia. Mas a situação do povo não melhorou: a fome continuava, a guerra não tinha fim e as terras não foram distribuídas.", "Foi nesse momento que cresceu a força de um grupo político radical: os bolcheviques.", "Quem eram os bolcheviques?", "Eram revolucionários socialistas, liderados por Vladimir Lênin.", "Defendiam que o poder deveria estar nas mãos dos sovietes (conselhos formados por operários, camponeses e soldados).", "Tinham um lema simples, mas poderoso: “Paz, terra e pão!”", "O povo queria mudanças de verdade", "Muitos trabalhadores e soldados começaram a apoiar os bolcheviques, porque viam que o Governo Provisório não representava o povo.", "Lênin e seu partido diziam que era hora de fazer uma segunda revolução, desta vez socialista, para entregar o poder às massas populares.", "Assim começa a Fase Bolchevique da Revolução Russa: um momento em que o povo se levantou mais uma vez — agora não apenas contra um rei, mas contra um governo que prometia, mas não cumpria. Os bolcheviques queriam transformar a Rússia de verdade.", "Prof: Marcelo Oliveira  História Geral.", "A Guerra Civil", "Apenas haviam concluído a paz com as potências centrais, os bolcheviques viram-se a braços com uma terrível guerra civil. Os proprietários e capitalistas não se conformavam com a perda de seus bens. Além disso, os aliados estavam decididos a punir a Rússia e para isso enviaram tropas a esse país, a fim de apoiar as forças dos generais reacionários. Resultou daí uma prolongada e sangrenta luta entre os vermelhos, ou bolcheviques de um lado, e os brancos, ou seja, os reacionários e seus aliados estrangeiros do outro. De parte a parte foram cometidas horríveis barbaridades. Os brancos chacinavam os habitantes das aldeias tomadas, tanto homens quanto mulheres e crianças. Os vermelhos instauraram o reinado do terror, a fim de eliminar espiões e contra-revolucionários. Foi criada uma comissão extraordinária, conhecida como Tcheká, para prender e punir as pessoas suspeitas.", "Sob a liderança de Trotsky, o Exército Vermelho venceu gradualmente a guerra civil. Em 1920, os generais brancos tinham sido derrotados. Os poloneses tentaram invadir a Rússia, mas foram derrotados, e o Exército Vermelho invadiu a Polônia. Trotsky se opôs. Declarou que a revolução não podia ganhar terreno exclusivamente através de baionetas e que os trabalhadores poloneses acabariam respondendo aos apelos de patriotismo e combatendo os russos. Lenin, ao contrário, afirmou que o Exército Vermelho seria bem recebido na Polônia e que, quando alcançasse a fronteira da Alemanha, os comunistas alemães também se insurgiriam. Mas, o Exército Vermelho foi derrotado às portas de Varsóvia. Lenin mudou de tática e passou a insistir na paz. O Tratado de Riga entregou à Polônia grandes áreas de território étnico russo.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A NEP – Um novo caminho para a Rússia", "body": ["Depois da Revolução Bolchevique de 1917, a Rússia passou por grandes transformações. Os bolcheviques tomaram o poder e criaram um governo socialista. Mas os primeiros anos foram muito difíceis.", "Entre 1918 e 1921, o país enfrentou a Guerra Civil Russa — de um lado, os vermelhos (revolucionários) e do outro, os brancos (contra-revolucionários).", "Além disso, a economia entrou em colapso: fábricas paradas, colheitas fracassadas, fome e revoltas.", "O que fazer diante de tanto caos?", "Em 1921, o líder Vladimir Lênin percebeu que era preciso mudar de estratégia para salvar a revolução e recuperar a economia. Foi aí que ele criou a NEP — Nova Política Econômica.", "O que foi a NEP?", "A NEP foi uma mistura de socialismo com algumas ideias do capitalismo. Lênin dizia:", "“Um passo atrás para dar dois passos à frente.” Com a NEP:", "Os camponeses podiam vender parte de sua produção no mercado;", "Pequenas empresas privadas foram permitidas;", "O comércio voltou a funcionar com mais liberdade;", "O Estado continuava controlando as grandes indústrias, bancos e ferrovias.", "O resultado?", "A economia russa melhorou. As cidades voltaram a se movimentar, o comércio cresceu e a fome diminuiu.", "Mas muitos comunistas criticaram a NEP, dizendo que ela era um “retrocesso capitalista”.", "A NEP foi uma solução temporária para salvar a Revolução Russa. Mesmo com críticas, ela ajudou a Rússia a sair do caos e preparar o caminho para o futuro da União Soviética.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A Ditadura de Stalin – O governo de ferro da União Soviética", "body": ["Após a morte de Vladimir Lênin, em 1924, começou uma disputa pelo poder na União Soviética. Quem venceu essa disputa foi Josef Stalin, que aos poucos se transformou em um dos líderes mais poderosos — e temidos — da história do século XX.", "Quem foi Stalin?", "Stalin era um dos líderes do Partido Comunista.", "Subiu ao poder com muita estratégia e eliminou seus rivais, como Trotsky.", "Assumiu o comando total da União Soviética e implantou uma ditadura.", "Como era o governo de Stalin?", "Ditadura: Stalin controlava tudo — o governo, o partido, a imprensa, o exército e até a cultura.", "Quem criticava o regime era preso, exilado ou até morto.", "Milhares de pessoas foram perseguidas durante os expurgos, uma série de prisões e execuções de quem era acusado de “trair” o regime."]}, {"title": "Mudanças na economia e na sociedade", "body": ["Stalin acabou com a NEP e lançou os Planos Quinquenais — metas para desenvolver rapidamente a indústria pesada e a agricultura.", "Criou as fazendas coletivas (kolkhozes), onde a terra era dividida e controlada pelo Estado. Muitos camponeses resistiram e foram duramente punidos.", "A União Soviética virou uma potência industrial, mas à custa de trabalho forçado, fome e repressão.", "Culto à personalidade", "Stalin era tratado quase como um “deus”.", "Sua imagem estava em cartazes, livros e até músicas.", "A propaganda mostrava que ele era o “pai do povo”, mesmo com tanta violência.", "A ditadura de Stalin transformou a União Soviética em uma potência mundial, mas com um alto custo humano. Milhões de pessoas sofreram com a repressão, a censura e a fome. Ele ficou conhecido como um líder duro, que governou com mãos de ferro.", "Prof: Marcelo Oliveira  História Geral.", "**Panorama Geral **", "A **Revolução Russa (1917)** foi um **conjunto de transformações políticas, econômicas e sociais** que derrubou o regime czarista e deu origem ao primeiro Estado socialista do mundo — a **União Soviética (URSS)**.", "Ela foi resultado de **anos de desigualdade, repressão e atraso econômico** em relação à Europa Ocidental.", "** Narrativa 1 – Antes da Tempestade: Os Antecedentes da Revolução Russa **", "**Contexto **", "- A Rússia era **um império enorme**, mas **muito atrasado** economicamente.", "- O governo era **absolutista**, comandado pelo **czar Nicolau II**, que mantinha **poder total** e **reprimia qualquer oposição**.", "**Situação social: **", "- **Camponeses** viviam em miséria, sem terras.", "- **Operários** sofriam com jornadas longas e salários baixos.", "- **Sem liberdade política**: quem criticava o czar era preso ou exilado.", "**Fatores que agravaram a crise: **", "- **Derrota na Guerra Russo-Japonesa (1905)** — abalou o prestígio do czar.", "- **Domingo Sangrento (1905)** — repressão violenta contra manifestantes pacíficos.", "- **Primeira Guerra Mundial (1914)** — trouxe fome, inflação e milhões de mortos.", "**Ideias revolucionárias: **", "- Crescimento das **ideias socialistas** entre operários e intelectuais.", "- Surgimento dos **bolcheviques**, liderados por **Lênin**, que defendiam a **revolução popular e o fim do czarismo**.", "Explique aos alunos que a Rússia era uma **“panela de pressão social”** — a qualquer momento poderia explodir.", "** Narrativa 2 – A Fase Burguesa: A Revolução de Fevereiro de 1917 O que aconteceu: **", "- O povo foi às ruas de **Petrogrado** protestar contra a fome e a guerra.", "- **Soldados se recusaram a reprimir** e se uniram ao povo.", "- O **czar Nicolau II renunciou**, acabando com **séculos de monarquia absolutista**.", "**Novo governo: **", "- Criação do **Governo Provisório**, liderado por **políticos burgueses**.", "- Prometeram liberdade e reformas, mas **mantiveram a Rússia na guerra**.", "- **Não resolveram os principais problemas**: fome, terras e paz.", "**Importância: **", "- Foi **uma revolução liberal-burguesa** (sem rei, mas ainda sem socialismo).", "- Serviu de **“ponte” para a revolução seguinte**, a socialista, liderada pelos bolcheviques.", "Dica para explicar: diga que **o povo tirou o czar, mas não tirou a elite** — por isso, a insatisfação continuou.", "** Narrativa 3 – A Fase Bolchevique: O Poder para os Sovietes **", "**Quem eram os bolcheviques: **", "- Grupo revolucionário **socialista** comandado por **Vladimir Lênin**.", "- Defendiam que o poder deveria estar com os **sovietes** — conselhos de operários, camponeses e soldados.", "- Lema: **“Paz, terra e pão”** — simples e direto, falava à vida do povo.", "**O que aconteceu: **", "- Com o fracasso do Governo Provisório, os bolcheviques organizaram a **Revolução de Outubro de 1917**.", "- Tomaram o poder e criaram o **governo dos sovietes**.", "- A Rússia saiu da guerra e começou a construir o **primeiro Estado socialista**.", "Mostre que esta foi a **revolução socialista propriamente dita**, o momento em que o povo realmente assume o poder.", "** A Guerra Civil Russa (1918–1921) Conflito: **", "- Após a revolução, os **“vermelhos” (bolcheviques)** enfrentaram os **“brancos” (monarquistas, burgueses e estrangeiros)**.", "- Os países capitalistas (como Inglaterra e França) **invadiram a Rússia** para tentar derrubar o governo comunista.", "- Foi uma guerra sangrenta, cheia de atrocidades dos dois lados.", "**Consequências: **", "- Vitória dos **vermelhos**, liderados por **Trotsky** e o **Exército Vermelho**.", "- Criação da **Tcheká**, polícia política que perseguia os contra-revolucionários.", "- O país ficou devastado economicamente e socialmente.", "Explique que a Guerra Civil consolidou o poder bolchevique, mas também **endureceu o regime** — a violência criou uma cultura de autoritarismo.", "** Narrativa 4 – A NEP (Nova Política Econômica) Problema: **", "Depois da guerra, a economia russa estava em ruínas — fome, revoltas e miséria.", "**Solução: **", "Em 1921, Lênin criou a **NEP (Nova Política Econômica)** — um **misto de socialismo e capitalismo**.", "**Medidas: **", "- Camponeses podiam **vender parte da produção**;", "- Pequenos negócios privados foram **autorizados**;", "- Comércio interno **reativado**;", "- O Estado manteve o controle das **grandes indústrias e bancos**.", "**Resultado: **", "- Recuperação econômica rápida;", "- Diminuição da fome;", "- Mas causou críticas dentro do Partido: muitos viam a NEP como um **retrocesso capitalista**.", "Diga aos alunos que a NEP foi uma **“pausa estratégica”** para reconstruir o país — Lênin deu “um passo atrás para dar dois à frente”.", "** Narrativa 5 – A Ditadura de Stalin A disputa pelo poder: **", "- Após a morte de Lênin (1924), **Stalin** e **Trotsky** disputaram o comando do Partido.", "- Stalin venceu, exilou Trotsky e se tornou **ditador absoluto** da União Soviética.", "**Características do governo: **", "- **Ditadura totalitária**: controle da política, imprensa, cultura e exército.", "- **Expurgos**: perseguições, prisões e execuções de opositores.", "- **Culto à personalidade**: Stalin era tratado como herói nacional.", "**Economia: **", "- Fim da NEP;", "- Criação dos **Planos Quinquenais** (metas econômicas);", "- Fortalecimento da **indústria pesada**;", "- Coletivização das terras (fazendas coletivas – *kolkhozes*).", "**Consequências: **", "- A URSS se tornou **potência industrial e militar**;", "- Mas à custa de **repressão, fome e milhões de mortes**.", "Mostre aos alunos o contraste: Stalin conseguiu modernizar o país, mas sacrificando **liberdades e vidas humanas** — um verdadeiro “governo de ferro”.", "** Fechamento didático **", "A Revolução Russa é fundamental para compreender o século XX porque:", "- Inspirou movimentos socialistas no mundo todo;", "- Mudou o equilíbrio político global (capitalismo x socialismo);", "- Criou a **União Soviética**, potência que enfrentou os EUA na **Guerra Fria**."]}, {"title": "A Crise de 1929 – Quando a economia desabou", "body": ["Imagine que um dia, de repente, as lojas começam a fechar, as fábricas param, milhares de pessoas perdem o emprego, e até os bancos vão à falência. Foi mais ou menos isso que aconteceu nos Estados Unidos em 1929 — e o mundo inteiro sentiu os efeitos.", "Tudo começou com um grande crescimento", "Depois da Primeira Guerra Mundial, os Estados Unidos viveram uma época de muito crescimento econômico. Era o tempo do “American Way of Life”, ou seja, o modo de vida americano com carros, eletrodomésticos e muita produção nas fábricas.", "As pessoas compravam ações na bolsa de valores (que são pedaços de empresas), acreditando que sempre iam ganhar dinheiro. Era uma época de muito otimismo.", "Mas isso não durou para sempre…", "Em 24 de outubro de 1929, conhecido como a “quinta-feira negra”, muitas pessoas começaram a vender suas ações desesperadamente. Ninguém queria comprar, e os preços das ações despencaram. Foi um verdadeiro pânico financeiro.", "O que aconteceu depois?", "Milhares de bancos e empresas faliram.", "Milhões de pessoas perderam o emprego.", "Muitos ficaram sem casa e sem comida.", "A crise se espalhou para outros países, porque os EUA compravam e vendiam produtos no mundo todo.", "E como os governos reagiram?", "Nos Estados Unidos, o presidente Franklin D. Roosevelt criou o New Deal, um plano de recuperação econômica com obras públicas, ajuda aos desempregados e maior participação do Estado na economia.", "A Crise de 1929 mostrou ao mundo que o capitalismo também tem falhas, e que o crescimento sem controle pode acabar em desastre. Foi um momento difícil, mas que mudou a maneira como os países lidam com a economia até hoje.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "O Nazismo – A ideologia que mergulhou o mundo na escuridão", "body": ["Depois da Primeira Guerra Mundial, a Alemanha estava em crise: o país havia perdido a guerra, sofria com desemprego, pobreza e humilhações impostas pelo Tratado de Versalhes. Foi nesse cenário que surgiu um partido político que prometia “salvar” a Alemanha: o Partido Nazista.", "O que era o Nazismo?", "O Nazismo foi uma ideologia autoritária, racista e violenta, criada por Adolf Hitler, que se transformou em ditador da Alemanha.", "Os nazistas acreditavam:", "Que a Alemanha era uma nação superior às outras.", "Que os judeus, ciganos, comunistas, homossexuais e outras minorias eram \"inimigos\" do povo.", "Que era preciso criar um Estado forte, militarizado e obediente a um líder único — o Führer (título que Hitler deu a si mesmo, que significa “líder” em alemão).", "Como Hitler chegou ao poder?", "Hitler foi ganhando apoio com discursos nacionalistas, prometendo empregos, crescimento e vingança pelas humilhações sofridas.", "Em 1933, virou chanceler e logo depois tomou o poder como ditador, acabando com a democracia.", "O que aconteceu durante o governo nazista?", "Implantou uma ditadura totalitária.", "Criou uma política de perseguição a judeus e outras minorias.", "Usou a propaganda para controlar o que as pessoas viam, liam e pensavam.", "Criou campos de concentração, onde milhões de pessoas foram presas e mortas. Esse extermínio é conhecido como o Holocausto.", "E o mundo reagiu…", "As atitudes agressivas da Alemanha nazista, como invadir outros países, ajudaram a causar a Segunda Guerra Mundial (1939–1945), um dos maiores e mais tristes conflitos da história.", "O nazismo foi uma ideologia perigosa que trouxe muito sofrimento ao mundo. Estudar esse período é importante para que nunca mais algo assim se repita.", "Prof: Marcelo Oliveira", "História Geral."]}, {"title": "A Alemanha de Hitler – A ascensão de um regime autoritário", "body": ["Depois da Primeira Guerra Mundial, a Alemanha enfrentava muitas dificuldades: a economia estava arruinada, muitas pessoas estavam desempregadas, e o país se sentia humilhado pelo Tratado de Versalhes, que impôs duras condições à Alemanha.", "Quem foi Adolf Hitler?", "Hitler era um homem carismático que usava seus discursos para convencer as pessoas de que ele poderia salvar a Alemanha.", "Em 1933, ele foi nomeado chanceler (chefe do governo) e logo começou a controlar o país, transformando a Alemanha numa ditadura.", "O que mudou na Alemanha?", "Hitler acabou com a democracia e criou um governo totalitário, onde só ele mandava.", "O Estado controlava a imprensa, a cultura e a educação.", "Grupos considerados “inimigos” eram perseguidos, principalmente os judeus, que foram vítimas de discriminação e violência.", "Hitler criou uma máquina militar poderosa, preparando o país para a guerra.", "Preparando para a guerra", "Hitler queria que a Alemanha fosse a nação mais forte do mundo. Para isso, ele:", "Expandiu o exército e a indústria de guerra;", "Invadiu países vizinhos, como a Polônia, o que iniciou a Segunda Guerra Mundial em 1939.", "Consequências", "A Alemanha de Hitler causou uma enorme destruição e sofrimento, com milhões de mortes durante a guerra e o trágico Holocausto, o genocídio de judeus e outros grupos perseguidos.", "Estudar a Alemanha de Hitler é importante para entendermos como regimes autoritários podem surgir e os perigos que trazem para a humanidade.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "O Antissemitismo – O preconceito contra os judeus", "body": ["O antissemitismo é o nome dado ao ódio e preconceito contra os judeus. Esse sentimento existe há muitos séculos e causou muita dor e sofrimento para esse povo.", "Quem são os judeus?", "Os judeus são um povo com uma religião, cultura e história muito antigas. Eles têm suas próprias tradições, como o Judaísmo, e viviam em várias partes do mundo.", "De onde vem o antissemitismo?", "O antissemitismo tem várias causas ao longo da história:", "Na Idade Média, os judeus eram acusados de serem responsáveis por problemas sociais ou econômicos, muitas vezes sem provas.", "Foram expulsos de vários países, perseguidos e obrigados a viver em áreas específicas chamadas guetos.", "Preconceitos religiosos, econômicos e culturais ajudaram a espalhar o ódio contra eles.", "O antissemitismo na Alemanha nazista", "No século XX, o antissemitismo ficou muito forte na Alemanha, especialmente com o surgimento do nazismo e de Adolf Hitler. Os nazistas culparam os judeus por muitos problemas da Alemanha, como a derrota na Primeira Guerra Mundial e a crise econômica.", "Isso levou a uma perseguição brutal:", "Os judeus foram expulsos de suas casas e perderam seus direitos.", "Milhares foram enviados para campos de concentração, onde muitos morreram.", "Esse massacre é chamado de Holocausto e é um dos episódios mais tristes da história.", "Por que é importante conhecer isso?", "Entender o antissemitismo ajuda a combater o preconceito e a promover o respeito entre todas as pessoas, independentemente de sua religião ou origem.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A Ascensão da Alemanha Nazista", "body": ["Após a Primeira Guerra Mundial, a Alemanha passou por uma grande crise. O país tinha perdido a guerra, e o Tratado de Versalhes impôs duras punições que deixaram a economia fraca, muitas pessoas desempregadas e o povo desanimado.", "A crise e o descontentamento", "A Alemanha vivia momentos difíceis:", "Muitas famílias estavam pobres.", "O governo não conseguia resolver os problemas do país.", "As pessoas queriam um líder forte que mudasse essa situação.", "O surgimento de Adolf Hitler", "Nesse momento, Adolf Hitler, líder do Partido Nazista, apareceu prometendo:", "Devolver o orgulho à Alemanha.", "Criar empregos e fortalecer a economia.", "Fazer o país ser respeitado novamente no mundo.", "Hitler usava discursos fortes, cheios de emoção, que conquistaram muitas pessoas.", "Como ele chegou ao poder?", "Em 1933, Hitler foi nomeado chanceler da Alemanha.", "Rapidamente, ele acabou com a democracia e se tornou ditador.", "Ele proibiu partidos políticos, censurou jornais e controlou tudo.", "O que isso significou para a Alemanha?", "Com Hitler no comando, o país virou uma ditadura nazista, onde o governo mandava em tudo e perseguia quem discordasse, principalmente os judeus e outras minorias.", "A ascensão da Alemanha nazista mostra como uma crise pode fazer as pessoas buscarem soluções rápidas, mesmo que isso signifique perder a liberdade e causar muita dor.", "Prof: Marcelo Oliveira", "História Geral"]}, {"title": "A Preparação para a Segunda Guerra Mundial", "body": ["Depois que Adolf Hitler assumiu o poder na Alemanha, ele começou a preparar o país para a guerra. Hitler queria expandir o território alemão e tornar a Alemanha a nação mais poderosa da Europa.", "Rearmamento e indústria", "Hitler investiu pesado na indústria de armas e no fortalecimento do exército alemão.", "Isso gerou muitos empregos, mas também aumentou a tensão com outros países, que temiam o poder militar da Alemanha.", "A política agressiva", "A Alemanha começou a invadir territórios vizinhos, como a Áustria e a Tchecoslováquia, desrespeitando os acordos internacionais.", "Hitler dizia que estava apenas “unindo” povos de língua alemã, mas, na verdade, queria dominar a Europa.", "O fracasso das tentativas de paz", "Muitos países tentaram evitar a guerra, fazendo acordos para tentar satisfazer Hitler, política chamada de apazamento.", "Mas Hitler não parou, e a tensão continuou crescendo.", "O estopim da guerra", "Em 1º de setembro de 1939, a Alemanha invadiu a Polônia. Esse ataque foi o começo da Segunda Guerra Mundial, que duraria seis anos e mudaria o mundo para sempre.", "A preparação para a guerra mostra como o aumento do militarismo e a ambição por poder podem levar a grandes conflitos e tragédias.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "O Fascismo Italiano — As causas da Revolução Fascista", "body": ["Depois da Primeira Guerra Mundial, a Itália vivia um momento de muitas dificuldades. Apesar de ter vencido a guerra, o país saiu muito enfraquecido e com vários problemas sociais e econômicos.", "O Nacionalismo Frustrado", "Muitos italianos estavam decepcionados porque acreditavam que a Itália não recebeu tudo o que merecia na divisão dos territórios após a guerra. Esse sentimento é chamado de nacionalismo frustrado.", "Eles queriam que a Itália fosse uma grande potência na Europa, com territórios importantes.", "Quando isso não aconteceu, o descontentamento cresceu.", "Crise econômica e social", "Muitas pessoas estavam desempregadas e pobres.", "Trabalhadores faziam greves e protestos, e o governo não conseguia resolver os problemas.", "Havia medo do crescimento do socialismo e do comunismo, que defendiam a mudança da sociedade.", "O surgimento do fascismo", "Nesse clima de crise e medo, surgiu o fascismo, liderado por Benito Mussolini. O fascismo prometia:", "Recuperar o orgulho e a força da Itália.", "Acabar com as greves e o caos social.", "Ter um governo forte, comandado por um líder único.", "Assim, muitos italianos apoiaram Mussolini e seu partido fascista, que tomou o poder em 1922.", "O fascismo foi uma resposta autoritária a uma época de crise, marcada pelo desejo de um país forte e unido, mas que também trouxe muita repressão e perda de liberdade para o povo italiano.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "Os Efeitos Desmoralizadores e Humilhantes da Guerra", "body": ["A guerra não é apenas uma luta entre exércitos, mas traz consequências profundas para as pessoas e os países envolvidos. Depois de guerras como a Primeira Guerra Mundial, muitos povos sentiram-se desmoralizados e humilhados.", "Desmoralização dos povos", "Muitas pessoas perderam familiares, amigos e tudo o que tinham durante a guerra.", "Os soldados que voltaram para casa estavam feridos, cansados e com traumas que afetaram suas vidas.", "A esperança de um futuro melhor foi abalada, e a tristeza tomou conta de muitos."]}, {"title": "Humilhação dos países derrotados", "body": ["Países que perderam a guerra, como a Alemanha, foram forçados a aceitar condições duras.", "No Tratado de Versalhes, a Alemanha teve que pagar pesadas indenizações e perder territórios.", "Isso gerou um sentimento de injustiça e revolta entre os alemães, que se sentiram humilhados e traídos."]}, {"title": "Consequências para o futuro", "body": ["A humilhação e o descontentamento abriram espaço para o surgimento de líderes que prometiam recuperar a dignidade, como Hitler na Alemanha.", "Assim, o ressentimento gerado após a guerra ajudou a preparar o caminho para novos conflitos.", "Entender esses efeitos nos ajuda a perceber por que a guerra traz consequências que vão muito além dos campos de batalha, afetando toda a sociedade e até o futuro do mundo.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A Oposição ao Bolchevismo", "body": ["A mais grave conseqüência da guerra talvez tenha sido, pelo menos em relação à classe superior e à media, o desenvolvimento do radicalismo econômico. À medida que cresciam as privações e o caos, os socialistas abraçaram uma filosofia análoga ao bolchevismo. Em 1918, o partido decidiu ingressar na Internacional de Moscou. Na eleições de novembro de 1919, conquistou cerca de um terço das cadeiras da Câmara de Deputados. No inverno seguinte, os operários socialistas assumiram o controle de cerca de cem fábricas e tentaram administrá-las em benefício do proletariado. O radicalismo alastrou-se também pelas zonas rurais, onde se organizaram as chamadas “ligas vermelhas” para dividir as grandes propriedades e forçar o proprietário agrário a reduzir as rendas. Em 1921, porém, tinha praticamente passado o perigo da bolchevização da Itália. O radicalismo revolucionário acalmou-se após a volta de uma delegação que fora à Rússia estudar as condições in loco e após o fracasso das tentativas dos operários para administrar as fábricas. Não obstante, as classes proprietárias tinham passado por um grande susto e estavam por isso dispostas a apoiar o desenvolvimento do fascismo, na esperança de salvar da confiscação pelo menos uma parte dos seus bens.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "O Colapso do Regime Parlamentar", "body": ["A causa imediata da revolução fascista foi o colapso do regime parlamentar. A paralisação dos negócios e a condição de quase anarquia que reinava em muitas partes do país tornavam praticamente impossível a arrecadação de uma receita adequada. Daí avultarem cada vez mais os déficits orçamentários . A essa dificuldade, juntava-se um impasse parlamentar. Nas eleições de 1921, quatro partidos diferentes obtiveram forte representação na Câmara dos Deputados, mas nenhum deles tinha maioria. Os dois maiores, o Partido Socialista e o Partido Popular (católico), andavam constantemente em rixa; nenhum dos dois queria apoiar um gabinete chefiado por um membro do outro. Em resultado disso, tornava-se quase impossível o funcionamento do governo. Raras vezes conseguia um ministério permanecer no poder o tempo suficiente para deixar algo realizado. Estava praticamente paralisada a máquina legislativa. Com o correr do tempo, foi aumentado o descontentamento causado pelas intermináveis contendas entre os partidos. Pelas alturas do outono de 1922, o parlamento já não tinha, por assim dizer, um único amigo em todo o país. Os jornais denunciavam não só a insanável situação parlamentar, mas todo o sistema de governo das maiorias. Isso não era novidade para a Itália, pois muita gente, nos anos anteriores à guerra, havia considerado o regime parlamentar como importação estrangeira. Não obstante, a propagação intensiva da idéia muito contribuiu para encorajar os adeptos militantes do governo de um só homem.", "Prof: Marcelo Oliveira", "História Geral."]}, {"title": "O Surgimento do Fascismo", "body": ["A palavra fascismo tem origem dupla. Deriva em parte do latimfasces,o machado rodeado de um feixe de varas que simbolizava a autoridade do Estado romano; liga-se também à palavra italianafascio,que significa grupo ou bando. Os fasci foram organizados desde outubro de 1914 como unidades de agitação, que visavam impedir a Itália a dar sua adesão à causa da Entente. Eram compostos de idealistas jovens, futuristas, nacionalistas fanáticos, empregados da classe média entediados e de inadaptados de todos os tipos.", "Mussolini tornou-se o chefe do fascio de Milão. Depois que a Itália entrou na guerra, os grupos fascistas dedicaram-se a combater o derrotismo. Veio então o período do “esquerdismo”, de 1918 a 1921. As atividades esquadristas compreendiam uma campanha de terrorismo contra todos os que fossem considerados inimigos do povo.", "Os métodos consistiam em táticas brutais, como a de espancar a vítima até a inconsciência, a de arrancar-lhe os dentes ou administrar-lhe doses maciças de óleo de rícino. Também se praticavam o rapto e o assassínio. A maior parte das agressões foram perpetradas contra radicais, mas em alguns casos as vítimas eram aproveitadores ou proprietários rurais que se negavam a reduzir as rendas. Em Florença, alguns lojistas teimosos apanharam e tiveram suas lojas fechadas a cadeado, com este aviso na porta: “Fechado por motivo de roubo reiterado”. O próprio Mussolini declarou certa ocasião que “seria um bom exemplo pendurar nos lampiões alguns atravessadores”.", "Mas essas tentativas para atrair as classes mais pobres não tiveram acolhida muito entusiástica por parte do proletariado, pois em muitas regiões da Itália os filhos de ricos industrialistas e de proprietários rurais eram demasiado conhecidos como discípulos de Mussolini.", "A plataforma original do movimento fascista foi preparada por Mussolini em 1919. Era um documento surpreendentemente radical que, entre outras coisas, exigia o Sufrágio Universal, a abolição do senado, a instituição legal da jornada de oito horas, um pesado imposto sobre o capital, o confisco de 85% dos lucros de guerra, a aceitação da Liga das Nações, a “oposição a todos os imperialismos” e a anexação de Fiúme e da Dalmácia. Essa plataforma foi mais ou menos aceita oficialmente até maio de 1920, quando foi suplantada por outra de caráter muito mais conservador. Com efeito, o novo programa omitia todas as referências à reforma econômica e consistia unicamente na condenação do “socialismo dos políticos” e em algumas vagas afirmações sobre a “reivindicação” dos princípios em torno dos quais se tinha travado a guerra. Nem com a primeira, nem com a segunda plataforma conseguiram os fascistas grande sucesso político. Mesmo depois das eleições de 1921, tinham somente 35 representantes na Câmara dos Deputados.", "Os fascistas compensavam o seu reduzido número com uma agressividade disciplinada e uma enérgica resolução. Quando o antigo regime se tornou tão decrépito que abdicou praticamente de todas as suas funções, prepararam-se para tomar posse do governo. Em setembro de 1922, Mussolini começou a falar abertamente em Revolução e lançou o grito “ A Roma “.", "Em outubro, apresentou ao governo um ultimato em que exigia novas eleições, uma política externa vigorosa e cinco pastas no gabinete para si e para os seus partidários. Como o primeiro-ministro e o parlamento não tomassem conhecimento dessas exigências, iniciou-se a marcha sobre Roma. Em 28 de outubro, um exército de cerca de 50.000 milicianos fascistas ocupou a capital. O primeiro-ministro renunciou e no dia seguinte Vitor Manuel III convidou Mussolini para organizar um gabinete. Assim, sem disparar um só tiro, as legiões de camisas-negras haviam assumido o controle do governo italiano. A explicação de tal fato deve ser procurada não na força do fascismo, mas no caos criado pela guerra e na falta de uma dedicação firme do povo italiano ao regime constitucional. A Revolução Fascista", "Em julho de 1923, Mussolini forçou a aprovação, pelo parlamento, de uma nova lei eleitoral, segundo a qual o partido que conquistasse a maioria de votos numa eleição nacional receberia automaticamente dois terços das cadeiras da Câmara dos Deputados. Na primeira eleição realizada dentro da vigência dessa lei os fascistas alcançaram não só mais sufrágios do que qualquer outro partido, mas dois terços da votação total. Quando o novo Parlamento se reuniu, em maio de 1924, o líder socialista Matteotti acusou os políticos fascistas de desonestidade e de violência nas eleições. Em 10 de junho, Matteotti foi raptado e assassinado por bandidos camisas-negras, de acordo com ordens emanadas do gabinete. O crime provocou violenta reação acompanhada de clamores insistentes para que os fascistas abandonassem o poder. Mas por fim a tempestade amainou e Mussolini pôde dedicar-se a tarefa de introduzir alterações radicais no sistema político. Em 1925, cassou as licenças de todos os advogados antifascistas e aboliu a autonomia das cidades e vilas. No ano seguinte, atingiu o clímax ao declarar ilegais todos os partidos políticos, exceto aquele que chefiava, e ao abolir oficialmente o sistema de gabinete. Daí por diante, o primeiro-ministro seria responsável unicamente perante o rei, ao mesmo tempo que as funções do Parlamento se restringiam à ratificação de decretos.", "O sistema político e econômico da Itália fascista era oficialmente conhecido como Estado Corporativo. Significava isso, em primeiro lugar, que o governo se apoiava em bases econômicas. O povo era representado no governo, não como cidadãos que habitavam determinados distritos, mas na sua qualidade de produtores. O estado corporativo, porém, encarnava igualmente a idéia de que os interesses individuais e de classe deviam subordinar-se aos interesses do Estado. Não devia haver luta de classe entre o capital e o trabalho; eram rigorosamente proibidas as greves e os “lockouts”. Em caso de conflito entre empregados e empregadores, cabia ao Estado a autoridade última para intervir e impor um acordo. O princípio corporativo compreendia também o repúdio completo do “laissez-faire”. Embora se mantivesse em grande parte a propriedade privada e os capitalistas fossem reconhecidos como “classe socialmente produtiva”, os veneráveis princípios da economia clássica foram jogados aos ventos. Toda atividade econômica do cidadão era submetida à regulamentação e qualquer empresa industrial ou comercial podia ser encampada se assim o exigissem os interesses nacionais."]}, {"title": "Observação", "body": ["Segundo um relatório do “Instituto de Reconstrução Industrial”, em 1939 o Estado controlava 25% da indústria italiana. (New York Times, 05 de maio de 1939)"]}, {"title": "A Filosofia do Fascismo", "body": ["A idéia do Estado corporativo era um elemento de enorme importância na teoria fascista, que, todavia, não se limitava de modo algum a esse princípio. As outras doutrinas principais podem ser sumariadas do modo que veremos a seguir:"]}, {"title": "Totalitarismo", "body": ["O Estado enfeixa todos os interesses e toda a lealdade dos seus súditos. “Nada deve haver acima do Estado, nada fora do Estado, nada contra o Estado.” Visto que o Estado nada pode realizar a não ser que os seus súditos se identifiquem com um objetivo comum, só pode existir um partido fascista e uma educação fascista."]}, {"title": "Nacionalismo", "body": ["A nação é a mais alta forma de sociedade que a raça humana pôde desenvolver. Tem alma e vida própria, distintas das vidas e das almas dos indivíduos que a compõem. Jamais poderá haver uma verdadeira harmonia de interesses entre dois ou mais povos distintos. Por conseguinte, o internacionalismo é uma grosseira perversão do progresso humano. É preciso tomar forte e grande a nação, pela auto-suficiência, por um exército poderoso e pela rápida elevação do índice de natalidade."]}, {"title": "Idealismo", "body": ["A filosofia do fascismo era uma filosofia idealista, no sentido de renunciar à interpretação materialista da história. A nação, segundo Mussolini, podia tornar-se qualquer coisa que desejasse; seu destino não estava traçado para sempre pela posição geográfica ou pela extensão dos recursos naturais.", "O idealismo desenvolveu-se originariamente como um protesto contra o derrotismo dos anteriores governantes da Itália, segundo os quais o país estava fadado a permanecer uma potência de terceira ordem por não ter carvão."]}, {"title": "Romantismo", "body": ["A razão jamais poderá ser um instrumento adequado para a solução dos grandes problemas racionais. O intelecto precisa ser completado pela fé mística, pelo autosacrifício e pelo culto do heroísmo e da força. “O espírito fascista é vontade, não intelecto”."]}, {"title": "Autoritarismo", "body": ["A soberania do Estado é absoluta. O cidadão não tem direitos, mas apenas deveres. O que as nações necessitam não é de liberdade, mas de trabalho, ordem e prosperidade. A liberdade é “um caráter em putrefação”, um dogma cedido da Revolução Francesa. O Estado deveria ser governado por uma elite que tivesse provado, pela força e por uma compreensão superior dos idéias nacionais, o direito de governar ."]}, {"title": "Militarismo", "body": ["A luta é a origem de todas as coisas. As nações que não se expandem acabarão por fenecer e morrer. A guerra exalta e enobrece o homem, e regenera os povos ociosos e decadentes."]}, {"title": "Realizações do Regime Fascista", "body": ["Nenhum espírito despreconcebido poderá negar que o regime fascista da Itália tivesse a seu crédito algumas realizações notáveis. Em junho de 1940, quando o país entrou na guerra, o governo tinha reduzido o analfabetismo, conseguido o que parecia ser uma solução satisfatória da velha contenda com a Santa Sé e eliminando a Máfia, ou Organização da Mão Negra, na Sicília. Conseguira também certo número de melhoramentos na esfera econômica.", "A tentativa de tornar a Itália auto-suficiente tivera como resultado uma grande alta de preços para certos artigos. Se bem que os negócios e as condições de emprego fossem, indubitavelmente, mais estáveis do que nos anos que se seguiram imediatamente à Primeira Guerra Mundial, nada indicava que o padrão de vida dos trabalhadores houvesse experimentado uma melhora sensível. É verdade que os salários subiram, mas em vista da alta de preços e do movimento no sentido de prolongar as horas de trabalho, é duvidoso que tenha ocorrido um aumento verdadeiro nos salários reais. Acresce que os italianos foram obrigados a comprar a estabilidade e a ordem a preço de uma mortal uniformidade de pensamento e ação-condição que o próprio Mussolini descrevera, em 1914, como tédio e imbecilidade. Não se deve esquecer também que o governo fascista envolveu-se em duas dispendiosas aventuras no setor das guerras estrangeiras: a conquista da Etiópia, em 1935/36, e a intervenção na guerra civil espanhola de 1936/39. Havia poucos indícios de que qualquer desses empreendimentos tivesse sido bem recebido pelo povo italiano, ou de que os proveitos para o país viessem a compensar os sacrifícios.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "A SEGUNDA GUERRA MUNDIAL", "body": ["Expansionismo territorial", "Japão: ocupou a Manchúria e regiões ao norte da China", "Itália: anexou a Abissínia (Etiópia) e a Albânia ao seu território", "Alemanha: desrespeito a vários itens do Tratado de Versalhes, como a remilitarização do país e o desenvolvimento da indústria bélica. Além disso, Hitler alimentava um sonho expansionista e começou a ocupar territórios na Europa, defendendo a idéia do “espaço vital”. Em 1938, anexou a Áustria (Anschluss) e, no mesmo ano, expandiu territórios em direção ao leste, ocupando parte da Checoslováquia (Sudetos, Boêmia e Morávia).", "Diante da agressão expansionista de Alemanha, Japão e Itália, as potências liberais européias responderam com uma “política de apaziguamento”, procurando repreender esses países, mas não agredi-los na tentativa de evitar um conflito armado na Europa.", "Prof: Marcelo Oliveira  História Geral.", "A Guerra Civil Espanhola", "Conflito envolvendo republicanos socialistas, que derrubaram a monarquia em 1936, e falangistas (grupo radical de direita) contrários ao socialismo. Os regimes totalitários da Europa, Alemanha e Itália sobretudo, apoiaram os falangistas, liderados pelo general Francisco Franco, enviando soldados e armas. Ao mesmo tempo, a União Soviética e socialistas de vários países do mundo engajaram-se na luta republicana.", "A guerra devastou o território espanhol, que foi violentamente bombardeado por aviões alemães, e serviu para o teste de novos equipamentos bélicos, inclusive armas químicas. A vitória coube aos falangistas que se mantiveram no poder até 1979.", "A vitória sobre os socialistas na Espanha fortaleceu a luta anti-comunista e deu origem ao", "EIXO Roma, Berlim, Tóquio que, entre outros acordos de ajuda mútua, formalizaram o Pacto Antikomintern,união para combater o comunismo internacional de uma maneira geral e a União Soviética especificamente.", "Prof: Marcelo Oliveira  História Geral.", "Os Conflitos Militares", "Mesmo combatendo o comunismo, o governo alemão assinou com a União Soviética um pacto de não-agressão por dez anos. Com isso, obteve a neutralidade daquele país em caso de invasão do corredor polonês, faixa de terra tirada da Alemanha pelo Tratado de Versalhes, intenção acalentada há anos pelos alemães. A União Soviética, em compensação, poderia se apoderar das terras a leste da Polônia sem intervenção alemã.", "Assim, em 1o. de setembro de 1939, tropas alemãs avançaram sobre a Polônia e, dois dias depois, França e Inglaterra declararam guerra à Alemanha. No final do mês de setembro, a Polônia já havia sido completamente dominada pelos nazistas.", "Hitler procurou vencer rapidamente o conflito e adotou o plano chamado “blitzkrieg”, realizando ataques maciços com a infantaria, artilharia e aviação sobre os países da Europa Ocidental. Em poucas semanas ocupou a Dinamarca e a Noruega, avançou sobre os territórios da Holanda e da Bélgica atingindo o território francês e, em 14 de junho de 1940, os nazistas ocupavam Paris. O governo da França assinou a rendição, iniciando uma fase de cooperação com os nazistas (governo de Vichy), enquanto clandestinamente desenvolveu-se o movimento de resistência contra as forças de ocupação.", "Vencida a França, os alemães dirigiram suas forças contra a Inglaterra que foi impiedosamente bombardeada pela aviação alemã (Luftwaffe) durante dias. A Royal Air Force (RAF) porém conseguiu impedir que os bombardeios alemães garantissem a vitória aos nazistas.", "Enquanto isso, no Oriente, o Japão procurava estabelecer seu controle sobre a China, apesar da resistência chinesa e, na África, tropas italianas avançavam em direção ao canal de Suez com a intenção de interromper as comunicações entre os ingleses e suas colônias orientais.", "Em 1941, a guerra se expandiu com o envolvimento de dois países. De um lado, a", "Alemanha, desrespeitando o pacto germano-soviético, enviou tropas para ocupar a União Soviética e cercou três importantes cidades: Moscou, Leningrado e Stalingrado. De outro, o Japão atacou a base naval americana no Pacífico chamada Pearl Harbour, obrigando os Estados Unidos a entrarem no conflito.", "A partir de 1942 os rumos da guerra começaram a se inverter com expressivas vitórias dos Aliados contra o Eixo. A mais importante delas foi a batalha de Stalingrado em que a população da cidade conseguiu vencer os nazistas e aprisionar milhares de soldados. A batalha de El Alamein permitiu aos Aliados deslocaram-se ao longo do Norte da África, atingindo o território italiano e forçando a rendição de Mussolini em 1943. Finalmente, a vitória americana sobre os japoneses na batalha de Midway ajudou a enfraquecer os países do Eixo.", "Em junho de 1944, tropas aliadas desembarcaram na Normandia (o “Dia D”), iniciando a desocupação da França e impondo terríveis derrotas aos nazistas que já se achavam combalidos pelos constantes ataques soviéticos do lado leste. Em 2 de maio de 1945, a Alemanha rendeu-se ao Exército Vermelho.", "O Japão ainda relutava em abandonar o conflito, mas, em agosto de 1945, os americanos jogaram duas bombas atômicas sobre seu território forçando a rendição japonesa.", "Prof: Marcelo Oliveira  História Geral."]}, {"title": "Guerra Fria – Os Reflexos da Guerra sobre os Estados Unidos", "body": ["Depois da Segunda Guerra Mundial, o mundo ficou dividido em dois blocos: de um lado, os Estados Unidos, representando o capitalismo; do outro, a União Soviética, representando o socialismo. Esse conflito, sem batalhas diretas entre os dois, ficou conhecido como Guerra Fria.", "Como os Estados Unidos foram afetados?", "1. Corrida Armamentista", "Os Estados Unidos investiram muito dinheiro em armas, principalmente bombas atômicas e mísseis. Eles queriam estar preparados caso a União Soviética atacasse.", "2. Corrida Espacial", "Os americanos queriam
