"João Goulart: Fase Presidencialista (1961-1964)", "Contexto histórico:", "- João Goulart, conhecido como Jango, foi vice-presidente de Juscelino Kubitschek e depois de Jânio Quadros.", "- Em 1961, Jânio renunciou à presidência e houve uma grande crise política para a posse de João Goulart, que era visto como uma figura de esquerda e causava receio em setores conservadores.", "A posse de João Goulart:", "- Inicialmente, setores militares e políticos tentaram impedir sua posse.", "- Para resolver a crise, foi criado o Parlamentarismo como um regime provisório que limitava os poderes do presidente e dava maior poder ao primeiro-ministro.", "- Em 1963, por meio de um plebiscito, o parlamentarismo foi rejeitado e o presidencialismo foi restaurado, devolvendo plenos poderes a João Goulart.", "Principais ações e desafios de Jango na fase presidencialista:", "- Buscou implementar as chamadas Reformas de Base: reformas agrária, bancária, educacional e tributária para modernizar o país e reduzir desigualdades.", "- Sua agenda reformista enfrentou forte oposição das elites políticas, empresariais e dos setores conservadores do Exército.", "- O país vivia uma grande instabilidade política, econômica e social, com forte polarização entre esquerda e direita.", "- A inflação estava alta e o crescimento econômico desacelerou.", "Conflitos e crise final:", "- Em 1964, uma crescente mobilização contra o governo Jango culminou no golpe militar de 31 de março, que depôs João Goulart.", "- O golpe marcou o início da ditadura militar no Brasil (1964-1985).", "Prof. Marcelo Oliveira  História Geral.", "Mecanismos Básicos que Regeram a Vida Nacional no Brasil desde 1945", "1. Democratização e Regimes Políticos", "- 1945-1964: Período da chamada República Populista, com eleições diretas, alternância de presidentes eleitos, e influência forte das oligarquias regionais e do populismo.", "- Partidos políticos: PTB (Trabalhista), PSD (Social Democrático) e UDN (União Democrática Nacional) dominaram a política.", "- Populismo: Líderes como Getúlio Vargas (retornado ao poder em 1951), Juscelino Kubitschek e João Goulart buscaram apoio popular através de políticas sociais e trabalhistas.", "- 1964: Golpe militar interrompeu a democracia, instaurando um regime autoritário que duraria até 1985.", "2. Economia e Desenvolvimento", "- Industrialização acelerada: A partir de 1950, com destaque para o Plano de Metas de JK (1956-1961), que focou em infraestrutura, energia, transporte e indústria pesada.", "- Import substitution industrialization (ISI): Substituição de importações para desenvolver a indústria nacional, protegida por tarifas alfandegárias.", "- Crise e inflação: Apesar do crescimento, o país enfrentou problemas como inflação alta, desigualdade social e concentração de renda.", "- Era militar: Houve forte intervenção estatal na economia, com abertura para capital estrangeiro e incentivos à modernização industrial.", "3. Conflitos Sociais e Movimentos Populares", "- Crescimento da urbanização e dos movimentos trabalhistas.", "- Tensão entre setores conservadores (militares, elites econômicas) e movimentos populares (sindicatos, grupos de esquerda).", "- Em 1961, a crise política com a posse de Jango e as reformas propostas evidenciou essas tensões.", "4. Papel das Forças Armadas", "- Desde 1945, as Forças Armadas se apresentaram como poder moderador, intervindo em crises políticas para “garantir a ordem”.", "- Participação ativa no golpe de 1964, justificando a intervenção como proteção contra o comunismo e desordem social.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "GOLPE DE 1964", "body": ["No dia 25 de agosto de 1961, o Brasil foi surpreendido com a notícia da renúncia do então presidente da República, Jânio Quadros. O presidente da Câmara, Ranieri Mazzilli, foi empossado no cargo, pois o vice-presidente, João Goulart, achava-se em viagem pelo Oriente. Ao tomar conhecimento da renúncia de Jânio Quadros, ele retornou ao Brasil para ocupar o cargo que legalmente lhe cabia. No entanto, muitos círculos políticos e militares opunham-se à sua posse, por considerá-lo comprometido com as esquerdas. Em São Paulo, os eletivos do II Exército chegaram a ser deslocados e houve tentativas de levante na Aeronáutica (São Paulo e Brasília). Por outro lado, no Rio Grande do Sul houve forte reação em favor de João Goulart, e as forças do Estado, encabeçadas pelo governador Leonel Brizola, foram mobilizadas com o objetivo de marchar para o Norte, para assegurar a posse de João Goulart. Embora refreado pelo Congresso, que a 02 de setembro aprovou uma alteração da Constituição instituindo o regime parlamentarista no país, Goulart tomou posse da presidência da República no dia 07 de setembro. Desde o início do governo teve de enfrentar problemas econômico-financeiros: inflação, desvalorização da moeda, alta de custo de vida e dívida externa do país. A 23 de janeiro de 1963, após um plebiscito no qual cerca de 10 milhões de brasileiros optaram pela nãomanutenção do Parlamentarismo (07/01/1963), o Ato Adicional nº 4 foi revogado e o país voltou ao Presidencialismo.", "Apoiado pelo seu partido, o PTB, e por uma parte do PSD, além de associações e sindicatos, o Presidente prometia grandes reformas sociais, nacionalização das empresas estrangeiras e a realização da reforma agrária, principalmente no Norte e Nordeste do país. Mas as contradições entre seu governo e os setores oposicionistas se acentuavam cada vez mais. Os membros mais importantes da oposição eram os governadores dos estados de São Paulo (Adhemar de Barros), Minas Gerais (José Magalhães Pinto), Guanabara (Carlos Lacerda) e Rio Grande do Sul (Ildo Meneghetti).", "A 13 de março de 1964, num comício realizado em frente à Central do Brasil, no Rio de Janeiro, Goulart assinou publicamente dois decretos: o de nacionalização de todas as refinarias de petróleo particulares e o de criação da SUPRA (Superintendência de Reforma Agrária). A oposição, entretanto, já preparava uma resposta: no dia 19 de março houve em São Paulo uma passeata – a “Marcha da Família com Deus pela Liberdade” – organizada pela União Cívica Feminina, da qual participaram 500 mil pessoas. No dia 20, a Associação dos Marinheiros Navais pedia, numa quebra da disciplina e da hierarquia, a exoneração do ministro da Marinha, Sílvio Mota, que impedira um pronunciamento político do almirante Aragão, do Corpo de Fuzileiros Navais. Alguns marinheiros, cabeças do movimento, foram presos. No dia 25, a Associação voltou a se reunir no Sindicato dos Metalúrgicos, juntamente com representantes do Comando Geral dos Trabalhadores, para exigir a libertação dos colegas presos, além da destituição do Ministro da Marinha, em cujo lugar deveria ser nomeado um “almirante do povo”. No dia 27, os marinheiros amotinados (1200 homens) entregaram-se ao Exército, atendendo a um apelo de João Goulart, que horas depois os punha em liberdade, exonerava Sílvio Mota e atendia a outras reivindicações dos rebeldes.", "Em Minas Gerais, quartel-general da oposição, o governador Magalhães Pinto, os generais Olímpio Mourão Filho e Carlos Luís Guedes, o marechal Odílio Denys e outros preparavam a reação. No dia 29 de março ficou decidido que a revolta militar que derrubaria Jango se iniciaria no dia 02 de abril. Mas, no dia 30 de março, em reunião comemorativa do aniversário da Associação dos Suboficiais e Sargentos da Polícia Militar do Rio de Janeiro, João Goulart reafirmou em discurso seu propósito de manter a política que vinha adotando. No dia 31, os generais Olímpio Mourão Filho (IV Região Militar) e Carlos Luís Guedes (IV Infantaria Divisória) deflagraram o movimento. O governo mineiro lançou, então, por uma cadeia de emissoras de rádio, o manifesto-senha da revolução, cuja autoria é atribuída ao senador Milton Campos.", "Iniciada a rebelião em Minas, as atenções voltaram-se para São Paulo, onde, depois de muita expectativa, os revolucionários conseguiram a adesão do general Kruel, comandante do II Exército. Imediatamente, tropas mineiras marcharam em direção ao Rio e a Brasília. João Goulart encontrava-se na Guanabara e, tendo recebido o manifesto no qual o general Mourão Filho exigia sua renúncia, partiu para Brasília, onde esperava poder controlar a situação. Mas, ao ver que não contava com o dispositivo militar nem com o apoio armado dos grupos que os sustentavam, fugiu para Porto Alegre, no dia 1º de abril. O presidente do senado, Auro de Moura Andrade, declarou vaga a Presidência da República e empossou como presidente em exercício, o presidente da Câmara, Ranieri Mazzilli.", "No Rio Grande do Sul, Goulart encontrou-se com Brizola, que insistia que seu Estado poderia resistir. Goulart recusou qualquer tentativa de resistência e, a 04 de abril de 1964, pediu asilo político ao Uruguai. No dia 09, os ministros militares, brigadeiro Correio de Melo, almirante Augusto Rademaker e general Arthur da Costa e Silva assinaram o Ato Institucional nº 1.", "A 11 de abril, o Congresso Nacional elegeu presidente da República o general Humberto de Alencar Castello Branco, que tomou posse no dia 15.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "Do Silêncio à Voz — A Caminho da Democracia Brasileira", "body": ["Imagine um país onde as pessoas tinham medo de falar. Onde jornais eram censurados, músicas proibidas e opiniões políticas podiam levar à prisão. Esse era o Brasil durante a ditadura militar, que começou em 1964 e durou mais de 20 anos.", "Mas como um povo que vivia sob o silêncio do medo começou a reencontrar sua voz?", "Nos anos 1970, apesar da repressão, o Brasil começava a mudar. A economia, que cresceu muito por um tempo, começou a dar sinais de crise. Ao mesmo tempo, a população começava a se organizar. Estudantes, operários e artistas passaram a questionar o regime. Mesmo com a censura, as ideias circulavam. E cada ato de coragem, mesmo pequeno, era como uma vela acesa na escuridão.", "Na virada da década de 1980, esse movimento ganhou força. Os trabalhadores lideraram grandes greves, exigindo melhores condições. Um novo líder sindical surgia: Luiz Inácio Lula da Silva. No Congresso, surgia o movimento pela volta das eleições diretas para presidente: era a campanha das Diretas Já. Milhões de brasileiros foram às ruas, de preto e branco, de norte a sul, gritando por democracia.", "Mas a primeira tentativa não deu certo. Em 1984, o Congresso não aprovou a emenda que permitiria eleições diretas. Ainda assim, a semente da mudança já tinha sido plantada.", "Em 1985, o regime militar chegou ao fim com a eleição de Tancredo Neves, pelo colégio eleitoral. Tancredo, no entanto, morreu antes de tomar posse, e seu vice, José Sarney, assumiu a presidência. Foi um momento de esperança, mas também de desafios.", "Era preciso reorganizar o país. Em 1988, foi criada uma nova Constituição, conhecida como a “Constituição Cidadã”, que garantiu direitos fundamentais, liberdade de expressão, eleições livres e o fim da censura. O Brasil, enfim, começava a se reconectar com a democracia.", "A partir dali, os brasileiros puderam escolher seus presidentes pelo voto direto novamente — o que só aconteceu em 1989, com a eleição de Fernando Collor de Mello. A democracia ainda era jovem, frágil, cheia de testes e crises, mas agora o povo tinha sua voz de volta.", "⸻", "Frase de impacto final:", "A transição da ditadura para a democracia no Brasil foi um processo de luta e coragem.", "Foi quando o silêncio deu lugar à esperança e o medo se transformou em participação. Foi quando o povo aprendeu que democracia se constrói todos os dias.", "Prof. Marcelo Oliveira  História Geral."]}], "eras": [[0, "Antiguidade"], [8, "Idade Média"], [18, "Idade Moderna"], [29, "Expansão Colonial e Mercantilismo"], [37, "Revoluções Inglesa, Industrial e Iluminismo"], [52, "Revolução Francesa e Era Napoleônica"], [61, "Independências na América Latina"], [76, "Unificações e Imperialismo"], [86, "Guerras Mundiais e Revolução Russa"], [111, "Totalitarismos e Guerra Fria"], [137, "Descolonização da África e Ásia"], [154, "Brasil Colônia"], [295, "Brasil Império"], [443, "Brasil República"], [487, "Era Vargas e Redemocratização"]]}</script>
<script>
(function(){
  var DATA = JSON.parse(document.getElementById('book-data').textContent);
  var chapters = DATA.chapters;
  var eras = DATA.eras; // [[startIndex, label], ...]
  var total = chapters.length;
  var current = 0;

  document.getElementById('chapter-count-cover').textContent = total;
  document.getElementById('chapter-count-side').textContent = total;

  function eraForIndex(i){
    var label = eras[0][1];
    for (var k=0;k<eras.length;k++){
      if (i >= eras[k][0]) label = eras[k][1]; else break;
    }
    return label;
  }
  function eraIndexForIndex(i){
    var idx = 0;
    for (var k=0;k<eras.length;k++){ if (i >= eras[k][0]) idx = k; else break; }
    return idx;
  }

  // ---------- Markdown-ish renderer ----------
  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inline(s){
    s = escapeHtml(s);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    return s;
  }
  function isTableBlock(b){
    var lines = b.split('\n').filter(function(l){return l.trim().length;});
    if (lines.length === 0) return false;
    var pipeLines = lines.filter(function(l){ return l.indexOf('|') !== -1; });
    return pipeLines.length >= Math.max(1, lines.length - 1) && lines.length > 0 && b.indexOf('|') !== -1;
  }
  function renderTable(b){
    var lines = b.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length;});
    var rows = lines.map(function(l){
      var cells = l.split('|').map(function(c){return c.trim();});
      if (cells.length && cells[0]==='') cells.shift();
      if (cells.length && cells[cells.length-1]==='') cells.pop();
      return cells;
    }).filter(function(r){ return r.length && !/^-+$/.test(r[0]); });
    if (!rows.length) return '';
    var html = '<table>';
    rows.forEach(function(r){
      html += '<tr>' + r.map(function(c){ return '<td>'+inline(c)+'</td>'; }).join('') + '</tr>';
    });
    html += '</table>';
    return html;
  }
  function isLabelLine(b){
    return /^[^\n]{1,70}:$/.test(b.trim()) && b.indexOf('\n') === -1;
  }
  function isQuoteLine(b){
    var t = b.trim();
    return (t.charAt(0) === '\u201C' || t.charAt(0) === '"') && b.indexOf('\n') === -1 && t.length < 220;
  }
  function isSignature(b){
    return /(Marcelo Oliveira|Professor:|Prof\.:|Prof:)/.test(b) && b.length < 90;
  }
  function renderBody(blocks){
    var html = '';
    var i = 0;
    while (i < blocks.length){
      var b = blocks[i];
      if (!b || !b.trim()){ i++; continue; }
      if (b.trim().charAt(0) === '-'){
        var items = [];
        while (i < blocks.length && blocks[i].trim().charAt(0) === '-'){
          items.push(blocks[i].trim().replace(/^-\s*/, ''));
          i++;
        }
        html += '<ul>' + items.map(function(it){ return '<li>'+inline(it)+'</li>'; }).join('') + '</ul>';
        continue;
      }
      if (isTableBlock(b)){
        html += renderTable(b);
        i++; continue;
      }
      if (isSignature(b)){
        html += '<p class="signature">'+inline(b)+'</p>';
        i++; continue;
      }
      if (isQuoteLine(b)){
        html += '<p class="quote-line">'+inline(b)+'</p>';
        i++; continue;
      }
      if (isLabelLine(b)){
        html += '<div class="label-line">'+inline(b)+'</div>';
        i++; continue;
      }
      html += '<p>'+inline(b)+'</p>';
      i++;
    }
    return html;
  }

  // ---------- TOC ----------
  var tocEl = document.getElementById('toc');
  function buildTOC(filter){
    tocEl.innerHTML = '';
    var lastEra = -1;
    var any = false;
    for (var i=0;i<total;i++){
      var c = chapters[i];
      if (filter && c.title.toLowerCase().indexOf(filter) === -1) continue;
      any = true;
      var eIdx = eraIndexForIndex(i);
      if (eIdx !== lastEra){
        var g = document.createElement('div');
        g.className = 'era-label';
        g.textContent = eras[eIdx][1];
        tocEl.appendChild(g);
        lastEra = eIdx;
      }
      var item = document.createElement('div');
      item.className = 'toc-item' + (i === current ? ' active' : '');
      item.dataset.idx = i;
      item.innerHTML = '<span class="n">'+(i+1)+'</span><span>'+escapeHtml(c.title)+'</span>';
      item.addEventListener('click', function(){
        goTo(parseInt(this.dataset.idx,10));
        if (window.innerWidth <= 860) closeSidebar();
      });
      tocEl.appendChild(item);
    }
    if (!any){
      var empty = document.createElement('div');
      empty.className = 'toc-empty';
      empty.textContent = 'Nenhum capítulo encontrado.';
      tocEl.appendChild(empty);
    }
  }

  function refreshActiveTOC(){
    var items = tocEl.querySelectorAll('.toc-item');
    items.forEach(function(it){
      it.classList.toggle('active', parseInt(it.dataset.idx,10) === current);
    });
    var activeEl = tocEl.querySelector('.toc-item.active');
    if (activeEl) activeEl.scrollIntoView({block:'nearest'});
  }

  // ---------- Spine ----------
  var spineEl = document.getElementById('spine');
  var spineLabel = document.getElementById('spine-label');
  function buildSpineSegments(){
    for (var k=0;k<eras.length;k++){
      var startI = eras[k][0];
      var endI = (k+1 < eras.length) ? eras[k+1][0] : total;
      var seg = document.createElement('div');
      seg.className = 'seg';
      seg.style.left = (startI/total*100) + '%';
      seg.style.width = ((endI-startI)/total*100) + '%';
      spineEl.appendChild(seg);
    }
    var marker = document.createElement('div');
    marker.className = 'marker';
    marker.id = 'spine-marker';
    spineEl.appendChild(marker);
  }
  function updateSpine(){
    var pct = (current + 0.5) / total * 100;
    document.getElementById('spine-marker').style.left = pct + '%';
    spineLabel.textContent = eraForIndex(current);
  }

  // ---------- Page render ----------
  var pageEl = document.getElementById('page');
  var pageScroll = document.getElementById('page-scroll');
  function renderPage(){
    var c = chapters[current];
    pageEl.innerHTML =
      '<div class="chapter-eyebrow">Capítulo '+(current+1)+' de '+total+' · '+escapeHtml(eraForIndex(current))+'</div>' +
      '<h1 class="chapter-title">'+inline(c.title)+'</h1>' +
      '<div class="chapter-body">'+renderBody(c.body)+'</div>';
    pageScroll.scrollTop = 0;
    document.getElementById('progress-text').textContent = (current+1)+' / '+total;

    var prevBtn = document.getElementById('prev-btn');
    var nextBtn = document.getElementById('next-btn');
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total-1;
    document.getElementById('prev-title').textContent = current>0 ? chapters[current-1].title : '';
    document.getElementById('next-title').textContent = current<total-1 ? chapters[current+1].title : '';

    updateSpine();
    refreshActiveTOC();
    saveProgress();
  }

  function goTo(i){
    if (i < 0 || i >= total) return;
    current = i;
    renderPage();
  }

  // ---------- Persistence ----------
  function saveProgress(){
    try{
      if (window.storage && window.storage.set){
        window.storage.set('historia-geral:last-chapter', String(current), false).catch(function(){});
      }
    }catch(e){}
  }
  function loadProgress(cb){
    try{
      if (window.storage && window.storage.get){
        window.storage.get('historia-geral:last-chapter', false).then(function(res){
          if (res && res.value !== undefined){
            var n = parseInt(res.value,10);
            if (!isNaN(n) && n>=0 && n<total) current = n;
          }
          cb();
        }).catch(function(){ cb(); });
      } else { cb(); }
    }catch(e){ cb(); }
  }

  // ---------- Sidebar (mobile) ----------
  var sidebar = document.getElementById('sidebar');
  var scrim = document.getElementById('scrim');
  function openSidebar(){ sidebar.classList.add('open'); scrim.classList.add('show'); }
  function closeSidebar(){ sidebar.classList.remove('open'); scrim.classList.remove('show'); }
  document.getElementById('menu-toggle').addEventListener('click', function(){
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  scrim.addEventListener('click', closeSidebar);

  // ---------- Controls ----------
  document.getElementById('prev-btn').addEventListener('click', function(){ goTo(current-1); });
  document.getElementById('next-btn').addEventListener('click', function(){ goTo(current+1); });
  document.addEventListener('keydown', function(e){
    if (document.getElementById('reader').classList.contains('visible')){
      if (e.key === 'ArrowRight') goTo(current+1);
      if (e.key === 'ArrowLeft') goTo(current-1);
    }
  });
  document.getElementById('search').addEventListener('input', function(e){
    buildTOC(e.target.value.trim().toLowerCase());
  });

  var bodyEl = document.body;
  document.getElementById('font-sm').addEventListener('click', function(){
    bodyEl.classList.remove('text-size-lg'); bodyEl.classList.add('text-size-sm');
  });
  document.getElementById('font-lg').addEventListener('click', function(){
    bodyEl.classList.remove('text-size-sm'); bodyEl.classList.add('text-size-lg');
  });

  // ---------- Cover ----------
  document.getElementById('start-btn').addEventListener('click', function(){
    document.getElementById('cover').classList.add('hidden');
    document.getElementById('reader').classList.add('visible');
  });

  // ---------- Init ----------
  buildSpineSegments();
  buildTOC('');
  loadProgress(function(){ renderPage(); });
})();
</script>
</body>
</html>
