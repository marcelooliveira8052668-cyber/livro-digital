 sobre o Legislativo.", "Essa tensão culminou na Noite da Agonia (12 de novembro de 1823), quando D. Pedro mandou tropas cercarem a Assembleia e dissolvê-la à força."]}, {"title": "Consequência: a Constituição Outorgada de 1824", "body": ["Após dissolver a Assembleia, D. Pedro impôs uma Constituição autoritária, redigida por um conselho de confiança, com:", "Criação do Poder Moderador (nas mãos do imperador);", "Centralização política;", "Exclusão de participação popular mais ampla.", "Resumo", "A ação legislativa da Assembleia Constituinte de 1823 foi marcada por:", "Tentativas de estabelecer um regime constitucional e representativo;", "Defesa de limites ao poder do imperador;", "Avanços no debate sobre direitos civis e cidadania limitada.", "Mas foi interrompida à força por D. Pedro I, que preferiu manter o controle político através de uma Constituição outorgada em 1824.", "Prof. Marcelo Oliveira  História Geral.", "A Constituição da Mandioca (1823)", "O que foi?", "Foi o projeto de Constituição criado pela Assembleia Constituinte de 1823, pouco depois da Independência do Brasil. Ela nunca chegou a entrar em vigor porque foi rejeitada e barrada por D. Pedro I, mas ficou famosa pelo apelido irônico: “Constituição da Mandioca”.", "Por que esse nome curioso?", "Porque o direito ao voto e à participação política estava ligado à produção agrícola, e a mandioca era uma das principais referências de riqueza no campo. O projeto estabelecia que só poderia votar e ser votado quem tivesse uma determinada renda baseada na produção de alimentos, como farinha de mandioca.", "Exemplo: um cidadão só poderia votar se produzisse o equivalente a 150 alqueires de farinha de mandioca por ano."]}, {"title": "Características principais da Constituição da Mandioca", "body": ["Monarquia constitucional: o imperador teria seu poder limitado pela Constituição. Divisão dos poderes: Executivo, Legislativo e Judiciário independentes.", "Voto censitário rural: só votava quem tivesse uma determinada renda em produtos agrícolas.", "Exclusão da maioria da população: escravizados, mulheres, indígenas e pobres não votavam.", "Defesa da soberania nacional: o imperador não teria poderes absolutos, como o de dissolver a Assembleia."]}, {"title": "Conflito com D. Pedro I", "body": ["O projeto foi considerado ameaçador ao poder imperial. D. Pedro I queria manter fortes prerrogativas (poderes) como: Direito de dissolver a Assembleia;", "Influência direta no governo;", "Autoridade acima dos demais poderes.", "Insatisfeito com a proposta dos deputados, D. Pedro I dissolveu a Assembleia na chamada Noite da Agonia (12 de novembro de 1823), antes que a Constituição fosse aprovada."]}, {"title": "Consequência", "body": ["Sem a aprovação da “Constituição da Mandioca”, D. Pedro I mandou redigir outra Constituição, outorgada em 1824, bem mais autoritária, com a criação do Poder Moderador, que lhe dava total controle político.", "Resumo", "Aspecto Constituição da Mandioca (projeto de 1823)", "Nome popular “Constituição da Mandioca”", "Tipo de governo Monarquia constitucional", "Direito ao voto Baseado em renda agrícola (mandioca e outros)", "Proposta principal Limitar o poder do imperador", "Resultado Rejeitada e Assembleia dissolvida por D. Pedro I", "Consequência Constituição autoritária imposta em 1824", "Prof. Marcelo Oliveira  História Geral.", "A Noite da Agonia (12 de novembro de 1823)", "O que foi?", "A Noite da Agonia foi o episódio em que D. Pedro I mandou cercar e dissolver à força a Assembleia Constituinte de 1823, que estava elaborando a primeira Constituição do Brasil independente.", "Esse evento representa o fim das tentativas de limitar o poder do imperador por meio de uma Constituição liberal e o início de um governo mais autoritário."]}, {"title": "Contexto: tensão entre imperador e deputados", "body": ["Após a independência do Brasil (1822), uma Assembleia Constituinte foi convocada para redigir a nova Constituição.", "A maioria dos deputados queria limitar o poder do imperador e ampliar a atuação do poder legislativo.", "D. Pedro I, porém, não aceitava perder influência nem se submeter ao Legislativo.", "A Assembleia propôs regras como o voto censitário agrícola (baseado na produção, como da mandioca), o que ficou conhecido como \"Constituição da Mandioca\".", "A tensão entre o imperador e os deputados aumentava a cada dia.", "O que aconteceu na Noite da Agonia?", "Na madrugada de 12 de novembro de 1823:"]}, {"title": "Tropas leais a D. Pedro cercaram o prédio da Assembleia;", "body": ["Os deputados foram intimidados, pressionados e forçados a se retirar; A Assembleia Constituinte foi dissolvida por ordem do imperador.", "Esse ato autoritário chocou os políticos liberais da época e ficou conhecido como a “Noite da Agonia”, por causa da tensão, medo e frustração vividos por aqueles que queriam um governo constitucional.", "Consequência direta", "Com a Constituinte dissolvida, D. Pedro I:"]}, {"title": "Nomeou um grupo de confiança para redigir uma nova Constituição;", "body": ["Em março de 1824, outorgou (impôs, sem consulta popular) a Primeira Constituição do Brasil, que criava o Poder Moderador — um quarto poder, nas mãos do imperador, que lhe dava autoridade sobre todos os demais.", "Resumo", "Elemento Detalhes"]}, {"title": "Data 12 de novembro de 1823", "body": ["Local Rio de Janeiro (sede da Assembleia Constituinte) Motivo Impedir que o imperador perdesse poderes", "Ação Tropas cercam o prédio e encerram a Assembleia", "Consequência Fim da Constituinte e imposição da Constituição de 1824"]}, {"title": "Reflexão para alunos", "body": ["A Noite da Agonia mostra como, mesmo após a independência, o Brasil ainda lutava para encontrar o equilíbrio entre liberdade política e autoridade imperial.", "Prof. Marcelo Oliveira", "História Geral.", "A Constituição de 1824", "Promulgada em 25 de março de 1824"]}, {"title": "Primeira Constituição do Brasil", "body": ["Outorgada por D. Pedro I (ou seja, imposta, sem participação do povo ou de uma Assembleia)"]}, {"title": "Contexto histórico", "body": ["Após a dissolução da Assembleia Constituinte na Noite da Agonia (novembro de 1823), D. Pedro I decidiu que ele mesmo, com um grupo de conselheiros de confiança, criaria a Constituição do novo império brasileiro.", "O objetivo era manter a independência do país com centralização do poder nas mãos do imperador.", "Principais características da Constituição de 1824"]}, {"title": "Monarquia hereditária, constitucional e unitária", "body": ["O Brasil foi definido como uma monarquia centralizada, com um único governo nacional.", "O trono seria passado de pai para filho."]}, {"title": "Criação do Poder Moderador", "body": ["Um quarto poder, exclusivo do imperador, além dos três tradicionais (Executivo, Legislativo e Judiciário).", "Permitia que o imperador interviesse em qualquer outro poder.", "D. Pedro I se tornou, na prática, o “árbitro supremo” da política brasileira.", "Voto censitário e indireto", "Só votava quem tivesse renda mínima anual.", "As eleições eram indiretas: o povo votava em eleitores de segundo grau, que escolhiam os deputados.", "Religião oficial: Catolicismo", "A Igreja Católica era a religião do Estado.", "O imperador nomeava os bispos e controlava a Igreja (padroado)."]}, {"title": "Unificação do país", "body": ["Estados (províncias) não tinham autonomia política, tudo era decidido pelo poder central no Rio de Janeiro.", "Pontos polêmicos", "Forte autoritarismo imperial;"]}, {"title": "Exclusão da maioria da população da política (escravizados, mulheres, pobres);", "body": ["Causou revoltas, como a Confederação do Equador (1824) no Nordeste, que queria maior liberdade política.", "Resumo em tabela", "Característica Detalhes", "Tipo de governo Monarquia constitucional centralizada", "Poder Moderador Dava ao imperador controle total sobre o Estado", "Religião oficial Catolicismo (sem liberdade religiosa plena)", "Direito ao voto Restrito a homens com renda mínima (voto censitário)", "Participação popular Quase nula — elites dominavam", "Resultado Constituição duradoura (vigente até 1891), mas autoritária"]}, {"title": "Conclusão", "body": ["A Constituição de 1824 foi um marco na história política do Brasil, mas nasceu de forma autoritária, com poder concentrado no imperador e baixa participação da população. Apesar disso, ela permaneceu em vigor por 67 anos, até o fim do Império, em 1889.", "Prof. Marcelo Oliveira  História Geral.", "A Confederação do Equador (1824)", "O que foi?", "A Confederação do Equador foi uma revolta republicana e separatista que ocorreu em 1824, liderada por províncias do Nordeste brasileiro, principalmente Pernambuco, contra o governo centralizador e autoritário de D. Pedro I."]}, {"title": "Contexto histórico", "body": ["Após a independência do Brasil (1822), muitas províncias esperavam mais autonomia política. Porém, a Constituição de 1824, outorgada por D. Pedro I, centralizou o poder no imperador, criando o Poder Moderador e limitando a participação política das províncias.", "No Nordeste, onde já havia tradições de luta contra o poder central (como a Revolução", "Pernambucana de 1817), essa centralização foi mal recebida, gerando forte insatisfação.", "Onde ocorreu?", "Principalmente nas províncias de:", "Pernambuco (epicentro)", "Ceará", "Rio Grande do Norte"]}, {"title": "Paraíba", "body": ["Essas províncias declararam-se em rebelião contra o Império e tentaram formar um novo país republicano: a Confederação do Equador.", "O que os rebeldes queriam?", "Fim da monarquia e proclamação da República;", "Autonomia das províncias;", "Fim do autoritarismo de D. Pedro I;", "Governo baseado em princípios liberais e democráticos.", "Como foi a revolta?", "Em junho de 1824, Pernambuco declarou-se república independente.", "Um governo provisório foi criado, com figuras como o frei Caneca, Cipriano Barata e Paes de Andrade.", "A Confederação tentou obter apoio externo e outras províncias, mas não conseguiu adesão suficiente.", "Repressão imperial", "O governo de D. Pedro I reagiu rapidamente.", "Enviou tropas e navios de guerra, liderados por Thomas Cochrane, para sufocar a revolta.", "Em poucos meses, os rebeldes foram vencidos.", "Muitos líderes foram presos, executados ou exilados.", "Frei Caneca foi fuzilado após recusar o enforcamento.", "Resumo em tabela", "Aspecto Detalhes", "Ano 1824", "Local principal Pernambuco (e outras províncias do Nordeste)", "Objetivo Criar uma república independente e descentralizada", "Contra quem? D. Pedro I e a Constituição de 1824", "Reação imperial Forte repressão com tropas e marinha", "Resultado Revolta esmagada; líderes mortos ou exilados", "Legado Mostrou o conflito entre centralismo e federalismo no Brasil"]}, {"title": "Importância histórica", "body": ["A Confederação do Equador foi uma das primeiras grandes revoltas políticas do Brasil independente.", "Revelou as tensões entre o poder central e as províncias, algo que continuaria no século XIX.", "Inspirou movimentos futuros de contestação ao poder imperial.", "Prof. Marcelo Oliveira  História Geral.", "A Crise do Primeiro Reinado e a Abdicação do Imperador (1822–1831)"]}, {"title": "Período: 1822 a 1831", "body": ["Dom Pedro I tornou-se imperador em 1822, após declarar a independência do Brasil. Mas o seu governo, conhecido como Primeiro Reinado, foi marcado por crises políticas, econômicas e sociais que levaram à sua abdicação em 1831. Principais causas da crise do Primeiro Reinado", "1. Autoritarismo de D. Pedro I", "Com a Constituição de 1824, D. Pedro I concentrou muitos poderes, criando o Poder Moderador.", "A dissolução da Assembleia Constituinte em 1823 (Noite da Agonia) gerou desconfiança entre políticos e elites provinciais.", "2. Crise econômica", "Após a independência, o Brasil enfrentou dívidas externas, inflação e déficit nas contas públicas.", "O povo sofria com o aumento dos preços, impostos e desemprego.", "- Conflitos internos", "Revoltas e rebeliões surgiram em várias regiões, como:", "Confederação do Equador (1824) no Nordeste.", "Movimentos de oposição ao centralismo do governo imperial.", "- Problemas com Portugal", "D. Pedro I manteve forte ligação com Portugal.", "Quando seu pai, D. João VI, morreu em 1826, ele tentou manter os dois tronos (Brasil e Portugal), o que gerou desconfiança no Brasil.", "A decisão de abdicar do trono português em favor da filha, Dona Maria II, e interferir nos assuntos portugueses aumentou a rejeição aqui.", "5. Perda de apoio popular e político", "D. Pedro era visto como distante e autoritário.", "As camadas populares, os liberais e até setores do Exército começaram a se opor a ele.", "A Noite das Garrafadas (março de 1831), um confronto violento entre portugueses e brasileiros no Rio de Janeiro, mostrou que o clima era de revolta.", "A abdicação"]}, {"title": "Data: 7 de abril de 1831", "body": ["Diante da pressão popular, da oposição política e dos protestos nas ruas, D. Pedro I abdicou do trono brasileiro em favor de seu filho de 5 anos, o futuro D. Pedro II."]}, {"title": "Frase histórica", "body": ["“Declaro que, por minha livre e espontânea vontade, abdico na pessoa de meu muito amado e prezado filho, o senhor D. Pedro de Alcântara.”", "D. Pedro I partiu para a Europa e nunca mais voltou ao Brasil. Lá, envolveu-se nas lutas liberais para restaurar sua filha no trono português.", "Resumo em tabela", "Elemento Detalhes", "Período 1822–1831", "Problemas Autoritarismo, crise econômica, revoltas, impopularidade", "Relação com Portugal Causou desconfiança no Brasil", "Noite das Garrafadas Estopim da crise, com violência nas ruas", "Abdicação 7 de abril de 1831", "Novo imperador D. Pedro II (5 anos na época — início do Período Regencial)", "Consequências", "Início do Período Regencial (1831–1840), marcado por instabilidade.", "Fortalecimento de ideias liberais e republicanas.", "D. Pedro II só assumiria o trono aos 14 anos, em 1840, com o Golpe da Maioridade.", "Prof. Marcelo Oliveira  História Geral.", "Período Regencial (1831–1840)"]}, {"title": "Transição entre os dois reinados de D. Pedro I e D. Pedro II", "body": ["Após a abdicação de D. Pedro I, em 7 de abril de 1831, o Brasil ficou sem um imperador adulto no trono. Como o herdeiro, D. Pedro de Alcântara (futuro D. Pedro II), tinha apenas 5 anos, o país foi governado por regentes.", "O que foi o Período Regencial?", "Foi o intervalo de 9 anos em que o Brasil foi governado por representantes eleitos ou nomeados, já que o imperador era menor de idade. Foi um dos momentos mais conturbados da história do Brasil.", "Características principais", "Característica Descrição", "Imperador menor de idade D. Pedro II só assumiria com 15 anos em 1840", "Governo por regentes Diversas regências: Trina Provisória, Trina Permanente, Una", "(única)"]}, {"title": "Muitas revoltas Diversos conflitos regionais e sociais marcaram esse período", "body": ["Luta entre liberais e conservadores Disputa política acirrada entre centralistas e descentralizadores", "Fases do Período Regencial", "Regência Trina Provisória (1831)", "Três regentes provisórios logo após a abdicação.", "Governo de transição até a eleição dos regentes permanentes.", "Regência Trina Permanente (1831–1835) Três regentes eleitos para um mandato de 4 anos.", "Tentativas de reformas e controle da instabilidade.", "Regência Una (1835–1840)", "Um único regente governava (principal: Padre Diogo Feijó, depois Araújo Lima).", "Ocorreu após aprovação da Lei Regencial de 1834.", "Ainda mais revoltas e conflitos entre liberais e conservadores.", "Principais revoltas durante o Período Regencial", "Revolta Local Motivos", "Cabanagem Pará Miséria, repressão e exclusão dos pobres", "Balaiada Maranhão Rebelião popular contra as elites locais"]}, {"title": "Farroupilha Rio Grande do Sul Disputa fiscal e desejo de maior autonomia provincial", "body": ["Essas revoltas mostravam a fragilidade do governo regencial e a insatisfação em várias regiões do país."]}, {"title": "Golpe da Maioridade (1840)", "body": ["Para conter a instabilidade e restaurar a ordem, os liberais defenderam que D. Pedro II assumisse o trono antes da idade legal (18 anos).", "Em 1840, com apenas 14 anos, D. Pedro II foi declarado maior de idade e coroado imperador.", "Fim do Período Regencial e início do Segundo Reinado.", "Resumo em tabela", "Elemento Detalhes", "Duração 1831–1840", "Imperador menor D. Pedro II, com 5 anos na abdicação do pai", "Governantes Regentes trinos e, depois, regente uno", "Instabilidade Múltiplas revoltas em diferentes províncias", "Luta política Liberais (federalistas) × Conservadores", "Encerramento Golpe da Maioridade (D. Pedro II assume em 1840)", "Importância histórica", "O Período Regencial mostrou:", "A dificuldade de manter o Brasil unido sem uma figura central forte;"]}, {"title": "A disputa por modelos de governo mais descentralizados e democráticos;", "body": ["O crescimento da violência e das revoltas populares frente à exclusão política; Como a solução monárquica foi vista como uma forma de pacificar o país.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "As Regências Trinas e o Avanço Liberal (1831– 1835)", "body": ["Após a abdicação de D. Pedro I, o Brasil entrou em um período de transição política. Como D. Pedro II era criança, o governo passou às mãos de regentes. Nesse contexto, surgiram as Regências Trinas — momentos iniciais do Período Regencial — marcadas pelo fortalecimento de ideias liberais e pela busca de reformas políticas.", "O que foram as Regências Trinas?", "As Regências Trinas eram compostas por três membros, que governavam coletivamente:", "1. Regência Trina Provisória (abril – junho de 1831)", "Nomeada rapidamente após a abdicação de D. Pedro I.", "Tinha como objetivo manter a ordem até que fossem feitas eleições para a Regência Permanente.", "Composta por nomes de concerto político, sem radicalismos.", "2. Regência Trina Permanente (1831–1835)", "Eleita pela Assembleia Geral para um mandato de 4 anos.", "Seus membros foram:", "Brigadeiro Francisco de Lima e Silva (militar moderado)", "José Carneiro de Campos (conservador)", "João Bráulio Muniz (liberal moderado)"]}, {"title": "O Avanço Liberal durante as Regências Trinas", "body": ["Apesar do governo coletivo e moderado, as pressões populares e políticas favoreceram o avanço das ideias liberais, que buscavam:", "Descentralização do poder (mais autonomia para as províncias); Participação política mais ampla (embora ainda limitada às elites); Liberdades civis e reformas administrativas.", "Medidas importantes do período:", "Criação da Guarda Nacional (1831) Substituiu as tropas imperiais.", "Era comandada por líderes locais (elite), aumentando o poder regional.", "Instrumento de controle político dos liberais nas províncias.", "Lei de Interpretação do Ato Adicional (1832–1834)", "O Ato Adicional seria aprovado em 1834, mas a pressão liberal começou antes.", "Objetivo: reformar a Constituição de 1824 para dar mais poder às províncias.", "Aprovado em 1834, criou:", "Assembleias Legislativas Provinciais", "A Regência Una (fim da trina)", "Mais autonomia regional"]}, {"title": "Conflitos e limites do avanço liberal", "body": ["Apesar das reformas, o avanço liberal enfrentava resistência de setores conservadores, temerosos de que a descentralização gerasse instabilidade.", "Além disso, o país passou a sofrer com revoltas e conflitos sociais, como:", "Cabanagem (no Pará)", "Farroupilha (no RS, que começaria em 1835)"]}, {"title": "Sabinada e Balaiada em anos seguintes", "body": ["Esses levantes mostraram que a descentralização e o avanço liberal não atendiam às camadas populares, que continuavam excluídas do poder político e viviam em condições precárias.", "Resumo em tabela", "Elemento Detalhes", "Período 1831–1835", "Tipo de regência Trina (governo de três regentes)", "Avanço liberal Defesa da descentralização, autonomia provincial e reformas"]}, {"title": "Guarda Nacional Criada para fortalecer a elite local", "body": ["Ato Adicional (1834) Concedeu maior autonomia às províncias e criou a Regência Una", "Conflitos Início de várias revoltas (ex: Cabanagem)", "Limitações Mudanças restritas às elites; exclusão do povo das decisões políticas"]}, {"title": "Importância histórica", "body": ["Mostra o início do conflito entre liberalismo e conservadorismo no Brasil Império.", "Inaugura uma fase de maior envolvimento regional e local no poder.", "Revela como o avanço liberal foi controlado pelas elites, sem romper as estruturas sociais desiguais. Prof. Marcelo Oliveira  História Geral.", "As Regências Unas e o Regresso Conservador (1835–1840)", "O que foram as Regências Unas?", "Após o período das Regências Trinas (1831–1835), o Brasil adotou a Regência Una — um governo centralizado nas mãos de um único regente, com o objetivo de dar mais agilidade e controle à administração pública, especialmente em um cenário de muitas revoltas.", "Período das Regências Unas", "1835 a 1840", "Os principais regentes foram:", "Padre Diogo Antônio Feijó (1835–1837)", "Marcos Antônio de Araújo, Visconde de Itaboraí (1837–1840)", "Características das Regências Unas", "Aspecto Detalhes"]}, {"title": "Retorno do conservadorismo Crescimento da influência conservadora contra o avanço liberal", "body": ["Manutenção da autonomia provincial O Ato Adicional de 1834 manteve as Assembleias", "Provinciais", "Revoltas marcantes nesse período"]}, {"title": "Revolta Local Motivos principais", "body": ["Farroupilha Rio Grande do Sul Questões fiscais, autonomia e insatisfação com o governo central", "Sabinada Bahia Protesto contra o governo regencial e busca por autonomia"]}, {"title": "Balaiada Maranhão Descontentamento social e político dos grupos populares", "body": ["Essas revoltas mostravam a fragilidade do governo regencial e o descontentamento popular, especialmente nas regiões mais afastadas do poder central.", "O Regresso Conservador Por que aconteceu?", "O governo liberal regencial não conseguiu conter a instabilidade política e social.", "Setores da elite temiam que o país se fragmentasse.", "A crise das revoltas e a falta de um imperador adulto geraram a busca por um governo mais forte e conservador.", "Características do Regresso Conservador:", "Valorização da ordem, centralização e autoridade.", "Resistência a mudanças radicais e defesa do status quo.", "Crescimento da influência dos conservadores no Parlamento e no governo.", "Apoio ao Golpe da Maioridade (1840), que antecipou a coroação de D. Pedro II aos 14 anos para restaurar a estabilidade."]}, {"title": "Consequências", "body": ["O Golpe da Maioridade encerrou o Período Regencial e deu início ao Segundo Reinado, com D. Pedro II no trono.", "O Brasil viveu um período mais estável e centralizado.", "As tensões regionais diminuíram, mas os conflitos sociais e econômicos continuaram.", "Resumo em tabela", "Elemento Detalhes", "Período 1835–1840", "Regentes principais Padre Feijó e Visconde de Itaboraí", "Revoltas marcantes Farroupilha, Sabinada, Balaiada", "Política Retorno do conservadorismo e centralização", "Objetivo do regresso Restabelecer ordem e autoridade", "Encerramento do período Golpe da Maioridade e início do Segundo Reinado"]}, {"title": "Importância histórica", "body": ["O Período das Regências Unas e o Regresso Conservador representam o momento de transição e reação ao liberalismo desenfreado.", "Mostram como o Brasil buscou equilíbrio entre autonomia provincial e centralização do poder.", "Preparam o cenário para o longo reinado de D. Pedro II, marcado por relativa estabilidade. Prof. Marcelo Oliveira  História Geral.", "Pedro de Araújo Lima (Regente Uno - 1837 a 1840)", "Quem foi?", "Político conservador e jurista pernambucano.", "Tornou-se regente único do Brasil após a renúncia de Diogo Antônio Feijó.", "Foi nomeado Regente Permanente por seu perfil moderado e capacidade de reorganizar o país em meio à crise.", "Características de seu governo", "Tema Características"]}, {"title": "Política Representou o Regresso Conservador, retomando o poder central", "body": ["Conservadorismo Defesa da ordem, autoridade, centralização e manutenção dos privilégios das elites"]}, {"title": "Repressão às revoltas Atuou para conter rebeliões como a Balaiada e a Farroupilha", "body": ["Formação e estabilidade Buscou reorganizar o Estado e preparar o terreno para o Segundo Reinado", "Contribuições e legado", "Consolidou o poder da elite conservadora, que temia o colapso do Império.", "Reorganizou as forças políticas e administrativas do país.", "Preparou o caminho para o Golpe da Maioridade (1840), no qual D. Pedro II foi declarado maior de idade com apenas 14 anos.", "Após sua regência, foi nomeado Marquês de Olinda, um dos mais influentes políticos do Segundo Reinado.", "Resumo", "Elemento Detalhes", "Período 1837–1840", "Perfil político Conservador, centralizador", "Objetivo Restabelecer a ordem e conter o avanço liberal", "Revoltas enfrentadas Balaiada, Farroupilha (continuação), entre outras", "Legado Preparou o Império para o governo de D. Pedro II", "Prof. Marcelo Oliveira  História Geral.", "Levantes Regenciais: A Cabanagem no Pará (1835–1840)"]}, {"title": "Contexto Histórico", "body": ["Durante o Período Regencial, o Brasil enfrentou diversos conflitos regionais motivados por:", "Instabilidade política após a abdicação de D. Pedro I", "Desigualdades sociais profundas", "Insatisfação com o poder centralizado no Rio de Janeiro", "No Pará, essa revolta ficou conhecida como Cabanagem.", "Por que o nome “Cabanagem”?", "O nome vem das \"cabanas\", habitações simples de palha e madeira.", "Refere-se ao povo pobre que vivia às margens dos rios: índios, negros, mestiços e camponeses.", "Foi uma revolta popular de caráter social, político e étnico.", "Causas da Cabanagem", "Tipo Causas", "Sociais Miséria da população; exclusão dos pobres da política", "Políticas Descontentamento com o governo regencial e com a elite local", "Étnicas Populações indígenas, negras e mestiças marginalizadas e reprimidas", "Regionais Repressão do governo central ao Pará e imposição de autoridades do Rio", "Desenvolvimento da Revolta", "Início em janeiro de 1835 com o assassinato do presidente da província.", "Tomada de Belém pelos revoltosos.", "Eduardo Angelim assume o governo como líder cabano.", "O Império envia tropas e inicia uma violenta repressão militar.", "A luta continua em vilas e florestas até 1840, com milhares de mortos.", "Consequências", "Estima-se que cerca de 30% da população da província foi morta.", "Belém foi devastada e o Pará foi militarmente ocupado.", "A revolta foi derrotada, mas marcou a força da insatisfação popular.", "Mostrou que o Brasil regencial vivia um período de forte tensão social e regional.", "Resumo da Cabanagem", "Elemento Detalhes", "Período 1835–1840", "Local Província do Grão-Pará (atual estado do Pará)", "Motivação Miséria, repressão e exclusão social", "Liderança Eduardo Angelim, entre outros", "Participação popular Caboclos, negros, índios, pobres urbanos e rurais", "Mortes estimadas Aproximadamente 30 mil pessoas", "Resultado Derrota da revolta e repressão violenta do Império", "Importância histórica", "Foi uma das revoltas mais sangrentas do Brasil Império.", "Única revolta regencial em que revoltosos chegaram ao poder.", "Mostrou o distanciamento entre o povo e o poder central.", "Expôs o fracasso das elites e do governo regencial em ouvir as demandas populares.", "prof. Marcelo Oliveira  História Geral.", "Levantes Regenciais: A Sabinada na Bahia (1837– 1838)"]}, {"title": "Contexto", "body": ["Durante o conturbado Período Regencial (1831–1840), a instabilidade política, a repressão do governo central e o descontentamento das províncias deram origem a várias revoltas. Na Bahia, esse descontentamento culminou na Sabinada, uma revolta de caráter liberal, regionalista e separatista temporária.", "Origem do nome “Sabinada”", "Nomeada em referência ao seu principal líder:", "Francisco Sabino Álvares da Rocha Vieira, médico e jornalista.", "Sabino era defensor do federalismo e da autonomia provincial.", "Causas da Sabinada"]}, {"title": "Tipo Motivações", "body": ["Políticas Rejeição ao governo regencial e à centralização do poder no Rio de Janeiro"]}, {"title": "Militares Críticas ao uso de soldados baianos em outras províncias sem consulta local", "body": ["Monárquicas Oposição à volta de D. Pedro I e à imposição de um imperador sem consulta"]}, {"title": "Resumo cronológico da Sabinada", "body": ["Novembro de 1837: Rebeldes tomam Salvador e proclamam a República Bahiense. Declaram que o governo seria provisório até a maioridade de D. Pedro II.", "Os líderes tentaram atrair apoio popular, mas a população pobre e escravizada não aderiu.", "O governo imperial reagiu com força militar.", "Março de 1838: Tropas do Império invadem Salvador; a revolta é sufocada.", "Consequências", "Resultado Detalhes", "Derrota dos rebeldes O movimento foi rapidamente esmagado pelo exército imperial"]}, {"title": "Mortes Cerca de 1.200 mortos", "body": ["Prisões e exílios Muitos líderes presos ou deportados para longe (Sabino foi preso e exilado)", "Repressão Reforço do controle central sobre a Bahia e outras províncias", "Resumo da Sabinada", "Elemento Detalhes", "Período 1837–1838", "Local Salvador e arredores, província da Bahia", "Líder principal Francisco Sabino", "Natureza da revolta Liberal, separatista temporária", "Objetivo Criar uma república provisória até a maioridade de D. Pedro II", "Resultado Repressão violenta e fracasso do movimento"]}, {"title": "Importância histórica", "body": ["Reflete o desejo de autonomia das províncias e a oposição à centralização do poder imperial.", "Mostra o distanciamento entre classes médias letradas e o povo pobre e escravizado, que não participou da revolta.", "Foi mais uma expressão da crise do Brasil regencial.", "Prof. Marcelo Oliveira  História Geral.", "Golpe da Maioridade (1840)", "Quando o Brasil antecipou a maioridade de D. Pedro II"]}, {"title": "Contexto Histórico", "body": ["O Brasil vivia o conturbado Período Regencial (1831–1840) após a abdicação de D. Pedro I. Esse período foi marcado por:", "Revoltas populares e regionais (como a Cabanagem, Balaiada, Sabinada, Farroupilha)", "Disputas entre liberais e conservadores"]}, {"title": "Instabilidade política e insegurança social", "body": ["A solução encontrada pelas elites políticas para restaurar a estabilidade foi antecipar a maioridade do herdeiro do trono, D. Pedro de Alcântara, com apenas 14 anos de idade.", "O que foi o Golpe da Maioridade?", "Foi a proclamação antecipada da maioridade de D. Pedro II, feita em 23 de julho de 1840.", "Legalmente, ele só poderia assumir aos 18 anos, mas a Constituição foi ignorada.", "Liderado pelos liberais, que acreditavam que com o imperador no poder, teriam mais influência no governo.", "Por que foi considerado um “golpe”?", "Porque não respeitou a Constituição de 1824, que estabelecia a maioridade aos 18 anos.", "Foi uma manobra política e não legal: uma decisão do Parlamento, pressionado pelos liberais e parte da elite.", "Principais envolvidos", "Personagem Papel", "D. Pedro II Adolescente de 14 anos, foi proclamado imperador antes da hora", "Liberais Defensores do golpe, queriam barrar o controle conservador", "Conservadores Em geral contrários, mas foram vencidos pela pressão liberal", "Povo Em parte iludido com a imagem do jovem “salvador da pátria”", "Resumo do Golpe da Maioridade", "Elemento Detalhes", "Data 23 de julho de 1840", "Proclamado D. Pedro II, com apenas 14 anos", "Violação Quebra do artigo constitucional sobre a idade mínima", "Objetivo Estabilizar o país e fortalecer o poder central", "Consequência política Início do Segundo Reinado (1840–1889)"]}, {"title": "Importância histórica", "body": ["Encerrou o Período Regencial e iniciou o longo e relativamente estável Segundo Reinado.", "Marcou o triunfo do centralismo monárquico sobre os anseios de autonomia provincial.", "Mostrou como a política imperial funcionava com negociações entre elites, mesmo burlando a lei.", "Criou a imagem pública de D. Pedro II como símbolo da ordem e unidade nacional.", "Prof. Marcelo Oliveira  História Geral.", "Segundo Reinado (1840–1889)", "Evolução Político-Partidária no Império do Brasil", "Contexto Geral", "Início com o Golpe da Maioridade (1840) e coroação de D. Pedro II"]}, {"title": "Período de maior estabilidade em comparação ao conturbado Período Regencial", "body": ["Consolidação do Parlamentarismo às avessas, com forte poder do imperador Sistema Político do Império", "Constituição de 1824:", "Monarquia constitucional e centralizada", "Quatro poderes: Executivo, Legislativo, Judiciário e Moderador", "O Poder Moderador, exclusivo do imperador, permitia controlar os outros três", "Partidos Políticos do Segundo Reinado", "Partido Conservador", "Apelidados de “saquaremas”", "Defendiam o centralismo, a manutenção da ordem e da escravidão", "Representavam a elite rural e grandes proprietários", "Partido Liberal"]}, {"title": "Defendiam mais autonomia provincial, pequenas reformas e maior participação política", "body": ["Tinha apoio das camadas médias urbanas e setores da elite que queriam mudanças graduais"]}, {"title": "Rodízio no Poder: Política do Pêndulo", "body": ["O imperador nomeava e demitia presidentes de ministério (primeiros-ministros), manipulando o sistema"]}, {"title": "“Parlamentarismo às avessas”: o imperador controlava o parlamento, e não o contrário", "body": ["Alternância entre conservadores e liberais sem ruptura institucional, garantindo estabilidade", "Criação do Partido Republicano", "Surgimento: 1870", "Após a Guerra do Paraguai e com o avanço das ideias abolicionistas e federativas", "Reivindicava o fim da monarquia, a república federativa e eleições diretas", "Resumo da Evolução Político-Partidária", "Fase Características principais", "1840–1860 Alternância entre conservadores e liberais", "1860–1880 Crescente desgaste do sistema e surgimento de novos debates", "Pós-1870 Surgimento do Partido Republicano e fortalecimento do movimento abolicionista", "1889 Fim da monarquia com o golpe militar que proclamou a República"]}, {"title": "Conclusão", "body": ["O Segundo Reinado teve uma aparente estabilidade política, mas baseada no controle do imperador sobre o sistema.", "O rodízio entre liberais e conservadores foi eficaz por um tempo, mas não atendeu às crescentes pressões sociais (como o fim da escravidão e a descentralização política).", "A formação do Partido Republicano e os movimentos sociais e militares do final do século XIX aceleraram o fim da monarquia.", "Prof. Marcelo Oliveira  História Geral.", "Revolução Praieira (1848–1850)", "Última revolta de inspiração liberal no Brasil Império"]}, {"title": "Contexto histórico", "body": ["Ocorreu em Pernambuco, entre 1848 e 1850, durante o Segundo Reinado (governo de D.", "Pedro II).", "Foi influenciada pelas ideias do liberalismo europeu e pelas Revoluções de 1848 na Europa.", "A elite liberal nordestina estava insatisfeita com o domínio político dos conservadores, especialmente das famílias tradicionais, como os Cavalcanti.", "Causas da Revolução", "Tipo Detalhes", "Econômicas Crise da cana-de-açúcar, desemprego, miséria no campo e nas cidades"]}, {"title": "Ideológicas Influência do liberalismo, republicanismo e socialismo utópico europeu", "body": ["Sociais Reivindicações de camadas médias urbanas, jornalistas, militares e parte dos pobres", "Quem eram os “praieiros”?", "Membros do Partido Liberal ligados ao jornal Diário Novo, localizado na Rua da Praia, no Recife — daí o nome Praieira.", "Defendiam reformas sociais e políticas como:", "Voto livre e universal (masculino)", "Liberdade de imprensa", "Fim do Poder Moderador", "Nacionalização do comércio (contra os portugueses monopolistas)", "Desenvolvimento da Revolta", "Início em novembro de 1848, após a demissão do governador liberal de Pernambuco.", "Combates armados e tentativas de mobilizar a população do interior.", "Lideranças importantes:", "Pedro Ivo Veloso da Silveira"]}, {"title": "Borges da Fonseca", "body": ["O movimento foi rapidamente reprimido pelas tropas imperiais com apoio das elites locais.", "Fracasso e consequências", "Resultado Detalhes", "Derrota militar O movimento foi sufocado até março de 1850", "Prisões e exílios Muitos praieiros foram presos ou exilados", "Repressão política Reforço da centralização do poder e do controle imperial", "Fim das revoltas Foi a última revolta liberal de grande porte no Brasil Império"]}, {"title": "Importância histórica", "body": ["Mostra que os liberais brasileiros também eram limitados: queriam reformas, mas não mudanças profundas na estrutura social (como o fim da escravidão).", "Encerra o ciclo de revoltas iniciadas no Período Regencial.", "Marca o início da consolidação do poder de D. Pedro II, que governaria com mais estabilidade nas décadas seguintes.", "Resumo da Revolução Praieira", "Elemento Detalhes", "Local Pernambuco", "Período 1848–1850", "Líderes Pedro Ivo, Borges da Fonseca"]}, {"title": "Ideais Liberalismo radical, voto universal", "body": ["Resultado Derrota e repressão pelo Império Prof. Marcelo Oliveira  História Geral.", "A Base Econômica do Segundo Reinado Como o Brasil se sustentava economicamente no governo de D. Pedro II"]}, {"title": "Panorama geral", "body": ["Durante o Segundo Reinado (1840–1889), a economia brasileira era baseada principalmente na agroexportação, ou seja, na exportação de produtos agrícolas, com forte presença do trabalho escravizado até a abolição em 1888.", "Principais setores econômicos", "- Café – o “ouro negro” do Império", "Principal produto de exportação", "Cultivado principalmente no Vale do Paraíba e depois no Oeste Paulista", "Responsável por grande parte da riqueza do país", "Utilizava mão de obra escravizada e, após 1850, imigrante (sobretudo italiana)", "Criou uma elite poderosa: os barões do café", "- Cana-de-açúcar", "Importante em regiões do Nordeste", "Ainda exportada, mas em declínio em relação ao café", "Sofreu com concorrência do açúcar caribenho e com a crise da escravidão", "- Algodão", "Cresceu durante a Guerra de Secessão (1861–1865) nos EUA", "Produção concentrada no Nordeste (Ceará, Maranhão)", "Depois da guerra, perdeu mercado", "- Pecuária", "Forte no Sul e Centro-Oeste", "Atendia principalmente ao mercado interno", "- Mineração", "Retomada discreta no século XIX (ferro e carvão)", "Não tão expressiva quanto no ciclo do ouro (século XVIII)", "Modernização e infraestrutura", "Investimentos em:", "Ferrovias: financiadas com capital estrangeiro (sobretudo britânico)", "Portos e telégrafos: facilitavam o escoamento da produção", "Banco do Brasil (reorganizado) e leis de incentivo ao crédito", "Limitações e contradições", "Contradição Realidade", "Desenvolvimento urbano Ainda limitado e desigual"]}, {"title": "Mão de obra Dependência da escravidão até 1888", "body": ["Industrialização tímida Desestimulada pelas elites agrárias e falta de incentivos", "Dependência externa Principalmente do Reino Unido (tecnologia, capital, consumo)"]}, {"title": "Abolição e crise do modelo", "body": ["A partir da Lei Eusébio de Queirós (1850) e da abolição da escravidão (1888), a economia precisou se adaptar:", "Imigração europeia cresceu para suprir a falta de escravizados", "Nova classe média urbana começou a emergir", "Demandas por mudanças sociais e políticas aumentaram", "Resumo da Base Econômica do Segundo Reinado", "Elemento Detalhes", "Principal produto Café", "Mão de obra Escravizada e, depois, imigrante", "Infraestrutura Ferrovias, telégrafos, portos"]}, {"title": "Relações externas Dependência da Inglaterra", "body": ["Indústria Crescimento tímido, limitado pela elite agrária Prof. Marcelo Oliveira  História Geral."]}, {"title": "POLÍTICA EXTERNA DO SEGUNDO REINADO", "body": ["Questões Platinas e a Aliança de Rosas e Oribe", "O que foram as “Questões Platinas”?", "As Questões Platinas foram os conflitos diplomáticos e militares entre o Império do Brasil e os países da região do Prata (Uruguai, Argentina e Paraguai), motivados por:", "Disputas territoriais e de influência na região", "Interesse em garantir a navegação nos rios da Bacia Platina", "Defesa de governos aliados e interesses comerciais brasileiros", "A Aliança de Rosas e Oribe (1843–1851)", "Quem eram eles?", "Nome País Ideologia / Objetivo", "Juan Manuel de Rosas Argentina Ditador federalista com ambições expansionistas", "Manuel Oribe Uruguai Aliado de Rosas, queria retomar o poder no Uruguai", "Juntos, Rosas e Oribe queriam controlar a região platina, inclusive influenciar o Uruguai e limitar a atuação do Brasil.", "Por que isso incomodava o Brasil?", "Rosas ameaçava a livre navegação no rio da Prata — fundamental para o comércio brasileiro.", "O Brasil temia o crescimento da influência argentina e o isolamento da província de Mato Grosso.", "A aliança de Rosas com Oribe derrubou o governo uruguaio aliado do Brasil.", "A Intervenção Brasileira (1851)", "O Império do Brasil rompeu relações diplomáticas com Rosas e formou uma aliança com:", "Colorado uruguaios (rivais de Oribe)", "Opositores de Rosas na Argentina (liderados por Justo José de Urquiza)", "Em 1851, o Brasil intervém militarmente no Uruguai e na Argentina, derrotando:", "Oribe no Uruguai", "Rosas na Argentina (derrubado em 1852)", "Resultados da Intervenção", "Consequência Detalhes", "Vitória diplomática e militar Brasil impediu a hegemonia argentina na Bacia Platina", "Livre navegação garantida Principal objetivo brasileiro foi atingido", "Prestígio internacional Brasil se consolidou como potência regional", "Instabilidade continua As tensões platinas continuariam, culminando na Guerra do Paraguai (1864–1870)"]}, {"title": "RESUMO", "body": ["Elemento Detalhes", "Região envolvida Bacia do Prata (Uruguai, Argentina, Brasil)", "Inimigos Rosas (Argentina) e Oribe (Uruguai)", "Objetivo do Brasil Defender aliados, garantir navegação e equilíbrio regional", "Ação brasileira Intervenção militar e diplomática em 1851", "Resultado final Vitória brasileira e queda de Rosas e Oribe. Prof. Marcelo Oliveira  História Geral.", "O líder colorado Venâncio Flores e o ultimato a Aguirre (1864)", "Parte da tensão que levou o Brasil à Guerra do Paraguai", "Contexto histórico", "No Uruguai, havia uma guerra civil entre dois partidos rivais:", "Blancos: no poder, representavam os interesses do campo e eram aliados da Argentina de Rosas e depois do Paraguai.", "Colorados: oposição liberal e urbana, aliados históricos do Brasil.", "Bernardo Berro e depois Atanasio Aguirre eram presidentes uruguaios do partido Blanco e protegiam nacionalistas que atacavam fazendas de brasileiros no sul do país.", "Crise com o Uruguai (1863–1864)", "Em 1863, Venâncio Flores, líder do partido Colorado, iniciou uma revolta armada contra o governo Blanco.", "O Brasil apoiava Flores, por interesses comerciais e pela defesa dos brasileiros atacados na fronteira.", "O presidente Aguirre, do partido Blanco, recusou-se a punir os responsáveis pelos ataques aos brasileiros, o que aumentou as tensões com o Império.", "O Ultimato de 1864", "Em agosto de 1864, o governo imperial brasileiro enviou um ultimato diplomático a Aguirre, exigindo:", "Reparações pelos danos sofridos por brasileiros", "Punição dos responsáveis", "Proteção efetiva aos súditos do Império no Uruguai Aguirre ignorou o ultimato.", "Consequência: Intervenção militar", "O Brasil decidiu intervir militarmente no Uruguai.", "Tropas brasileiras invadiram o país, derrotaram o governo Blanco e ajudaram Flores a tomar o poder.", "Venâncio Flores se tornou presidente do Uruguai com apoio do Brasil.", "Efeito dominó: Guerra do Paraguai", "O ditador paraguaio Solano López considerou a invasão do Uruguai uma ameaça ao equilíbrio regional.", "Isso foi uma das justificativas do Paraguai para capturar o navio Marquês de Olinda e invadir o Mato Grosso, iniciando a Guerra do Paraguai (1864–1870).", "RESUMO: O Ultimato a Aguirre", "Elemento Detalhes", "Líder brasileiro Diplomata Saraiva (missão de negociação)", "Motivo do ultimato Ataques a brasileiros e falta de resposta do governo Blanco", "Consequência Intervenção militar brasileira e queda de Aguirre", "Novo governo Venâncio Flores (Colorado), aliado do Brasil", "Desdobramento Causa indireta da Guerra do Paraguai. Prof. Marcelo Oliveira  História Geral."]}, {"title": "GUERRA DO PARAGUAI (1864–1870)", "body": ["O maior conflito da América do Sul no século XIX", "Contexto histórico", "O Paraguai, sob o comando do ditador Francisco Solano López, buscava afirmar sua influência na região do Rio da Prata.", "O conflito envolveu o Paraguai contra a Tríplice Aliança formada por Brasil, Argentina e Uruguai.", "Foi a guerra mais longa, sangrenta e custosa da história sul-americana.", "Causas principais", "Causa Detalhes", "Disputas territoriais Controle da Bacia do Prata e fronteiras pouco definidas", "Interesses regionais Paraguai temia a expansão e influência do Brasil e Argentina", "Apoio a partidos uruguaios Brasil apoiava os Colorados, enquanto Paraguai apoiava os Blancos", "Ultimato e invasão Paraguai invadiu Mato Grosso e capturou navio brasileiro, desencadeando o conflito", "Principais fases do conflito", "Invasão paraguaia (1864–1865)", "Paraguai invade Mato Grosso (Brasil) e a província argentina de Corrientes.", "O Brasil e seus aliados formam a Tríplice Aliança em 1865.", "Campanha da Tríplice Aliança (1866–1868)", "Grandes batalhas: Tuiuti, Curupaiti, Humaitá.", "Batalha de Tuiuti (1866): maior e mais sangrenta da guerra.", "Campanha final e queda do Paraguai (1869–1870) As forças aliadas avançam até Assunção.", "Solano López é morto em 1870, encerrando a guerra.", "Consequências", "Impacto Detalhes", "Altas perdas humanas Cerca de 300 mil a 400 mil mortos (paraguaios, brasileiros, argentinos, uruguaios)", "Devastação do Paraguai Grande destruição econômica e social, redução da população em cerca de 70%", "Brasil Fortalecimento do Exército e afirmação do Estado Nacional", "Mudanças territoriais Paraguai perdeu parte do território, mas manteve sua independência", "Endividamento e crise no Brasil Custos da guerra aceleraram crise econômica imperial", "Resumo da Guerra do Paraguai", "Elemento Detalhes", "Período 1864–1870", "Partes envolvidas Paraguai x Brasil, Argentina, Uruguai", "Líder paraguaio Francisco Solano López", "Principais batalhas Tuiuti, Curupaiti, Humaitá", "Resultado Vitória da Tríplice Aliança; queda de Solano López. Prof. Marcelo Oliveira  História Geral."]}, {"title": "O ADVENTO DA REPÚBLICA NO BRASIL", "body": ["Fatores que levaram à queda da Monarquia (1889)", "- Insatisfação Militar", "Militares se sentiram desvalorizados e insatisfeitos com o comando monárquico.", "Influência das ideias republicanas e positivistas dentro dos quartéis.", "Desejo de maior participação política e profissionalização das forças armadas.", "- Crise Econômica e Social", "Fim do tráfico negreiro e gradual abolição da escravidão (Lei Áurea, 1888) afetaram a economia rural baseada no trabalho escravo.", "Grandes proprietários rurais insatisfeitos com a perda da mão de obra gratuita e sem indenização.", "Crescimento das cidades e da classe média urbana com novas demandas políticas.", "- Movimentos Republicanos e Intelectuais", "Disseminação das ideias republicanas, influenciadas por modelos estrangeiros (Estados Unidos, França).", "Ativismo político de intelectuais, jornalistas e lideranças republicanas.", "Formação de partidos e grupos organizados em defesa da República.", "- Questão Religiosa", "Conflitos entre a Igreja Católica e o Estado por causa da separação de poderes e autonomia da Igreja.", "A reação negativa da Igreja à tentativa do Imperador Dom Pedro II de controlar a nomeação de bispos.", "Apoiadores republicanos exploraram a insatisfação religiosa para fortalecer seu discurso.", "5. Fragilidade Política do Império", "Dom Pedro II envelhecido e com saúde debilitada.", "Perda de apoio político de setores importantes, como militares e fazendeiros.", "Incapacidade do regime monárquico de se modernizar e atender às demandas sociais.", "Resumo dos Fatores do Advento da República", "Fator Descrição", "Insatisfação Militar Militar revoltados e influência positivista", "Crise Econômica e Social Impacto da abolição e mudanças no trabalho rural", "Movimentos Republicanos Propaganda e organização política", "Questão Religiosa Conflitos entre Igreja e Estado", "Fragilidade Política do Império Dom Pedro II debilitado e perda de apoio.", "Prof. Marcelo Oliveira  História do Brasil."]}, {"title": "CONTRADIÇÕES INTERNAS NO BRASIL IMPERIAL (FIM DO SÉCULO XIX)", "body": ["Problemas e tensões que enfraqueceram o regime monárquico", "1. Escravidão x Abolição", "O Brasil ainda dependia economicamente do trabalho escravo, especialmente no setor agrícola.", "A abolição da escravidão (Lei Áurea, 1888) ocorreu sem indenização aos fazendeiros e sem políticas de inclusão para os ex-escravos.", "Isso gerou insatisfação entre a elite rural e problemas sociais nas cidades, como pobreza e desemprego.", "2. Conflito entre o Poder Civil e o Poder Militar", "O Exército estava insatisfeito com a falta de reconhecimento e espaço político.", "Ideias republicanas e positivistas ganharam força entre oficiais militares.", "A elite monárquica não conseguiu integrar os militares ao sistema político, criando um ambiente de tensão. 3. Tensões Político-Partidárias", "O sistema político imperial (monarquia constitucional) era dominado pelas elites agrárias e oligárquicas.", "Crescente insatisfação das classes médias urbanas e intelectuais com a exclusão política.", "Movimento republicano ganhava força, questionando a legitimidade da monarquia.", "4. Questão Religiosa", "Conflitos entre a Igreja Católica e o Estado imperial, que buscava controlar a nomeação de bispos e impor limites à Igreja.", "A resistência da Igreja contribuiu para descontentamento popular e fragilização do regime.", "5. Desafios Econômicos", "A economia brasileira enfrentava dificuldades com a transição do trabalho escravo para o trabalho assalariado.", "O atraso na industrialização e a dependência das exportações agrícolas (café) deixavam o país vulnerável.", "A crise econômica afeta a estabilidade política e social.", "Resumo das Contradições Internas", "Contradição Impacto", "Escravidão x Abolição Insatisfação da elite rural e problemas sociais", "Poder Civil x Militar Tensões e fortalecimento do republicanismo", "Sistema Político Oligárquico Exclusão das classes médias e intelectuais", "Igreja x Estado Fragilização do regime", "Dificuldades Econômicas Instabilidade política e social.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "MOVIMENTO REPUBLICANO NO BRASIL", "body": ["O caminho para o fim da Monarquia e o nascimento da República", "- Origem e Influências", "Influenciado pelas ideias republicanas e liberais da Europa e dos Estados Unidos.", "Ideais de democracia, separação dos poderes e governo eleito pelo povo ganharam força no século XIX.", "Positivismo, filosofia que valorizava a ciência e a ordem, influenciou principalmente os militares.", "- Principais Grupos e Líderes", "Militares: oficiais influenciados pelo positivismo, insatisfeitos com o regime monárquico, como o marechal Deodoro da Fonseca.", "Intelectuais e Jornalistas: propagadores das ideias republicanas através de jornais e livros.", "Pequena burguesia urbana: comerciantes, profissionais liberais e trabalhadores que buscavam maior participação política.", "Ex-fazendeiros insatisfeitos: especialmente após a abolição da escravidão, perderam mão de obra e passaram a apoiar a República.", "- Partidos Republicanos", "Surgiram partidos republicanos organizados principalmente nas grandes cidades, como Rio de Janeiro, São Paulo e Minas Gerais.", "Promoviam a descentralização do poder e o fim do regime monárquico.", "- Fases do Movimento", "Propaganda e mobilização (década de 1870 e 1880): disseminação das ideias republicanas em jornais, clubes e associações.", "Consolidação política: formação de partidos, alianças e articulação com militares para apoiar o fim da monarquia.", "Golpe da República (15 de novembro de 1889): derrubada da Monarquia e proclamação da República pelo marechal Deodoro da Fonseca.", "- Resultados", "Fim do Império do Brasil e início da República Velha.", "Mudança do regime político para uma república federativa presidencialista.", "Ampliação das discussões sobre cidadania, direitos e organização política do país.", "Resumo do Movimento Republicano", "Aspecto Descrição", "Influências Ideais republicanos, positivismo, liberalismo", "Grupos principais Militares, intelectuais, pequena burguesia, Ex-fazendeiros", "Ações principais Propaganda, organização política e golpe de 1889", "Consequências Fim da monarquia e estabelecimento da República.", "Prof. Marcelo Oliveira  História Geral.", "A QUESTÃO RELIGIOSA NO BRASIL IMPERIAL Conflito entre Igreja Católica e Estado (1872– 1875)", "1. Contexto", "O Brasil Imperial era oficialmente um Estado católico, com forte influência da Igreja Católica.", "O Imperador Dom Pedro II exercia controle sobre a nomeação de bispos e assuntos eclesiásticos.", "No século XIX, a Igreja Católica vivia um movimento chamado Conciliação, para maior autonomia frente aos Estados.", "2. O Conflito", "O Papa Pio IX e a Igreja Católica condenaram o liberalismo e o positivismo, e passaram a exigir maior independência das igrejas nacionais.", "O papa autorizou a excomunhão de membros do clero que desobedecessem às normas eclesiásticas.", "No Brasil, padres e bispos começaram a desafiar as ordens do governo imperial, declarando-se independentes da interferência estatal.", "3. Reação do Governo", "Dom Pedro II e o governo imperial reagiram reprimindo os clérigos que desobedeciam.", "Em 1872, o imperador ordenou a prisão de bispos e padres que se recusaram a seguir suas ordens.", "O conflito gerou uma crise política, polarizando a população e a elite.", "4. Consequências", "A Questão Religiosa enfraqueceu a imagem da monarquia perante a população católica.", "A Igreja Católica perdeu parte de sua influência política.", "O episódio contribuiu para o fortalecimento dos movimentos republicanos, que usaram o conflito para criticar a monarquia.", "Resumo da Questão Religiosa", "Aspecto Descrição", "Causa Conflito entre autonomia da Igreja e controle estatal", "Atores principais Papa Pio IX, Dom Pedro II, bispos e padres rebeldes", "Desdobramentos Prisão de clérigos, crise política e social", "Impacto Enfraquecimento da monarquia e fortalecimento dos republicanos.", "Prof. Marcelo Oliveira", "História Geral."]}, {"title": "O EXÉRCITO E O POSITIVISMO NO BRASIL IMPERIAL", "body": ["A influência das ideias positivistas entre os militares e seu impacto político", "- O que é o Positivismo?", "Doutrina filosófica criada por Auguste Comte que valoriza a ciência, a ordem e o progresso.", "Defende que a sociedade deve ser organizada com base no conhecimento científico e na disciplina.", "Inspirou muitos movimentos políticos e sociais no século XIX, especialmente na América Latina.", "- A presença do Positivismo no Exército Brasileiro", "Oficiais militares receberam formação técnica e científica em academias militares, onde o positivismo era uma corrente de pensamento influente.", "O lema “Ordem e Progresso”, presente na bandeira brasileira, é uma ideia positivista.", "Os militares viam no positivismo uma solução para os problemas políticos e sociais do Brasil.", "3. Impacto político", "O Exército, influenciado pelo positivismo, tornou-se crítico da Monarquia, vista como um regime tradicionalista e incapaz de promover o progresso.", "Oficiais republicanos defendiam a instauração de uma república moderna, baseada em ciência, ordem e progresso.", "A liderança militar, como o marechal Deodoro da Fonseca, teve papel central na Proclamação da República em 1889.", "4. Positivismo e modernização", "A filosofia positivista incentivou os militares a buscarem o fortalecimento do Estado Nacional.", "Também fomentou a ideia de que o país precisava de reformas políticas para garantir estabilidade e desenvolvimento.", "Resumo: Exército e Positivismo", "Aspecto Descrição", "Filosofia Positivista Valorização da ciência, ordem e progresso", "Influência no Exército Formação técnico científica e crítica à Monarquia", "Papel político Apoio à República e liderança no golpe de 1889 Legado Mote “Ordem e Progresso” na bandeira do Brasil.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "O GOLPE REPUBLICANO DE 1889", "body": ["A queda da Monarquia e a Proclamação da República no Brasil", "1. Contexto", "No final do século XIX, o Brasil enfrentava várias crises políticas, sociais e econômicas", "(insatisfação militar, crise na elite rural após a abolição da escravidão, conflitos políticos).", "O movimento republicano ganhava força, especialmente entre militares e intelectuais.", "Dom Pedro II estava envelhecido e sem herdeiros diretos que garantissem a sucessão monárquica.", "2. O Golpe", "Em 15 de novembro de 1889, o marechal Deodoro da Fonseca, apoiado por oficiais militares e grupos republicanos, proclamou a República no Rio de Janeiro.", "O golpe foi praticamente sem resistência armada.", "Dom Pedro II foi deposto e exilado na Europa.", "3. Proclamação da República", "Foi instaurado um regime republicano, federativo e presidencialista.", "Deodoro da Fonseca tornou-se o primeiro presidente provisório do Brasil.", "O novo regime buscava modernizar o país e romper com as estruturas do Império.", "4. Consequências", "Fim do Brasil Império e início da chamada República Velha.", "Ampliação do poder das oligarquias estaduais, especialmente São Paulo e Minas Gerais.", "Reorganização política e econômica do país em torno do modelo republicano.", "Resumo do Golpe Republicano Aspecto Detalhes", "Data 15 de novembro de 1889", "Líder Marechal Deodoro da Fonseca", "Método Golpe militar com pouco ou nenhum confronto Resultado Fim da Monarquia e início da República.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "QUADRO CRONOLÓGICO DO DECLÍNIO DO IMPÉRIO BRASILEIRO", "body": ["Ano Evento Principal Importância", "1871 Lei do Ventre Livre Liberdade para filhos de escravas nascidos a partir dessa data; início da perda da mão de obra escrava", "1878 Lei dos Sexagenários Liberdade para escravos com mais de 60 anos; avanço gradual da abolição da escravidão", "1888 Lei Áurea Abolição total da escravidão, sem indenização aos proprietários; gerou descontentamento da elite rural", "1870-1880 Aumento da insatisfação militar e influência do positivismo Crescimento do republicanismo e crítica à Monarquia dentro do Exército", "1872-1875 A Questão Religiosa Conflito entre Estado e Igreja Católica enfraquece a imagem da Monarquia", "- Formação da Aliança Liberal Grupo político que apoiava reformas e oposição ao Imperador Dom Pedro II", "- Absolutismo político diminui Monarquia perde apoio popular e político, especialmente entre elite agrária e militares", "15/11/1889 Proclamação da República Marechal Deodoro da Fonseca lidera o golpe que depõe Dom Pedro II e institui a República.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "REPÚBLICA VELHA – PARTE 1 A REPÚBLICA DA ESPADA (1889–1894)", "body": ["- Contexto", "Período inicial da República Velha, marcado pela forte presença militar no governo.", "Nome “República da Espada” porque os primeiros presidentes eram militares (os “homens de espada”).", "Fim do Império com a Proclamação da República em 1889, liderada pelo marechal Deodoro da Fonseca.", "- Principais Presidentes", "Marechal Deodoro da Fonseca (1889–1891)", "Primeiro presidente do Brasil, nomeado após o golpe que derrubou a Monarquia.", "Enfrentou graves crises políticas, econômicas e uma revolta naval.", "Renunciou em 1891 devido à pressão política e problemas de saúde.", "Marechal Floriano Peixoto (1891–1894)", "Vice-presidente que assumiu após a renúncia de Deodoro.", "Conhecido como “Marechal de Ferro” pela mão dura para controlar revoltas e manter a ordem.", "Fortaleceu o regime republicano frente a oposição monarquista e revoltas.", "- Características da República da Espada Forte intervenção militar na política.", "Consolidação da República, ainda fragilizada e contestada.", "Centralização do poder e repressão a movimentos que ameaçavam a estabilidade.", "Tentativas de organizar a nova constituição republicana (Constituição de 1891).", "- Principais Desafios", "Revoltas militares e civis, como a Revolta da Armada (1893–1894).", "Crises econômicas e dificuldades financeiras do novo governo.", "Definição do papel do Exército na política e no novo regime.", "Consolidação do regime republicano diante de resistência monarquista e regionalismos.", "- Legado", "Estabeleceu os pilares do regime republicano brasileiro.", "Demonstrou a importância e o peso dos militares na política nacional.", "Preparou o terreno para a transição para a chamada “República Oligárquica” que viria em seguida.", "Prof. Marcelo Oliveira  História Geral.", "O GOVERNO PROVISÓRIO E A CONSTITUIÇÃO DE 1891 A organização inicial da República no Brasil", "1. Governo Provisório (1889–1891)", "Após a Proclamação da República em 15 de novembro de 1889, o marechal Deodoro da Fonseca assumiu como chefe do Governo Provisório.", "O objetivo era organizar o país e preparar a transição do regime monárquico para o republicano.", "Durante esse período, o governo dissolveu o Congresso, os senados estaduais e as câmaras municipais, centralizando o poder.", "Medidas importantes:", "Separação entre Igreja e Estado (fim do catolicismo oficial).", "Extinção da monarquia e da nobreza.", "Criação de novos símbolos nacionais, como a bandeira, o hino e o brasão da República.", "A República ainda enfrentava resistência de monarquistas, militares e setores conservadores.", "2. Constituição de 1891", "Promulgada em 24 de fevereiro de 1891, foi a primeira constituição republicana do Brasil.", "Inspirada na Constituição dos Estados Unidos, adotou o sistema federativo e o regime presidencialista.", "Estabeleceu:", "Divisão dos poderes em Executivo, Legislativo e Judiciário.", "Voto direto, mas com restrições (exclusão de analfabetos, mulheres e militares, por exemplo).", "Liberdade religiosa (separação Igreja-Estado).", "Garantia dos direitos individuais, como liberdade de expressão e imprensa.", "O presidente e vice-presidente passaram a ser eleitos pelo Congresso, não pelo voto direto popular.", "3. Importância do Governo Provisório e da Constituição", "Consolidaram a República e substituíram o sistema monárquico.", "Definiram a estrutura política e jurídica do novo regime.", "Criaram bases para a organização política dos estados brasileiros com maior autonomia.", "Resumo", "Aspecto Descrição", "Governo Provisório Deodoro da Fonseca, centralização e reforma inicial do país", "Constituição de 1891 Constituição federal, presidencialista, inspirada nos EUA Principais mudanças Separação Igreja-Estado, voto censitário, divisão dos poderes Desafios Resistência monarquista e conflitos políticos internos.", "Prof. Marcelo Oliveira  História Geral.", "A Crise da “República da Espada”", "(1889–1894) – Transição para o Domínio Oligárquico", "O que foi a República da Espada?", "Foi o período de predominância militar no governo republicano, liderado por:", "Marechal Deodoro da Fonseca (1889–1891)", "Marechal Floriano Peixoto (1891–1894)", "Crise em Dois Níveis:", "- Crise Política", "Autoritarismo de Deodoro: fechou o Congresso Nacional em 1891, provocando forte oposição civil e militar.", "Renúncia de Deodoro: pressionado por revoltas e instabilidade, deixou o poder em 1891.", "Ascensão de Floriano Peixoto: assumiu sem convocar novas eleições, gerando questionamentos legais (segundo a Constituição de 1891).", "Revolta da Armada (1893–1894): rebelião da Marinha contra Floriano, exigindo respeito à legalidade constitucional.", "Conflitos regionais, como a Revolução Federalista no Sul, que agravaram a instabilidade.", "- Crise Econômica", "Encilhamento (1889–1891): política econômica desastrosa liderada por Rui Barbosa — emissão excessiva de papel-moeda, especulação e inflação.", "Fuga de capitais, falências em massa e aumento da dívida pública.", "Desconfiança dos investidores e da elite econômica com o governo republicano.", "Transição para o Domínio Oligárquico (República das Oligarquias)", "Com o fim do governo Floriano em 1894, assume Prudente de Morais, o primeiro presidente civil, marcando o início da chamada “República das Oligarquias”.", "O poder passa para as mãos da elite agrária, especialmente dos cafeicultores de São Paulo e Minas Gerais — nasce a política do “café com leite”.", "O Exército se afasta do centro do poder político, dando espaço à dominação civil e regionalista.", "Resumo – Fim da República da Espada", "Tipo de Crise Detalhes", "Política Autoritarismo, revoltas, instabilidade, questionamento da legitimidade", "Econômica Encilhamento, inflação, falências, desconfiança", "Transição Saída dos militares → entrada da elite agrária no poder (República Oligárquica) Prof. Marcelo Oliveira  História Geral."]}, {"title": "A CRISE DO GOVERNO DEODORO (1889–1891)", "body": ["Quem foi Deodoro da Fonseca?", "Marechal do Exército e líder do movimento que proclamou a República em 1889.", "Tornou-se o primeiro presidente do Brasil, inicialmente como chefe do Governo Provisório e, depois, eleito indiretamente pelo Congresso."]}, {"title": "FATORES DA CRISE", "body": ["- Autoritarismo e Instabilidade Política", "Deodoro fechou o Congresso Nacional em 1891 por não conseguir governar com o Legislativo.", "Tentativa de governar como ditador, o que gerou forte oposição civil e militar.", "Seu governo foi visto como uma ameaça à recém-nascida democracia republicana.", "- Crise Econômica – O Encilhamento", "Política econômica liderada por Rui Barbosa:", "Incentivo à emissão de papel-moeda.", "Estímulo à criação de empresas (muitas eram fictícias).", "Alta inflação, especulação financeira e quebra de bancos.", "Perda de confiança no governo entre empresários e investidores.", "- Perda de Apoio Político", "Críticas de civis, parlamentares, militares da Marinha e da imprensa.", "A Revolta da Armada (1891) ameaçou bombardear o Rio de Janeiro se Deodoro não renunciasse."]}, {"title": "CONSEQUÊNCIA", "body": ["Em 23 de novembro de 1891, Deodoro da Fonseca renunciou à presidência, pressionado por uma grave crise política e ameaça de guerra civil.", "O vice, Floriano Peixoto, assumiu, inaugurando uma nova fase da República da Espada com foco em estabilização à força."]}, {"title": "RESUMO DA CRISE", "body": ["Fator Detalhes", "Autoritarismo Fechamento do Congresso, tentativa de governar por decreto", "Economia instável Encilhamento: inflação, falências e desconfiança do mercado", "Pressão militar Revolta da Armada exigiu a renúncia de Deodoro", "Renúncia Em novembro de 1891, encerra seu curto e conturbado governo.", "Prof. Marcelo Oliveira  História Geral.", "O GOVERNO DO MARECHAL FLORIANO PEIXOTO (1891–1894) – O “Marechal de Ferro”"]}, {"title": "CONTEXTO HISTÓRICO", "body": ["Floriano Peixoto era o vice-presidente de Deodoro da Fonseca.", "Assumiu a presidência sem convocar novas eleições, como previa a Constituição de 1891.", "Isso gerou forte oposição e revoltas, pois muitos consideravam seu governo ilegítimo."]}, {"title": "PRINCIPAIS CONFLITOS", "body": ["- Revolta da Armada (1893–1894)", "Rebelião da Marinha exigindo novas eleições.", "Liderada pelos almirantes Custódio de Melo e Saldanha da Gama.", "Floriano respondeu com repressão violenta e apoio do Exército e de milícias civis.", "- Revolução Federalista (1893–1895) Conflito no Sul (RS, SC, PR) entre:", "Pica-paus (republicanos centralizadores)", "Maragatos (federalistas defensores da descentralização) Floriano enviou tropas para conter o movimento.", "Guerra civil sangrenta, continuou após seu governo, mas foi iniciada em seu mandato."]}, {"title": "POLÍTICA INTERNA", "body": ["Governo autoritário, com forte repressão a opositores.", "Incentivou a industrialização e o nacionalismo.", "Ganhou apoio de setores populares urbanos, sendo apelidado de “Marechal de Ferro”."]}, {"title": "POLÍTICA EXTERNA", "body": ["Conflito diplomático com Portugal após o governo português se recusar a reconhecer Floriano como presidente.", "Floriano rompe relações com Portugal, o que aumentou sua popularidade nacionalista."]}, {"title": "LEGADO", "body": ["Consolidou a República pela força e pela autoridade.", "Fortaleceu o poder presidencial e a presença do Exército na política.", "Abriu caminho para a transição à República Oligárquica, com a eleição de Prudente de Morais (primeiro presidente civil)."]}, {"title": "RESUMO DO GOVERNO FLORIANO", "body": ["Aspecto Detalhes", "Período 1891–1894", "Conflitos Revolta da Armada, Revolução Federalista", "Características Governo autoritário, repressivo e centralizador", "Apoio Exército e camadas populares urbanas", "Legado Fortalecimento da República e do poder presidencial.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "CRISES POLÍTICAS DO GOVERNO FLORIANO PEIXOTO", "body": ["1. Ilegitimidade Constitucional", "Problema: A Constituição de 1891 determinava novas eleições caso o presidente renunciasse nos dois primeiros anos de mandato.", "O que houve: Deodoro renunciou em 1891, mas Floriano, como vice, assumiu e não convocou eleições.", "Consequência: Geração de uma crise institucional e questionamento de sua legitimidade por parte da oposição.", "2. Revolta da Armada (1893–1894)", "Motivo: A Marinha exigia a realização de novas eleições, alegando inconstitucionalidade no governo de Floriano.", "Liderança: Almirantes Custódio de Melo e Saldanha da Gama.", "Ação de Floriano: Reprimiu violentamente com apoio do Exército, da Guarda Nacional e de milícias civis.", "Resultado: Vitória do governo e enfraquecimento da Marinha.", "3. Revolução Federalista (1893–1895)", "Região: Sul do Brasil, especialmente no Rio Grande do Sul.", "Grupos em conflito:", "Maragatos: federalistas, queriam maior autonomia dos estados e eram contra Floriano.", "Pica-paus: legalistas, apoiavam o governo centralizado.", "Reação do governo: Floriano enviou tropas para combater os rebeldes e manteve a ordem com mão de ferro.", "4. Tensão com Portugal", "O governo português não reconheceu o governo de Floriano, considerando-o ilegítimo.", "Floriano reagiu rompendo relações diplomáticas com Portugal, atitude que fortaleceu sua imagem de nacionalista."]}, {"title": "CONSEQUÊNCIAS DAS CRISES", "body": ["Efeito Detalhes", "Fortalecimento do Exército O Exército passou a ser o principal sustentáculo da República", "Enfraquecimento da Marinha Após a derrota na Revolta da Armada", "Consolidação da República Repressão às revoltas deu estabilidade política momentânea Imagem autoritária Ganhou o apelido de “Marechal de Ferro”"]}, {"title": "RESUMO", "body": ["Floriano Peixoto governou em meio a sérias crises políticas, enfrentou revoltas armadas e oposições civis e militares, consolidando a República pela força e afirmando o protagonismo do Exército no novo regime.", "Prof. Marcelo Oliveira  História Geral.", "A REVOLUÇÃO FEDERALISTA E A REVOLTA DA ARMADA (1893–1895) – Governo Floriano Peixoto 1. REVOLTA DA ARMADA (1893–1894)", "Contexto", "Ocorreu no Rio de Janeiro, liderada por oficiais da Marinha de Guerra.", "Rejeitavam o governo de Floriano, considerado inconstitucional.", "Exigiam novas eleições após a renúncia de Deodoro da Fonseca (como previa a Constituição de 1891).", "Motivações", "Crise entre Exército e Marinha (Floriano era ligado ao Exército).", "Defesa da legalidade constitucional.", "Perda de influência política da Marinha na República.", "Desenvolvimento", "Líderes: Almirantes Custódio de Melo e Saldanha da Gama.", "A Marinha ameaçou bombardear o Rio de Janeiro.", "Floriano resistiu com tropas do Exército, voluntários civis e apoio de navios estrangeiros alugados (os “navios de papel”).", "Resultado", "A revolta foi sufocada em 1894.", "Vitória de Floriano, que consolidou o poder presidencial e enfraqueceu a Marinha."]}, {"title": "2. REVOLUÇÃO FEDERALISTA (1893–1895)", "body": ["Local", "Conflito concentrado no Sul do Brasil (Rio Grande do Sul, Santa Catarina e Paraná).", "Motivações", "Disputa entre dois grupos locais:", "Maragatos (federalistas): queriam maior autonomia dos estados, eram contra Floriano.", "Pica-paus (republicanos): defendiam a centralização e apoiavam o governo.", "Desenvolvimento", "Liderança federalista: Gaspar Silveira Martins e Gumercindo Saraiva.", "Os rebeldes chegaram a invadir o Paraná.", "Floriano enviou tropas federais para combater os maragatos.", "Violência", "Conflito sangrento, com degolas e combates brutais.", "Guerra civil de forte impacto na região sul.", "Resultado", "Floriano conseguiu manter a ordem.", "O conflito se estendeu até 1895, já sob o governo de Prudente de Morais, que assinou a paz."]}, {"title": "TABELA RESUMO", "body": ["Conflito Revolta da Armada Revolução Federalista", "Localização Rio de Janeiro (litoral) Sul do Brasil", "Opositores Oficiais da Marinha Maragatos (federalistas)", "Motivo principal Defesa da Constituição Autonomia regional x centralização", "Apoio a Floriano Exército, civis voluntários Pica-paus (republicanos)", "Desfecho Repressão violenta e vitória Derrota dos federalistas (1895)", "Consequência Enfraquecimento da Marinha Consolidação da autoridade federal.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A SUCESSÃO DE FLORIANO PEIXOTO (1894)", "body": ["Contexto Político", "O governo de Floriano Peixoto (1891–1894) foi marcado por autoritarismo e repressão.", "Após enfrentar duas grandes revoltas (Revolta da Armada e Revolução Federalista), ele consolidou a República à força.", "Mas havia grande pressão para restaurar a legalidade e normalizar a política, com a posse de um presidente civil, eleito democraticamente.", "Eleição Presidencial de 1894", "Primeira eleição presidencial direta da República Velha com voto aberto e censitário (restrito a homens alfabetizados).", "Candidato vencedor:", "Prudente de Morais, do Partido Republicano Paulista (PRP).", "Primeiro presidente civil da história do Brasil.", "O vice-presidente eleito foi Manoel Vitorino, também civil.", "Importância da Sucessão", "Elemento Detalhe", "Transição Da liderança militar para a civil", "Valorização da legalidade Retorno ao espírito da Constituição após anos de exceção", "Consolidação da República Floriano garantiu a estabilidade para que o governo civil pudesse assumir", "Início da “Política dos Governadores” O poder passa a se concentrar nas oligarquias estaduais, especialmente SP e MG", "Resumo", "A sucessão de Floriano marcou a transição do militarismo autoritário para o domínio civil oligárquico. Com a eleição de Prudente de Morais, iniciou-se uma nova fase da Primeira República, conhecida como República Oligárquica.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "O SIGNIFICADO DO TÉRMINO DA GESTÃO DE FLORIANO PEIXOTO", "body": ["Fim de uma etapa autoritária", "Floriano governou com mão de ferro, enfrentando revoltas com repressão.", "Sua saída simboliza o fim da fase mais militar e centralizadora da República nascente.", "Retorno à legalidade", "Sua gestão encerrou-se com a eleição direta de Prudente de Morais, restaurando o processo constitucional e a transição civil do poder.", "Foi o marco do início da hegemonia civil-oligárquica no poder central.", "Legado militar", "Apesar da saída do poder, o Exército saiu fortalecido e com papel político consolidado.", "Floriano passou à história como o “Marechal de Ferro”, defensor da ordem republicana.", "Caminho para a República Oligárquica", "Ao garantir a posse de um presidente civil, Floriano abriu espaço para a chamada Política dos Governadores, marcada por acordos entre elites estaduais e o governo federal.", "Inicia-se a República Velha (ou Oligárquica) com mais estabilidade institucional, mas controle das oligarquias.", "Em resumo", "O fim do governo Floriano Peixoto representou uma virada da República autoritária militar para a consolidação do regime civil, controlado pelas elites regionais, marcando o início da fase oligárquica da Primeira República.", "Prof. Marcelo Oliveira  História Geral.", "REPÚBLICA DAS OLIGARQUIAS Prudente de Morais (1894-1898)", "Quem foi Prudente de Morais?", "Primeiro presidente civil da história do Brasil.", "Membro do Partido Republicano Paulista (PRP).", "Representante das elites cafeeiras de São Paulo.", "Características do governo", "Transição da liderança militar para o domínio civil das oligarquias.", "Repressão a movimentos populares, especialmente a Revolta de Canudos.", "Consolidação da política dos governadores: alianças entre elites estaduais e governo federal.", "Fortalecimento do federalismo e autonomia dos estados.", "Conflitos e desafios", "Tentativa de assassinato contra Prudente em 1897.", "A Guerra de Canudos (1896-1897): conflito sangrento no interior da Bahia, reprimido violentamente pelo Exército.", "Legado", "Estabilizou a República após o período autoritário-militar.", "Consolidou o domínio das oligarquias rurais, especialmente São Paulo e Minas Gerais (a chamada “política do café com leite”).", "Preparou o terreno para os governos civis oligárquicos até a década de 1930.", "Prof. Marcelo Oliveira  História Geral."]}, {"title": "A CRISE DE CANUDOS (1896–1897)", "body": ["Contexto", "Região semiárida do sertão da Bahia, marcada por pobreza, seca e desigualdade social.", "A população sofria com a exploração dos coronéis e o abandono do governo central.", "Antônio Conselheiro", "Líder religioso carismático que reuniu milhares de seguidores no arraial de Canudos.", "Pregava uma vida comunitária, a fé e a rejeição ao governo republicano, visto como ilegítimo e corrupto.", "O Conflito", "O governo da República, preocupado com o crescimento do movimento e seu caráter contestador, enviou tropas para destruir Canudos.", "Foram realizadas quatro expedições militares entre 1896 e 1897, todas inicialmente fracassadas.", "Desfecho", "Na última expedição, o Exército brasileiro conseguiu destruir o arraial em outubro de 1897, após combates sangrentos.", "Cerca de 25 mil pessoas morreram, entre seguidores de Conselheiro e militares.", "Impactos", "Mostrou a fragilidade do governo republicano em controlar o interior do país.", "Evidenciou o conflito entre as elites urbanas e a população rural pobre e marginalizada.", "Tornou-se símbolo da resistência popular e da violência do Estado contra movimentos sociais.", "Prof. Marcelo Oliveira  História Geral.", "Da Crise da Moção Seabra à Tentativa de Homicídio contra Prudente de Morais", "Contexto da Crise da Moção Seabra (1896)", "A Moção Seabra foi um documento proposto pelo deputado José Francisco Seabra que criticava duramente o governo e o modelo oligárquico da República.", "O texto denunciava a corrupção e o autoritarismo que dominavam o cenário político, gerando grande tensão entre as elites políticas e o governo.", "Consequências políticas", "A Moção provocou uma crise no Congresso e intensificou os conflitos internos na política republicana.", "Reforçou a polarização entre grupos favoráveis à manutenção das oligarquias e os que defendiam reformas políticas.", "Tentativa de Homicídio contra Prudente de Morais (1897)", "Em 5 de novembro de 1897, Prudente de Morais sofreu um atentado, quando um atirador tentou assassiná-lo em seu gabinete.", "O atentado refletia a instabilidade política e o clima de violência entre grupos rivais.", "Prudente saiu ferido, mas sobreviveu ao ataque, o que reforçou sua imagem de resistência.", "Impactos", "A tentativa de homicídio agravou ainda mais a crise política e a insegurança no governo.", "Levou a um endurecimento do controle político e repressão a opositores.", "Contribuiu para a intensificação da repressão na
